<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BreakinSetBuilder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh}
.app{max-width:600px;margin:0 auto;padding:0 20px 80px}
.header{padding:20px 0 12px;border-bottom:1px solid #222;text-align:center}
.header h1{font-size:20px;font-weight:700;color:#fff}
.header p{font-size:12px;color:#666;margin-top:2px}
.tabs{display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:#111;border-top:1px solid #222;z-index:100}
.tab{flex:1;padding:10px 4px 14px;font-size:10px;border:none;background:transparent;color:#666;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color 0.15s}
.tab.active{color:#fff}
.tab-icon{font-size:18px}
.section{padding:12px 0;display:none}
.section.active{display:block}
.search-box{width:100%;padding:10px 14px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px;margin-bottom:12px}
.search-box::placeholder{color:#555}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
.tag-chip{padding:5px 12px;border-radius:20px;border:1px solid #333;background:#1a1a1a;color:#888;font-size:12px;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.tag-chip.active{background:#fff;color:#000;border-color:#fff}
.moves-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.move-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;padding:16px;cursor:pointer;transition:border-color 0.2s}
.move-card:hover{border-color:#444}
.move-card.expanded{border-color:#666}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.card-name{font-size:16px;font-weight:600;color:#fff}
.type-badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;flex-shrink:0;margin-left:8px}
.type-foot{background:#0d3320;color:#4ade80}
.type-freeze{background:#0d1f3c;color:#60a5fa}
.type-power{background:#3c1a0d;color:#fb923c}
.type-combo{background:#2a0d3c;color:#c084fc}
.card-count{font-size:11px;color:#666;margin-bottom:6px}
.card-tags{display:flex;gap:5px;flex-wrap:wrap}
.mini-tag{font-size:10px;padding:2px 8px;border-radius:20px;background:#222;color:#666;border:1px solid #333}
.card-chevron{font-size:11px;color:#444;margin-top:8px;text-align:center;transition:transform 0.25s}
.card-chevron.open{transform:rotate(180deg)}
.card-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid #222}
.card-detail.open{display:block}
.card-detail-desc{font-size:13px;color:#bbb;line-height:1.6;margin-bottom:10px;background:#111;border-radius:10px;padding:12px}
.card-detail-video{width:100%;border-radius:10px;margin-bottom:10px;display:block;max-height:200px;object-fit:contain;background:#000}
.card-detail-btns{display:flex;gap:8px}
.card-detail-btn{flex:1;padding:9px;font-size:12px;border-radius:10px;border:1px solid #333;background:transparent;color:#888;cursor:pointer;transition:all 0.15s}
.card-detail-btn:hover{border-color:#fff;color:#fff}
.card-detail-btn.accent{border-color:#555;color:#ddd;background:#1e1e1e}
.detail-screen{position:fixed;inset:0;background:#0f0f0f;z-index:200;overflow-y:auto;transform:translateX(100%);transition:transform 0.25s ease}
.detail-screen.open{transform:translateX(0)}
.edit-screen{position:fixed;inset:0;background:#0f0f0f;z-index:250;overflow-y:auto;transform:translateX(100%);transition:transform 0.25s ease}
.edit-screen.open{transform:translateX(0)}
.detail-header{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid #222;position:sticky;top:0;background:#0f0f0f;z-index:10}
.back-btn{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:7px 12px;color:#fff;font-size:13px;cursor:pointer;white-space:nowrap}
.edit-btn{background:#1a1a1a;border:1px solid #444;border-radius:10px;padding:7px 12px;color:#aaa;font-size:13px;cursor:pointer;margin-left:auto;white-space:nowrap}
.detail-name{font-size:15px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.detail-body{padding:16px 20px;max-width:600px;margin:0 auto}
.detail-section-title{font-size:11px;font-weight:600;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;margin-top:16px}
.detail-desc-box{background:#1a1a1a;border-radius:12px;padding:14px;font-size:14px;color:#ccc;line-height:1.7}
.drop-zone{border:2px dashed #2a2a2a;border-radius:14px;padding:20px;text-align:center;color:#555;font-size:13px;transition:all 0.2s;margin-bottom:6px}
.drop-zone.dragover{border-color:#fff;color:#fff;background:#1a1a1a}
.drop-zone input[type=file]{display:none}
.upload-btn{width:100%;padding:10px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#888;font-size:13px;cursor:pointer;margin-bottom:6px;transition:all 0.15s}
.upload-btn:hover{border-color:#fff;color:#fff}
.video-wrapper{position:relative;width:100%;padding-top:56.25%;margin-bottom:10px;border-radius:12px;overflow:hidden;background:#111}
.video-wrapper video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;background:#000}
.delete-video-btn{width:100%;padding:9px;background:transparent;color:#ff4444;border:1px solid #ff4444;border-radius:12px;font-size:13px;font-weight:600;margin-bottom:8px;cursor:pointer}
.progress-bar-upload{width:100%;height:4px;background:#222;border-radius:2px;margin-bottom:10px;overflow:hidden;display:none}
.progress-fill-upload{height:100%;background:#fff;border-radius:2px;transition:width 0.3s}
.add-to-set-btn{width:100%;padding:12px;background:#1a1a1a;border:1px solid #444;border-radius:12px;color:#fff;font-size:14px;font-weight:600;margin-top:16px;cursor:pointer}
.delete-move-btn{width:100%;padding:10px;background:transparent;color:#ff4444;border:1px solid #ff4444;border-radius:12px;font-size:13px;font-weight:600;margin-top:8px;cursor:pointer}
.set-builder{padding:16px 0}
.set-name-input{width:100%;padding:12px 14px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px;margin-bottom:10px}
.set-name-input::placeholder{color:#555}
.set-area{min-height:80px;border:1px dashed #2a2a2a;border-radius:14px;padding:12px;margin-bottom:10px}
.set-empty{text-align:center;color:#555;font-size:13px;padding:20px 0}
.set-node{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.set-pill{background:#1a1a1a;border:1px solid #333;border-radius:20px;padding:6px 14px;font-size:13px;color:#fff;display:flex;align-items:center;gap:8px;flex:1}
.set-pill-remove{color:#555;cursor:pointer;font-size:16px;margin-left:auto}
.set-arrow{color:#333;font-size:18px}
.count-badge{font-size:10px;padding:2px 7px;background:#2a2a2a;border-radius:20px;color:#888}
.eight-badge{font-size:11px;padding:3px 10px;background:#1a1a1a;border:1px solid #333;border-radius:20px;color:#888;margin-bottom:12px;display:inline-block}
.save-set-btn{width:100%;padding:12px;background:#fff;color:#000;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:14px}
.pick-title{font-size:13px;font-weight:600;color:#666;margin-bottom:10px}
.pick-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:10px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border-color 0.15s}
.pick-card:hover{border-color:#555}
.pick-card-name{font-size:14px;color:#fff}
.pick-plus{font-size:20px;color:#444}
.saved-set-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s}
.saved-set-card:hover{border-color:#444}
.saved-set-name{font-size:15px;font-weight:600;color:#fff;margin-bottom:6px}
.saved-set-seq{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.seq-pill{font-size:11px;padding:3px 10px;background:#222;border:1px solid #2a2a2a;border-radius:20px;color:#888}
.seq-arrow{color:#333;font-size:12px}
.delete-set-btn{font-size:11px;color:#555;background:none;border:none;cursor:pointer;padding:0}
.play-set-btn{font-size:12px;color:#fff;background:#1e1e1e;border:1px solid #444;border-radius:8px;cursor:pointer;padding:5px 12px}
.add-move-screen{position:fixed;inset:0;background:#0f0f0f;z-index:300;overflow-y:auto;transform:translateY(100%);transition:transform 0.25s ease}
.add-move-screen.open{transform:translateY(0)}
.add-move-body{padding:16px 20px;max-width:600px;margin:0 auto}
.fab{position:fixed;bottom:80px;right:calc(50% - 290px);width:52px;height:52px;border-radius:50%;background:#fff;color:#000;font-size:26px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:99;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
@media(max-width:640px){.fab{right:16px}}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:#888;margin-bottom:6px;display:block}
.form-input{width:100%;padding:10px 14px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px}
.form-input::placeholder{color:#555}
.form-textarea{width:100%;padding:10px 14px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px;min-height:100px;resize:vertical;line-height:1.6}
.form-textarea::placeholder{color:#555}
.type-select{display:flex;gap:8px;flex-wrap:wrap}
.type-opt{padding:7px 14px;border-radius:20px;border:1px solid #333;background:#1a1a1a;color:#888;font-size:13px;cursor:pointer;transition:all 0.15s}
.type-opt.active{border-color:#fff;color:#fff}
.submit-btn{width:100%;padding:14px;background:#fff;color:#000;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.empty-state{text-align:center;padding:60px 20px;color:#555}
.empty-state p{font-size:14px;margin-top:8px}
.loading{text-align:center;padding:40px;color:#555;font-size:13px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.count-input{width:100%;padding:10px 14px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px}
.count-input::placeholder{color:#555}
.add-drop-zone{border:2px dashed #2a2a2a;border-radius:14px;padding:20px;text-align:center;color:#555;font-size:13px;transition:all 0.2s;margin-bottom:6px}
.add-drop-zone.dragover{border-color:#fff;color:#fff;background:#1a1a1a}
.add-drop-zone input[type=file]{display:none}
.add-video-preview{width:100%;border-radius:12px;margin-top:10px;max-height:180px;object-fit:contain;background:#000;display:none}
.upload-progress{width:100%;height:4px;background:#222;border-radius:2px;margin-top:8px;overflow:hidden;display:none}
.upload-progress-fill{height:100%;background:#fff;border-radius:2px;transition:width 0.3s}
.tag-editor{margin-bottom:4px}
.tag-editor-current{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;min-height:24px}
.tag-editor-tag{font-size:12px;padding:3px 10px;border-radius:20px;background:#222;border:1px solid #333;color:#ccc;display:flex;align-items:center;gap:5px}
.tag-editor-tag .tag-x{color:#555;cursor:pointer;font-size:13px;line-height:1}
.tag-editor-tag .tag-x:hover{color:#ff4444}
.tag-candidates{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tag-candidate{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid #2a2a2a;background:#1a1a1a;color:#777;cursor:pointer;transition:all 0.15s}
.tag-candidate:hover{border-color:#fff;color:#fff}
.tag-input-row{display:flex;gap:8px}
.tag-input-row input{flex:1;padding:8px 12px;background:#1a1a1a;border:1px solid #333;border-radius:10px;color:#fff;font-size:13px}
.tag-input-row input::placeholder{color:#555}
.tag-input-row button{padding:8px 14px;background:#fff;color:#000;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
/* ビート管理 */
.beat-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;padding:16px;margin-bottom:10px;transition:border-color 0.15s;cursor:pointer}
.beat-card:hover{border-color:#444}
.beat-card.selected{border-color:#fff}
.beat-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.beat-card-name{font-size:15px;font-weight:600;color:#fff;margin-bottom:3px}
.beat-card-meta{font-size:11px;color:#555}
.beat-active-badge{font-size:10px;padding:2px 8px;background:#0d2a18;border:1px solid #4ade80;border-radius:20px;color:#4ade80;white-space:nowrap}
.beat-card-desc{font-size:12px;color:#555;margin-bottom:12px;line-height:1.5}
.beat-preview-btn{width:100%;padding:10px;font-size:13px;border-radius:10px;border:1px solid #333;background:#111;color:#888;cursor:pointer;transition:all 0.2s;font-weight:500}
.beat-preview-btn:hover{border-color:#fff;color:#fff}
.beat-preview-btn.playing{border-color:#4ade80;color:#4ade80;background:#0d2a18}
/* プレイヤー */
.player-screen{position:fixed;inset:0;background:#080808;z-index:400;display:none;flex-direction:column}
.player-screen.open{display:flex}
.player-header{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #1a1a1a;gap:8px;flex-shrink:0}
.player-title{font-size:13px;font-weight:700;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-beat-select{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;color:#fff;font-size:11px;padding:4px 6px;max-width:110px;cursor:pointer}
.player-mute-btn{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:5px 9px;color:#888;font-size:11px;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.player-mute-btn.muted{border-color:#ff4444;color:#ff4444;background:#2a0d0d}
.player-close{background:none;border:1px solid #222;border-radius:8px;padding:5px 9px;color:#555;font-size:11px;cursor:pointer;white-space:nowrap}
.carousel-area{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;min-height:0}
.carousel-track{display:flex;align-items:center;gap:14px;position:absolute;top:50%;transform:translateY(-50%);transition:left 0.4s cubic-bezier(0.25,0.46,0.45,0.94);will-change:left}
.carousel-card{border-radius:18px;text-align:center;cursor:pointer;flex-shrink:0;border:1px solid #2a2a2a;background:#141414;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.35s cubic-bezier(0.25,0.46,0.45,0.94);padding:16px}
.carousel-card.active{border-color:#fff;background:#1c1c1c}
.carousel-card-name{font-weight:700;color:#fff;line-height:1.2;margin-bottom:6px}
.carousel-card-count{color:#777;margin-bottom:4px}
.carousel-card-num{color:#333}
.player-card-detail{display:none;width:100%;margin-top:10px;padding-top:10px;border-top:1px solid #2a2a2a}
.player-card-detail.open{display:block}
.player-card-desc{font-size:11px;color:#888;line-height:1.5;background:#0a0a0a;border-radius:8px;padding:8px;margin-bottom:6px}
.player-card-video{width:100%;border-radius:8px;max-height:120px;object-fit:contain;background:#000;display:block}
.player-controls{padding:8px 14px 16px;flex-shrink:0}
.progress-section{margin-bottom:8px}
.progress-time-row{display:flex;justify-content:space-between;font-size:10px;color:#444;margin-bottom:4px}
.progress-track{width:100%;height:5px;background:#1a1a1a;border-radius:3px;cursor:pointer;position:relative}
.progress-markers{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;border-radius:3px;overflow:hidden}
.pm-eight{position:absolute;top:0;width:1px;height:100%;background:#222}
.pm-four{position:absolute;top:-2px;width:2px;height:calc(100%+4px);background:#333;border-radius:1px}
.pm-move{position:absolute;top:-3px;width:2px;height:calc(100%+6px);background:#444;border-radius:1px}
.progress-played{height:100%;background:#fff;border-radius:3px;position:relative;z-index:1;transition:width 0.08s linear}
/* BPMコントロール */
.bpm-control{display:flex;align-items:center;gap:8px;background:#111;border:1px solid #222;border-radius:12px;padding:8px 12px;margin-bottom:8px}
.bpm-control-label{font-size:11px;color:#555;white-space:nowrap}
.bpm-value{font-size:18px;font-weight:700;color:#fff;min-width:36px;text-align:center}
.bpm-btn{width:34px;height:34px;border-radius:50%;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;line-height:1}
.bpm-btn:hover{border-color:#fff;background:#2a2a2a}
.bpm-btn:active{transform:scale(0.92)}
.bpm-slider{flex:1;-webkit-appearance:none;appearance:none;height:3px;background:#2a2a2a;border-radius:2px;outline:none;cursor:pointer}
.bpm-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;cursor:pointer}
.bpm-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#fff;cursor:pointer;border:none}
.play-pause-btn{width:100%;padding:12px;background:#fff;color:#000;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:transform 0.1s}
.play-pause-btn:active{transform:scale(0.98)}
.set-detail-screen{position:fixed;inset:0;background:#0f0f0f;z-index:350;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s ease}
.set-detail-screen.open{transform:translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="header"><h1>BreakinSetBuilder</h1><p>技を管理してセットを組み立てる</p></div>
  <div id="sec-moves" class="section active">
    <input class="search-box" type="text" placeholder="技を検索..." oninput="filterMoves(this.value)" id="search-input">
    <div class="tag-row" id="tag-row"></div>
    <div class="moves-grid" id="moves-list"></div>
  </div>
  <div id="sec-set" class="section">
    <div class="set-builder">
      <input class="set-name-input" type="text" placeholder="セット名（例：バトル用コンボA）" id="set-name">
      <div id="set-tag-editor-create"></div>
      <div id="set-eight-count" class="eight-badge" style="display:none"></div>
      <div class="set-area" id="set-area"><div class="set-empty">下から技を選んで追加</div></div>
      <button class="save-set-btn" onclick="saveSet()">セットを保存</button>
      <div class="pick-title">技を選ぶ</div>
      <div id="pick-list"></div>
    </div>
  </div>
  <div id="sec-saved" class="section"><div style="padding:12px 0" id="saved-list"></div></div>
  <div id="sec-beats" class="section"><div id="beat-list"></div></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('moves',this)"><span class="tab-icon">🃏</span>技カード</button>
  <button class="tab" onclick="switchTab('set',this)"><span class="tab-icon">⚡</span>セット作成</button>
  <button class="tab" onclick="switchTab('saved',this)"><span class="tab-icon">📋</span>保存済み</button>
  <button class="tab" onclick="switchTab('beats',this)"><span class="tab-icon">🎵</span>ビート</button>
</div>
<button class="fab" onclick="openAddMove()" id="fab">+</button>

<div class="detail-screen" id="detail-screen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">← 戻る</button>
    <span class="detail-name" id="detail-name"></span>
    <button class="edit-btn" id="detail-edit-btn">✏️ 編集</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<div class="edit-screen" id="edit-screen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeEdit()">← 戻る</button>
    <span class="detail-name">技を編集</span>
  </div>
  <div class="add-move-body" id="edit-body"></div>
</div>

<div class="add-move-screen" id="add-move-screen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeAddMove()">← 戻る</button>
    <span class="detail-name">新しい技を追加</span>
  </div>
  <div class="add-move-body">
    <div class="form-group"><label class="form-label">技名</label><input class="form-input" type="text" id="new-name" placeholder="例：ゴブレット"></div>
    <div class="form-group"><label class="form-label">種類</label>
      <div class="type-select" id="type-select">
        <span class="type-opt active" data-type="foot" onclick="selectType(this)">フットワーク</span>

let beatInterval=null,beatCount=0,totalBeats=0;

function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function midiHz(n){return 440*Math.pow(2,(n-69)/12);}

function noise(ctx,dur,freq,q,vol,t){
  const buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);

  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  src.start(t);
}

function playBeat(beatPos,globalBeat,beatKey,bpm){
  if(isMuted)return;
  const ctx=getCtx();
  const now=ctx.currentTime;
  const spb=60/bpm;
  const b=BEATS[beatKey]||BEATS.dilla_bounce;
  const pos=beatPos%8;
  const is4Eight=globalBeat>0&&globalBeat%32===0;
  const is1Eight=globalBeat>0&&globalBeat%8===0&&!is4Eight;

  // swing timing for hats
  const swingOffset=pos%2===1?(b.hatSwing-0.5)*spb*0.5:0;

  // === KICK ===
  if(b.kickGrid.includes(pos)){
    const kickT=now+(b.kickOffset||0);
    const o=ctx.createOscillator(),g=ctx.createGain();
    const dist=ctx.createWaveShaper();
    const curve=new Float32Array(256);
    for(let i=0;i<256;i++){const x=i*2/256-1;curve[i]=x<0?-Math.pow(-x,0.7):Math.pow(x,0.7);}
    dist.curve=curve;
    o.connect(dist);dist.connect(g);g.connect(ctx.destination);
    const isHard=beatKey==="atl_trap"||beatKey==="muggs_dark";
    o.frequency.setValueAtTime(isHard?65:58,kickT);
    o.frequency.exponentialRampToValueAtTime(24,kickT+(isHard?0.35:0.28));
    const vol=is4Eight?1.0:isHard?0.85:0.72;
    g.gain.setValueAtTime(vol,kickT);
    g.gain.exponentialRampToValueAtTime(0.001,kickT+(isHard?0.38:0.30));
    o.start(kickT);o.stop(kickT+0.4);
    // sub layer
    const sub=ctx.createOscillator(),subG=ctx.createGain();
    sub.connect(subG);subG.connect(ctx.destination);
    sub.frequency.setValueAtTime(isHard?40:35,kickT);
    sub.frequency.exponentialRampToValueAtTime(18,kickT+0.4);
    subG.gain.setValueAtTime(0.5,kickT);subG.gain.exponentialRampToValueAtTime(0.001,kickT+0.4);
    sub.start(kickT);sub.stop(kickT+0.42);
  }

  // === SNARE ===
  if(b.snareGrid.includes(pos)){
    const snT=now+(b.snareOffset||0);
    const isHard=beatKey==="atl_trap";
    noise(ctx,isHard?0.22:0.18,isHard?1800:2100,0.6,isHard?0.85:0.65,snT);
    // body tone
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=beatKey==="muggs_dark"?220:185;
    g.gain.setValueAtTime(isHard?0.3:0.22,snT);
    g.gain.exponentialRampToValueAtTime(0.001,snT+0.06);
    o.start(snT);o.stop(snT+0.06);
    // rimshot layer for muggs/westcoast
    if(b.hasRimshot){
      noise(ctx,0.06,4000,3,0.3,snT+0.002);
      const rim=ctx.createOscillator(),rimG=ctx.createGain();
      rim.connect(rimG);rimG.connect(ctx.destination);
      rim.frequency.value=800;
      rimG.gain.setValueAtTime(0.15,snT);rimG.gain.exponentialRampToValueAtTime(0.001,snT+0.04);
      rim.start(snT);rim.stop(snT+0.04);
    }
  }

  // === GHOST SNARE ===
  if(b.ghostSnare&&b.ghostSnare.includes(pos)){
    noise(ctx,0.06,2200,0.8,0.06,now+swingOffset);
  }

  // === HI-HAT ===
  if(b.isTrap){
    // triplet hats: 3 hits per beat position
    for(let t=0;t<3;t++){
      const ht=now+t*(spb/3)*0.5;
      const vol=t===0?0.18:t===1?0.12:0.08;
      noise(ctx,0.028,10000,0.4,vol,ht);
    }
    // extra rolls on position 6-7
    if(pos===6){
      for(let t=0;t<6;t++){
        const ht=now+t*(spb/6)*0.45;
        noise(ctx,0.018,11000,0.3,0.06+Math.random()*0.04,ht);
      }
    }
  } else {
    const isOpen=b.hatOpenGrid&&b.hatOpenGrid.includes(pos);
    const hatT=now+swingOffset;
    const dur=isOpen?0.20:0.038;
    const vol=beatKey==="pete_rock"?0.10:isOpen?0.20:0.15;
    noise(ctx,dur,10000,0.3,vol,hatT);
  }

  // === 808 / BASS ===

    const bassT=now;
    const bassKey=b.bass||{root:36,slide:31,slideDur:0.3};
    const hz1=midiHz(bassKey.root);

    o.connect(flt);flt.connect(g);g.connect(ctx.destination);
    o.frequency.value=hz;
    const vol=mType==="sample"?0.12:0.10;
    const dur=mType==="dark"?0.55:0.42;
    g.gain.setValueAtTime(0,mT);g.gain.linearRampToValueAtTime(vol,mT+0.025);
    g.gain.exponentialRampToValueAtTime(0.001,mT+dur);
    o.start(mT);o.stop(mT+dur);
    // detuned layer for thickness
    const o2=ctx.createOscillator(),g2=ctx.createGain();
    o2.type=o.type;o2.frequency.value=hz*1.008;
    o2.connect(flt);g2.connect(ctx.destination);
    o2.connect(g2);
    g2.gain.setValueAtTime(0,mT);g2.gain.linearRampToValueAtTime(vol*0.4,mT+0.025);
    g2.gain.exponentialRampToValueAtTime(0.001,mT+dur);
    o2.start(mT);o2.stop(mT+dur);
  }

  // === PAD ===
  if(b.pad&&b.pad.on.includes(pos)){
    const idx=b.pad.on.indexOf(pos);
    const hz=midiHz(b.pad.notes[idx%b.pad.notes.length]);
    const pT=now;
    const o1=ctx.createOscillator(),o2=ctx.createOscillator(),g=ctx.createGain();
    const flt=ctx.createBiquadFilter();flt.type="lowpass";flt.frequency.value=600;
    o1.type="sine";o2.type="sine";
    o1.frequency.value=hz;o2.frequency.value=hz*1.003;
    o1.connect(flt);o2.connect(flt);flt.connect(g);g.connect(ctx.destination);
    const pdur=0.85;
    g.gain.setValueAtTime(0,pT);g.gain.linearRampToValueAtTime(0.08,pT+0.1);
    g.gain.exponentialRampToValueAtTime(0.001,pT+pdur);
    o1.start(pT);o1.stop(pT+pdur);o2.start(pT);o2.stop(pT+pdur);
  }

  if(b.hasPerc&&b.percGrid&&b.percGrid.includes(pos)){
    noise(ctx,0.07,1100,2.5,0.07,now+swingOffset*0.8);
  }

    const vbuf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*(60/bpm)*8),ctx.sampleRate);
    const vd=vbuf.getChannelData(0);
    for(let i=0;i<vd.length;i++)vd[i]=(Math.random()*2-1)*0.018;
    const vs=ctx.createBufferSource(),vg=ctx.createGain(),vf=ctx.createBiquadFilter();
    vf.type="bandpass";vf.frequency.value=1800;vf.Q.value=0.4;
    vs.buffer=vbuf;vs.connect(vf);vf.connect(vg);vg.connect(ctx.destination);
    vg.gain.setValueAtTime(0.35,now);
    vs.start(now);
  }

  // === 4エイト ドロップアクセント ===
  if(is4Eight){
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type="sawtooth";
    o.frequency.setValueAtTime(220,now);o.frequency.exponentialRampToValueAtTime(55,now+0.3);
    g.gain.setValueAtTime(0.4,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.3);
    o.start(now);o.stop(now+0.3);
  } else if(is1Eight){
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=165;
    g.gain.setValueAtTime(0.09,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.06);
    o.start(now);o.stop(now+0.06);
  }
}

window.adjustBPM=function(delta){
  currentBPM=Math.max(60,Math.min(180,currentBPM+delta));
  updateBPMDisplay();
  if(isPlaying){clearInterval(beatInterval);beatInterval=setInterval(tickBeat,60000/currentBPM);}
}
window.setBPMFromSlider=function(val){
  currentBPM=parseInt(val);
  updateBPMDisplay();
  if(isPlaying){clearInterval(beatInterval);beatInterval=setInterval(tickBeat,60000/currentBPM);}
}
function updateBPMDisplay(){
  document.getElementById("bpm-value").textContent=currentBPM;
  document.getElementById("bpm-slider").value=currentBPM;
  updateTimeDisplay();
}

// ===== MUTE =====
window.toggleMute=function(){

  const btn=document.getElementById("mute-btn");
  btn.textContent=isMuted?"🔇":"🔊";
  btn.classList.toggle("muted",isMuted);

// ===== PREVIEW =====
function stopPreview(){
  if(previewInterval){clearInterval(previewInterval);previewInterval=null;}
  previewKey=null;previewBeat=0;
  document.querySelectorAll(".beat-preview-btn").forEach(b=>{b.textContent="▶ 試聴";b.classList.remove("playing");});
}
window.toggleBeatPreview=function(key,btn){
  if(previewKey===key){stopPreview();return;}
  stopPreview();
  previewKey=key;previewBeat=0;
  btn.textContent="⏹ 停止";btn.classList.add("playing");
  getCtx().resume();
  const bpm=BEATS[key].bpm;
  previewInterval=setInterval(()=>{

// ===== PLAYER =====
function startPlayer(setData){
  currentSetMoves=setData.moves||[];
  if(!currentSetMoves.length)return;
  document.getElementById("player-title").textContent=setData.name;
  const sel=document.getElementById("player-beat-select");
  sel.innerHTML=Object.entries(BEATS).map(([k,v])=>`<option value="${k}"${k===selectedBeatKey?" selected":""}>${v.name}</option>`).join("");
  currentBeatKey=selectedBeatKey;
  currentBPM=BEATS[selectedBeatKey].bpm;
  updateBPMDisplay();
  beatCount=0;currentMoveIdx=0;isPlaying=false;expandedPlayerCardIdx=null;
  beatsPerMove=currentSetMoves.map(m=>parseInt(m.count)||8);
  totalBeats=beatsPerMove.reduce((a,b)=>a+b,0);
  isMuted=false;
  document.getElementById("mute-btn").textContent="🔊";
  document.getElementById("mute-btn").classList.remove("muted");
  renderCarousel(0);renderProgressMarkers();updateTimeDisplay();
  document.getElementById("progress-played").style.width="0%";
  document.getElementById("play-pause-btn").textContent="▶ 再生";
  document.getElementById("player-screen").classList.add("open");
}

function renderProgressMarkers(){
  const marks=[];
  for(let i=1;i<totalBeats;i++){
    if(i%32===0)marks.push(`<div class="pm-four" style="left:${(i/totalBeats)*100}%"></div>`);
    else if(i%8===0)marks.push(`<div class="pm-eight" style="left:${(i/totalBeats)*100}%"></div>`);
  }
  let cum=0;
  for(let i=0;i<beatsPerMove.length-1;i++){cum+=beatsPerMove[i];marks.push(`<div class="pm-move" style="left:${(cum/totalBeats)*100}%"></div>`);}
  document.getElementById("progress-markers").innerHTML=marks.join("");
}

function updateTimeDisplay(){
  const spb=60/currentBPM;
  const cur=beatCount*spb,tot=totalBeats*spb;
  document.getElementById("time-current").textContent=fmt(cur);
  document.getElementById("time-total").textContent=fmt(tot);
  document.getElementById("time-eight").textContent=`${Math.floor(beatCount/8)+1}エイト目`;
}
function fmt(s){return`${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,"0")}`;}

function renderCarousel(activeIdx){
  const area=document.getElementById("carousel-area");
  const aW=area.offsetWidth||window.innerWidth;
  const aH=area.offsetHeight||260;
  const actW=Math.min(aW*0.60,250);
  const actH=Math.min(aH*0.70,190);
  const inW=actW*0.66;
  const inH=actH*0.66;
  const gap=14;
  const track=document.getElementById("carousel-track");
  track.innerHTML=currentSetMoves.map((m,i)=>{
    const isAct=i===activeIdx;
    const isExp=expandedPlayerCardIdx===i&&isAct;
    const mFull=moves.find(x=>x.id===m.id)||m;
    const w=isAct?actW:inW;
    const h=isAct?actH:inH;
    return`<div class="carousel-card${isAct?" active":""}" id="pcard-${i}"
      style="width:${w}px;min-width:${w}px;min-height:${h}px;opacity:${isAct?1:0.28};transform:scale(${isAct?1:0.80})"
      onclick="window.togglePlayerCard(${i})">
      <div class="carousel-card-name" style="font-size:${isAct?20:13}px">${m.name}</div>
      <div class="carousel-card-count" style="font-size:${isAct?12:10}px">${m.count?m.count+"カウント":""}</div>
      <div class="carousel-card-num" style="font-size:${isAct?11:9}px">${i+1} / ${currentSetMoves.length}</div>
      ${isAct?`<div class="player-card-detail${isExp?" open":""}">
        ${mFull.videoUrl?`<video class="player-card-video" src="${mFull.videoUrl}" controls playsinline muted></video>`:""}
        <div class="player-card-desc">${mFull.desc||""}</div>
      </div>`:""}
    </div>`;
  }).join("");
  // center active card
  let left=aW/2-actW/2;
  for(let i=0;i<activeIdx;i++)left-=inW+gap;
  track.style.left=left+"px";
  track.style.top="50%";
  track.style.transform="translateY(-50%)";
}

window.togglePlayerCard=function(idx){
  if(idx!==currentMoveIdx)return;
  expandedPlayerCardIdx=expandedPlayerCardIdx===idx?null:idx;
  renderCarousel(currentMoveIdx);
}

function tickBeat(){
  playBeat(beatCount%8,beatCount,currentBeatKey,currentBPM);
  let cum=0;
  for(let i=0;i<beatsPerMove.length;i++){
    cum+=beatsPerMove[i];
    if(beatCount<cum){if(i!==currentMoveIdx){currentMoveIdx=i;expandedPlayerCardIdx=null;renderCarousel(i);}break;}
  }
  const pct=Math.min((beatCount/totalBeats)*100,100);
  document.getElementById("progress-played").style.width=pct+"%";
  updateTimeDisplay();
  beatCount++;
  if(beatCount>=totalBeats){beatCount=0;currentMoveIdx=0;expandedPlayerCardIdx=null;renderCarousel(0);document.getElementById("progress-played").style.width="0%";}
}

window.togglePlay=function(){
  if(isPlaying){clearInterval(beatInterval);isPlaying=false;document.getElementById("play-pause-btn").textContent="▶ 再生";}
  else{getCtx().resume();beatInterval=setInterval(tickBeat,60000/currentBPM);isPlaying=true;document.getElementById("play-pause-btn").textContent="⏸ 一時停止";}
}

window.seekTo=function(e){
  const rect=document.getElementById("progress-track").getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  beatCount=Math.floor(pct*totalBeats);
  document.getElementById("progress-played").style.width=(pct*100)+"%";
  updateTimeDisplay();
}

window.changeBeat=function(key){
  currentBeatKey=key;
  currentBPM=BEATS[key].bpm;
  updateBPMDisplay();
  if(isPlaying){clearInterval(beatInterval);beatInterval=setInterval(tickBeat,60000/currentBPM);}
}

window.closePlayer=function(){
  clearInterval(beatInterval);isPlaying=false;
  document.getElementById("player-screen").classList.remove("open");
  document.getElementById("play-pause-btn").textContent="▶ 再生";
}

// ===== TAG EDITOR =====
function getAllTags(){
  const s=new Set();
  moves.forEach(m=>(m.tags||[]).forEach(t=>s.add(t)));
  sets.forEach(f=>(f.tags||[]).forEach(t=>s.add(t)));
  customTags.forEach(t=>s.add(t.name));
  return[...s];
}
function renderTagEditor(cid,currentTags,onUpdate){
  const all=getAllTags().filter(t=>!currentTags.includes(t));
  const el=document.getElementById(cid);if(!el)return;
  el.innerHTML=`<div class="tag-editor">
    <div class="tag-editor-current">${currentTags.map(t=>`<span class="tag-editor-tag">${t}<span class="tag-x" onclick="removeTagFrom('${cid}','${t}')">×</span></span>`).join("")}</div>
    ${all.length?`<div class="tag-candidates">${all.map(t=>`<span class="tag-candidate" onclick="addTagTo('${cid}','${t}')">${t}</span>`).join("")}</div>`:""}
    <div class="tag-input-row"><input type="text" id="${cid}-input" placeholder="新しいタグ..."><button onclick="addTagFrom('${cid}')">追加</button></div>
  </div>`;

window.addTagTo=function(cid,tag){const d=window[`_td_${cid}`];if(!d||d.tags.includes(tag))return;d.tags.push(tag);d.onUpdate(d.tags);renderTagEditor(cid,d.tags,d.onUpdate);}
window.removeTagFrom=function(cid,tag){const d=window[`_td_${cid}`];if(!d)return;d.tags=d.tags.filter(t=>t!==tag);d.onUpdate(d.tags);renderTagEditor(cid,d.tags,d.onUpdate);}
window.addTagFrom=function(cid){const i=document.getElementById(`${cid}-input`);const t=i.value.trim();if(!t)return;window.addTagTo(cid,t);i.value="";}

  const count=document.getElementById("edit-count").value.trim();
  await updateDoc(doc(db,"moves",id),{name,type:editType,desc,count:count||null,tags:editMoveTags});
  moves=moves.map(m=>m.id===id?{...m,name,type:editType,desc,count:count||null,tags:editMoveTags}:m);
  showToast("保存しました！");closeEdit();window.showDetail(id);renderMoves();renderPickList();
}
window.closeEdit=()=>document.getElementById("edit-screen").classList.remove("open");
window.deleteMove=async function(id){
  if(!confirm("この技を削除しますか？"))return;
  await deleteDoc(doc(db,"moves",id));moves=moves.filter(m=>m.id!==id);
  renderMoves();renderPickList();renderTagRow();closeDetail();showToast("削除しました");
}
window.deleteVideo=async function(id){
  if(!confirm("この動画を削除しますか？"))return;
  await updateDoc(doc(db,"moves",id),{videoUrl:""});
  moves=moves.map(m=>m.id===id?{...m,videoUrl:""}:m);showToast("削除しました");window.showDetail(id);
}
window.closeDetail=function(){document.getElementById("detail-screen").classList.remove("open");}
window.handleVideoUpload=function(e,id){const f=e.target.files[0];if(f)window.uploadToCloudinary(f,id);}
window.uploadToCloudinary=async function(file,moveId){
  const bar=document.getElementById(`progress-bar-${moveId}`),fill=document.getElementById(`progress-fill-${moveId}`);
  if(bar)bar.style.display="block";
  const fd=new FormData();fd.append("file",file);fd.append("upload_preset",UPLOAD_PRESET);
  const xhr=new XMLHttpRequest();
  xhr.upload.onprogress=e=>{if(e.lengthComputable&&fill)fill.style.width=(e.loaded/e.total*100)+"%";};
  xhr.onload=async function(){
    if(xhr.status===200){const res=JSON.parse(xhr.responseText);await updateDoc(doc(db,"moves",moveId),{videoUrl:res.secure_url});moves=moves.map(m=>m.id===moveId?{...m,videoUrl:res.secure_url}:m);showToast("アップロード完了！");window.showDetail(moveId);}
    else{showToast("アップロード失敗");if(bar)bar.style.display="none";}
  };
  xhr.onerror=()=>{showToast("通信エラー");if(bar)bar.style.display="none";};
  xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);xhr.send(fd);
}
window.handleAddVideoSelect=function(e){
  const f=e.target.files[0];if(!f)return;
  const p=document.getElementById("add-video-preview");p.src=URL.createObjectURL(f);p.style.display="block";window._pendingVideoFile=f;
}
const addDz=document.getElementById("add-drop-zone");
addDz.addEventListener("dragover",e=>{e.preventDefault();addDz.classList.add("dragover");});
addDz.addEventListener("dragleave",()=>addDz.classList.remove("dragover"));
addDz.addEventListener("drop",e=>{e.preventDefault();e.stopPropagation();addDz.classList.remove("dragover");const f=e.dataTransfer?.files?.[0];if(f&&f.type.startsWith("video/")){const p=document.getElementById("add-video-preview");p.src=URL.createObjectURL(f);p.style.display="block";window._pendingVideoFile=f;}});
window.addToSet=function(id){const m=moves.find(x=>x.id===id);if(!m)return;setMoves.push(m);renderSetArea();showToast(`${m.name}を追加`);}
window.addToSetFromDetail=function(id){window.addToSet(id);window.closeDetail();switchTab("set",document.querySelectorAll(".tab")[1]);}
window.removeFromSet=i=>{setMoves.splice(i,1);renderSetArea();}
window.saveSet=async function(){
  const name=document.getElementById("set-name").value||"セット"+(sets.length+1);
  if(!setMoves.length){showToast("技を追加してください");return;}
  const d=window[`_td_set-tag-editor-create`];const tags=d?d.tags:[];
  await addDoc(collection(db,"sets"),{name,moves:setMoves.map(m=>({id:m.id,name:m.name,count:m.count||null})),tags,createdAt:Date.now()});
  setMoves=[];newSetTags=[];document.getElementById("set-name").value="";renderSetArea();
  renderTagEditor("set-tag-editor-create",[],tags=>{newSetTags=tags;});
  showToast("セットを保存しました！");await loadSets();switchTab("saved",document.querySelectorAll(".tab")[2]);
}
window.deleteSet=async function(id){
  if(!confirm("このセットを削除しますか？"))return;
  await deleteDoc(doc(db,"sets",id));sets=sets.filter(f=>f.id!==id);renderSaved();showToast("削除しました");
}
window.openAddMove=()=>{
  window._pendingVideoFile=null;newMoveTags=[];
  document.getElementById("add-video-preview").style.display="none";
  document.getElementById("add-video-preview").src="";
  document.getElementById("add-move-screen").classList.add("open");
  renderTagEditor("new-tag-editor",[],tags=>{newMoveTags=tags;});
}
window.closeAddMove=()=>document.getElementById("add-move-screen").classList.remove("open");
window.selectType=function(el){document.querySelectorAll("#type-select .type-opt").forEach(e=>e.classList.remove("active"));el.classList.add("active");selectedType=el.dataset.type;}
window.submitMove=async function(){
  const name=document.getElementById("new-name").value.trim();if(!name){showToast("技名を入力してください");return;}
  const desc=document.getElementById("new-desc").value.trim();
  const count=document.getElementById("new-count").value.trim();
  let videoUrl="";
  if(window._pendingVideoFile){showToast("動画アップロード中...");videoUrl=await uploadVideoForNew(window._pendingVideoFile);}
  await addDoc(collection(db,"moves"),{name,type:selectedType,desc,count:count||null,tags:newMoveTags,videoUrl,createdAt:Date.now()});
  ["new-name","new-desc","new-count"].forEach(id=>document.getElementById(id).value="");
  window._pendingVideoFile=null;newMoveTags=[];
  document.getElementById("add-video-preview").style.display="none";
  window.closeAddMove();showToast("技を追加しました！");await loadMoves();
}
function uploadVideoForNew(file){
  return new Promise(resolve=>{
    const bar=document.getElementById("add-upload-progress"),fill=document.getElementById("add-upload-fill");bar.style.display="block";
    const fd=new FormData();fd.append("file",file);fd.append("upload_preset",UPLOAD_PRESET);
    const xhr=new XMLHttpRequest();
    xhr.upload.onprogress=e=>{if(e.lengthComputable)fill.style.width=(e.loaded/e.total*100)+"%";};
    xhr.onload=function(){bar.style.display="none";if(xhr.status===200){const res=JSON.parse(xhr.responseText);resolve(res.secure_url);}else{showToast("動画アップロード失敗");resolve("");}};
    xhr.onerror=()=>{bar.style.display="none";resolve("");};
    xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);xhr.send(fd);
  });
}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}
window.switchTab=function(name,el){
  stopPreview();
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));el.classList.add("active");
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById("sec-"+name).classList.add("active");
  document.getElementById("fab").style.display=name==="moves"?"flex":"none";
  if(name==="beats")renderBeatList();
}
function closeDetail(){document.getElementById("detail-screen").classList.remove("open");}

renderTagEditor("set-tag-editor-create",[],tags=>{newSetTags=tags;});
loadMoves();loadSets();loadCustomTags();
</script>
</body>
</html>
