<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BreakinSetBuilder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh}
.app{max-width:600px;margin:0 auto;padding:0 24px 80px}
.header{padding:20px 0 12px;border-bottom:1px solid #222}
.header h1{font-size:20px;font-weight:700;letter-spacing:0.5px;color:#fff}
.header p{font-size:12px;color:#666;margin-top:2px}
.tabs{display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:#111;border-top:1px solid #222;z-index:100}
.tab{flex:1;padding:12px 8px 16px;font-size:11px;border:none;background:transparent;color:#666;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color 0.15s}
.tab.active{color:#fff}
.tab-icon{font-size:20px}
.section{padding:12px 0;display:none}
.section.active{display:block}
.search-box{width:100%;padding:10px 14px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px;margin-bottom:12px}
.search-box::placeholder{color:#555}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;padding-bottom:4px}
.tag-chip{padding:5px 12px;border-radius:20px;border:1px solid #333;background:#1a1a1a;color:#888;font-size:12px;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.tag-chip.active{background:#fff;color:#000;border-color:#fff}
.move-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s}
.move-card:hover{border-color:#444}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.card-name{font-size:15px;font-weight:600;color:#fff}
.type-badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.type-foot{background:#0d3320;color:#4ade80}
.type-freeze{background:#0d1f3c;color:#60a5fa}
.type-power{background:#3c1a0d;color:#fb923c}
.type-combo{background:#2a0d3c;color:#c084fc}
.card-desc{font-size:12px;color:#888;line-height:1.5;margin-bottom:8px}
.card-tags{display:flex;gap:5px;flex-wrap:wrap}
.mini-tag{font-size:10px;padding:2px 8px;border-radius:20px;background:#222;color:#666;border:1px solid #333}
.detail-screen{position:fixed;inset:0;background:#0f0f0f;z-index:200;overflow-y:auto;transform:translateX(100%);transition:transform 0.25s ease}
.detail-screen.open{transform:translateX(0)}
.edit-screen{position:fixed;inset:0;background:#0f0f0f;z-index:250;overflow-y:auto;transform:translateX(100%);transition:transform 0.25s ease}
.edit-screen.open{transform:translateX(0)}
.detail-header{display:flex;align-items:center;gap:12px;padding:16px 24px;border-bottom:1px solid #222;position:sticky;top:0;background:#0f0f0f;z-index:10}
.back-btn{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:8px 14px;color:#fff;font-size:13px;cursor:pointer}
.edit-btn{background:#1a1a1a;border:1px solid #555;border-radius:10px;padding:8px 14px;color:#aaa;font-size:13px;cursor:pointer;margin-left:auto}
.detail-name{font-size:18px;font-weight:700;color:#fff}
.detail-body{padding:16px 24px;max-width:600px;margin:0 auto}
.detail-section-title{font-size:11px;font-weight:600;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;margin-top:16px}
.detail-desc-box{background:#1a1a1a;border-radius:12px;padding:14px;font-size:14px;color:#ccc;line-height:1.7}
.drop-zone{border:2px dashed #333;border-radius:14px;padding:20px;text-align:center;color:#555;font-size:13px;transition:all 0.2s;margin-bottom:6px}
.drop-zone.dragover{border-color:#fff;color:#fff;background:#1a1a1a}
.drop-zone input[type=file]{display:none}
.upload-btn{width:100%;padding:10px;background:#1a1a1a;border:1px solid #444;border-radius:12px;color:#aaa;font-size:13px;cursor:pointer;margin-bottom:6px;transition:all 0.15s}
.upload-btn:hover{border-color:#fff;color:#fff}
.video-wrapper{position:relative;width:100%;padding-top:56.25%;margin-bottom:10px;border-radius:12px;overflow:hidden;background:#111}
.video-wrapper video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;background:#000}
.delete-video-btn{width:100%;padding:9px;background:transparent;color:#ff4444;border:1px solid #ff4444;border-radius:12px;font-size:13px;font-weight:600;margin-bottom:8px;cursor:pointer}
.progress-bar{width:100%;height:4px;background:#222;border-radius:2px;margin-bottom:10px;overflow:hidden;display:none}
.progress-fill{height:100%;background:#fff;border-radius:2px;transition:width 0.3s}
.add-to-flow-btn{width:100%;padding:12px;background:#1a1a1a;border:1px solid #444;border-radius:12px;color:#fff;font-size:14px;font-weight:600;margin-top:16px;cursor:pointer}
.delete-move-btn{width:100%;padding:10px;background:transparent;color:#ff4444;border:1px solid #ff4444;border-radius:12px;font-size:13px;font-weight:600;margin-top:8px;cursor:pointer}
.flow-builder{padding:16px 0}
.flow-name-input{width:100%;padding:12px 14px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px;margin-bottom:14px}
.flow-name-input::placeholder{color:#555}
.flow-area{min-height:100px;border:1px dashed #333;border-radius:14px;padding:12px;margin-bottom:14px}
.flow-empty{text-align:center;color:#555;font-size:13px;padding:24px 0}
.flow-node{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.flow-pill{background:#1a1a1a;border:1px solid #333;border-radius:20px;padding:6px 14px;font-size:13px;color:#fff;display:flex;align-items:center;gap:8px;flex:1}
.flow-pill-remove{color:#555;cursor:pointer;font-size:16px;margin-left:auto}
.flow-arrow{color:#444;font-size:18px}
.count-badge{font-size:10px;padding:2px 7px;background:#333;border-radius:20px;color:#aaa}
.save-flow-btn{width:100%;padding:12px;background:#fff;color:#000;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:14px}
.pick-title{font-size:13px;font-weight:600;color:#888;margin-bottom:10px}
.pick-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:10px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border-color 0.15s}
.pick-card:hover{border-color:#555}
.pick-card-name{font-size:14px;color:#fff}
.pick-plus{font-size:20px;color:#555}
.saved-flow-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;padding:14px;margin-bottom:10px}
.saved-flow-name{font-size:15px;font-weight:600;color:#fff;margin-bottom:8px}
.saved-flow-seq{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.seq-pill{font-size:11px;padding:3px 10px;background:#222;border:1px solid #333;border-radius:20px;color:#aaa}
.seq-arrow{color:#444;font-size:12px}
.delete-flow-btn{font-size:11px;color:#555;background:none;border:none;cursor:pointer;padding:0}
.add-move-screen{position:fixed;inset:0;background:#0f0f0f;z-index:300;overflow-y:auto;transform:translateY(100%);transition:transform 0.25s ease}
.add-move-screen.open{transform:translateY(0)}
.add-move-body{padding:16px 24px;max-width:600px;margin:0 auto}
.fab{position:fixed;bottom:80px;right:calc(50% - 280px);width:52px;height:52px;border-radius:50%;background:#fff;color:#000;font-size:26px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:99;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
@media(max-width:648px){.fab{right:20px}}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:#888;margin-bottom:6px;display:block}
.form-input{width:100%;padding:10px 14px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px}
.form-input::placeholder{color:#555}
.form-textarea{width:100%;padding:10px 14px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px;min-height:100px;resize:vertical;line-height:1.6}
.form-textarea::placeholder{color:#555}
.type-select{display:flex;gap:8px;flex-wrap:wrap}
.type-opt{padding:7px 14px;border-radius:20px;border:1px solid #333;background:#1a1a1a;color:#888;font-size:13px;cursor:pointer;transition:all 0.15s}
.type-opt.active{border-color:#fff;color:#fff}
.submit-btn{width:100%;padding:14px;background:#fff;color:#000;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.empty-state{text-align:center;padding:60px 20px;color:#555}
.empty-state p{font-size:14px;margin-top:8px}
.loading{text-align:center;padding:40px;color:#555;font-size:13px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.tab-manage{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.tab-manage input{flex:1;padding:8px 12px;background:#1a1a1a;border:1px solid #333;border-radius:10px;color:#fff;font-size:13px}
.tab-manage input::placeholder{color:#555}
.tab-manage button{padding:8px 14px;background:#fff;color:#000;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
.count-input{width:100%;padding:10px 14px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px}
.count-input::placeholder{color:#555}
.add-drop-zone{border:2px dashed #333;border-radius:14px;padding:20px;text-align:center;color:#555;font-size:13px;transition:all 0.2s;margin-bottom:6px}
.add-drop-zone.dragover{border-color:#fff;color:#fff;background:#1a1a1a}
.add-drop-zone input[type=file]{display:none}
.add-video-preview{width:100%;border-radius:12px;margin-top:10px;max-height:180px;object-fit:contain;background:#000;display:none}
.upload-progress{width:100%;height:4px;background:#222;border-radius:2px;margin-top:8px;overflow:hidden;display:none}
.upload-progress-fill{height:100%;background:#fff;border-radius:2px;transition:width 0.3s}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>BreakinSetBuilder</h1>
    <p>技を管理してフローを組み立てる</p>
  </div>
  <div id="sec-moves" class="section active">
    <input class="search-box" type="text" placeholder="技を検索..." oninput="filterMoves(this.value)" id="search-input">
    <div class="tag-row" id="tag-row"></div>
    <div id="moves-list"></div>
  </div>
  <div id="sec-flow" class="section">
    <div class="flow-builder">
      <input class="flow-name-input" type="text" placeholder="フロー名（例：バトル用コンボA）" id="flow-name">
      <div class="flow-area" id="flow-area"><div class="flow-empty">下から技を選んで追加</div></div>
      <button class="save-flow-btn" onclick="saveFlow()">フローを保存</button>
      <div class="pick-title">技を選ぶ</div>
      <div id="pick-list"></div>
    </div>
  </div>
  <div id="sec-saved" class="section">
    <div style="padding:12px 0" id="saved-list"></div>
  </div>
  <div id="sec-tags" class="section">
    <div class="tab-manage">
      <input type="text" placeholder="新しいタグ名..." id="new-tag-input">
      <button onclick="addCustomTag()">追加</button>
    </div>
    <div id="custom-tag-list"></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('moves',this)"><span class="tab-icon">🃏</span>技カード</button>
  <button class="tab" onclick="switchTab('flow',this)"><span class="tab-icon">⚡</span>フロー</button>
  <button class="tab" onclick="switchTab('saved',this)"><span class="tab-icon">📋</span>保存済み</button>
  <button class="tab" onclick="switchTab('tags',this)"><span class="tab-icon">🏷️</span>タグ管理</button>
</div>

<button class="fab" onclick="openAddMove()" id="fab">+</button>

<div class="detail-screen" id="detail-screen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">← 戻る</button>
    <span class="detail-name" id="detail-name"></span>
    <button class="edit-btn" id="detail-edit-btn" onclick="">✏️ 編集</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<div class="edit-screen" id="edit-screen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeEdit()">← 戻る</button>
    <span class="detail-name">技を編集</span>
  </div>
  <div class="add-move-body" id="edit-body"></div>
</div>

<div class="add-move-screen" id="add-move-screen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeAddMove()">← 戻る</button>
    <span class="detail-name">新しい技を追加</span>
  </div>
  <div class="add-move-body">
    <div class="form-group">
      <label class="form-label">技名</label>
      <input class="form-input" type="text" id="new-name" placeholder="例：ゴブレット">
    </div>
    <div class="form-group">
      <label class="form-label">種類</label>
      <div class="type-select" id="type-select">
        <span class="type-opt active" data-type="foot" onclick="selectType(this)">フットワーク</span>
        <span class="type-opt" data-type="freeze" onclick="selectType(this)">フリーズ</span>
        <span class="type-opt" data-type="power" onclick="selectType(this)">パワー</span>
        <span class="type-opt" data-type="combo" onclick="selectType(this)">コンボ</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">説明・動き方のメモ</label>
      <textarea class="form-textarea" id="new-desc" placeholder="動きの流れを書いておこう"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">カウント数</label>
      <input class="count-input" type="number" id="new-count" placeholder="例：8">
    </div>
    <div class="form-group">
      <label class="form-label">タグ（カンマ区切り）</label>
      <input class="form-input" type="text" id="new-tags" placeholder="例：初級,フットワーク,CC系">
    </div>
    <div class="form-group">
      <label class="form-label">動画（任意）</label>
      <div class="add-drop-zone" id="add-drop-zone">
        <input type="file" id="add-file-input" accept="video/*,.mp4,.mov,.avi,.webm,.mkv" onchange="handleAddVideoSelect(event)">
        📹 ここにドラッグ＆ドロップ<br>
        <span style="font-size:11px;margin-top:4px;display:block">mp4, mov, avi, webm など対応</span>
      </div>
      <button class="upload-btn" onclick="document.getElementById('add-file-input').click()">📁 ファイルを選択して追加</button>
      <div class="upload-progress" id="add-upload-progress"><div class="upload-progress-fill" id="add-upload-fill" style="width:0%"></div></div>
      <video class="add-video-preview" id="add-video-preview" muted playsinline controls></video>
    </div>
    <button class="submit-btn" onclick="submitMove()">追加する</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const CLOUD_NAME="dnbbwfwoi";
const UPLOAD_PRESET="breakin_unsigned";

const firebaseConfig={
  apiKey:"AIzaSyBao1NCQQRw596Y0ueG4q9gpNjMA_ApLBE",
  authDomain:"breakinsetbuilder.firebaseapp.com",
  projectId:"breakinsetbuilder",
  storageBucket:"breakinsetbuilder.firebasestorage.app",
  messagingSenderId:"544530127587",
  appId:"1:544530127587:web:2c44993150211c892d03d6"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const typeLabel={foot:"フットワーク",freeze:"フリーズ",power:"パワー",combo:"コンボ"};
const typeClass={foot:"type-foot",freeze:"type-freeze",power:"type-power",combo:"type-combo"};

let moves=[],flows=[],flowMoves=[],customTags=[];
let activeTag="全て",searchQ="",selectedType="foot",editType="foot";

async function loadMoves(){
  document.getElementById("moves-list").innerHTML='<div class="loading">読み込み中...</div>';
  const q=query(collection(db,"moves"),orderBy("createdAt","desc"));
  const snap=await getDocs(q);
  moves=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderTagRow();renderMoves();renderPickList();
}

async function loadFlows(){
  const q=query(collection(db,"flows"),orderBy("createdAt","desc"));
  const snap=await getDocs(q);
  flows=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderSaved();
}

async function loadCustomTags(){
  const snap=await getDocs(collection(db,"customTags"));
  customTags=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderCustomTagList();
  renderTagRow();
}

function allTags(){
  const s=new Set(["全て"]);
  moves.forEach(m=>(m.tags||[]).forEach(t=>s.add(t)));
  customTags.forEach(t=>s.add(t.name));
  return [...s];
}

function renderTagRow(){
  document.getElementById("tag-row").innerHTML=allTags().map(t=>`<span class="tag-chip${t===activeTag?" active":""}" onclick="window.setTag('${t}')">${t}</span>`).join("");
}

function filteredMoves(){
  return moves.filter(m=>{
    const q=searchQ.toLowerCase();
    const matchQ=!q||m.name.toLowerCase().includes(q)||(m.desc||"").toLowerCase().includes(q)||(m.tags||[]).some(t=>t.toLowerCase().includes(q));
    const matchT=activeTag==="全て"||(m.tags||[]).includes(activeTag);
    return matchQ&&matchT;
  });
}

function renderMoves(){
  const list=filteredMoves();
  const el=document.getElementById("moves-list");
  if(list.length===0){el.innerHTML='<div class="empty-state"><div style="font-size:40px">🕺</div><p>技がまだありません<br>＋ボタンで追加しよう</p></div>';return;}
  el.innerHTML=list.map(m=>`
    <div class="move-card" onclick="window.showDetail('${m.id}')">
      <div class="card-head">
        <span class="card-name">${m.name}</span>
        <span class="type-badge ${typeClass[m.type]||'type-foot'}">${typeLabel[m.type]||m.type}</span>
      </div>
      ${m.count?`<div style="font-size:11px;color:#666;margin-bottom:6px">カウント：${m.count}</div>`:""}
      <div class="card-desc">${(m.desc||"").length>70?m.desc.slice(0,70)+"…":m.desc||""}</div>
      <div class="card-tags">${(m.tags||[]).map(t=>`<span class="mini-tag">${t}</span>`).join("")}</div>
    </div>`).join("");
}

function renderPickList(){
  document.getElementById("pick-list").innerHTML=moves.map(m=>`
    <div class="pick-card" onclick="window.addToFlow('${m.id}')">
      <span class="pick-card-name">${m.name}${m.count?` <span class="count-badge">${m.count}カウント</span>`:""}</span>
      <span class="pick-plus">＋</span>
    </div>`).join("");
}

function renderFlowArea(){
  const el=document.getElementById("flow-area");
  if(flowMoves.length===0){el.innerHTML='<div class="flow-empty">下から技を選んで追加</div>';return;}
  el.innerHTML=flowMoves.map((m,i)=>`
    <div class="flow-node">
      ${i>0?'<span class="flow-arrow">↓</span>':"<span style='width:18px'></span>"}
      <div class="flow-pill">
        <span>${m.name}</span>
        ${m.count?`<span class="count-badge">${m.count}ct</span>`:""}
        <span class="flow-pill-remove" onclick="window.removeFromFlow(${i})">×</span>
      </div>
    </div>`).join("");
}

function renderSaved(){
  const el=document.getElementById("saved-list");
  if(flows.length===0){el.innerHTML='<div class="empty-state"><div style="font-size:40px">📋</div><p>保存済みフローがありません</p></div>';return;}
  el.innerHTML=flows.map(f=>`
    <div class="saved-flow-card">
      <div class="saved-flow-name">${f.name}</div>
      <div class="saved-flow-seq">${(f.moves||[]).map((m,i)=>`${i>0?'<span class="seq-arrow">→</span>':''}<span class="seq-pill">${m.name}</span>`).join("")}</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:11px;color:#555">${(f.moves||[]).length}技構成</span>
        <button class="delete-flow-btn" onclick="event.stopPropagation();window.deleteFlow('${f.id}')">削除</button>
      </div>
    </div>`).join("");
}

function renderCustomTagList(){
  const el=document.getElementById("custom-tag-list");
  const moveTags=new Set();
  moves.forEach(m=>(m.tags||[]).forEach(t=>moveTags.add(t)));
  const allTagItems=[...moveTags].map(t=>({name:t,builtin:true})).concat(customTags.map(t=>({...t,builtin:false})));
  if(allTagItems.length===0){el.innerHTML='<div style="color:#555;font-size:13px;padding:20px 0">タグはまだありません</div>';return;}
  el.innerHTML=allTagItems.map(t=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;margin-bottom:8px">
      <div>
        <span style="font-size:14px;color:#fff">${t.name}</span>
        ${t.builtin?'<span style="font-size:10px;color:#555;margin-left:8px">技から自動取得</span>':'<span style="font-size:10px;color:#555;margin-left:8px">カスタム</span>'}
      </div>
      ${!t.builtin?`<button onclick="window.deleteCustomTag('${t.id}')" style="background:none;border:1px solid #ff4444;border-radius:8px;color:#ff4444;cursor:pointer;font-size:12px;padding:4px 10px">削除</button>`:'<span style="font-size:11px;color:#333">技から削除</span>'}
    </div>`).join("");
}

window.setTag=t=>{activeTag=t;renderTagRow();renderMoves();}
window.filterMoves=q=>{searchQ=q;renderMoves();}

window.showDetail=function(id){
  const m=moves.find(x=>x.id===id);
  if(!m)return;
  document.getElementById("detail-name").textContent=m.name;
  document.getElementById("detail-edit-btn").onclick=()=>window.openEdit(id);
  document.getElementById("detail-body").innerHTML=`
    <span class="type-badge ${typeClass[m.type]||'type-foot'}" style="display:inline-block;margin-bottom:12px">${typeLabel[m.type]||m.type}</span>
    ${m.count?`<div style="font-size:13px;color:#888;margin-bottom:12px">カウント数：<span style="color:#fff;font-weight:600">${m.count}</span></div>`:""}
    <div class="detail-section-title">動きの説明</div>
    <div class="detail-desc-box">${m.desc||"説明なし"}</div>
    <div class="detail-section-title">動画</div>
    ${m.videoUrl?`
      <div class="video-wrapper">
        <video src="${m.videoUrl}" controls playsinline muted></video>
      </div>
      <button class="delete-video-btn" onclick="window.deleteVideo('${id}')">🗑 動画を削除</button>
    `:""}
    <div class="drop-zone" id="drop-zone-${id}">
      <input type="file" id="file-input-${id}" accept="video/*,.mp4,.mov,.avi,.webm,.mkv" onchange="window.handleVideoUpload(event,'${id}')">
      📹 ここにドラッグ＆ドロップ<br>
      <span style="font-size:11px;margin-top:4px;display:block">${m.videoUrl?"動画を差し替え":"動画をアップロード"}</span>
    </div>
    <button class="upload-btn" onclick="document.getElementById('file-input-${id}').click()">📁 ファイルを選択してアップロード</button>
    <div class="progress-bar" id="progress-bar-${id}"><div class="progress-fill" id="progress-fill-${id}" style="width:0%"></div></div>
    <div class="detail-section-title">タグ</div>
    <div class="card-tags" style="margin-bottom:8px">${(m.tags||[]).map(t=>`<span class="mini-tag">${t}</span>`).join("")}</div>
    <button class="add-to-flow-btn" onclick="window.addToFlowFromDetail('${id}')">⚡ フローに追加</button>
    <button class="delete-move-btn" onclick="window.deleteMove('${id}')">🗑 この技を削除</button>
  `;
  const dz=document.getElementById(`drop-zone-${id}`);
  dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("dragover");});
  dz.addEventListener("dragleave",()=>dz.classList.remove("dragover"));
  dz.addEventListener("drop",e=>{e.preventDefault();e.stopPropagation();dz.classList.remove("dragover");const files=e.dataTransfer.files;if(files&&files.length>0)window.uploadToCloudinary(files[0],id);});
  document.getElementById("detail-screen").classList.add("open");
}

window.openEdit=function(id){
  const m=moves.find(x=>x.id===id);
  if(!m)return;
  editType=m.type||"foot";
  document.getElementById("edit-body").innerHTML=`
    <div class="form-group">
      <label class="form-label">技名</label>
      <input class="form-input" type="text" id="edit-name" value="${m.name||''}">
    </div>
    <div class="form-group">
      <label class="form-label">種類</label>
      <div class="type-select" id="edit-type-select">
        <span class="type-opt${editType==='foot'?' active':''}" data-type="foot" onclick="selectEditType(this)">フットワーク</span>
        <span class="type-opt${editType==='freeze'?' active':''}" data-type="freeze" onclick="selectEditType(this)">フリーズ</span>
        <span class="type-opt${editType==='power'?' active':''}" data-type="power" onclick="selectEditType(this)">パワー</span>
        <span class="type-opt${editType==='combo'?' active':''}" data-type="combo" onclick="selectEditType(this)">コンボ</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">説明・動き方のメモ</label>
      <textarea class="form-textarea" id="edit-desc">${m.desc||''}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label">カウント数</label>
      <input class="count-input" type="number" id="edit-count" value="${m.count||''}">
    </div>
    <div class="form-group">
      <label class="form-label">タグ（カンマ区切り）</label>
      <input class="form-input" type="text" id="edit-tags" value="${(m.tags||[]).join(',')}">
    </div>
    <button class="submit-btn" onclick="window.submitEdit('${id}')">保存する</button>
  `;
  document.getElementById("edit-screen").classList.add("open");
}

window.selectEditType=function(el){
  document.querySelectorAll("#edit-type-select .type-opt").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
  editType=el.dataset.type;
}

window.submitEdit=async function(id){
  const name=document.getElementById("edit-name").value.trim();
  if(!name){showToast("技名を入力してください");return;}
  const desc=document.getElementById("edit-desc").value.trim();
  const count=document.getElementById("edit-count").value.trim();
  const tags=document.getElementById("edit-tags").value.split(",").map(t=>t.trim()).filter(Boolean);
  await updateDoc(doc(db,"moves",id),{name,type:editType,desc,count:count||null,tags});
  moves=moves.map(m=>m.id===id?{...m,name,type:editType,desc,count:count||null,tags}:m);
  showToast("保存しました！");
  closeEdit();
  window.showDetail(id);
  renderMoves();
  renderPickList();
}

window.closeEdit=()=>document.getElementById("edit-screen").classList.remove("open");

window.deleteMove=async function(id){
  if(!confirm("この技を削除しますか？\nこの操作は元に戻せません。"))return;
  await deleteDoc(doc(db,"moves",id));
  moves=moves.filter(m=>m.id!==id);
  renderMoves();
  renderPickList();
  renderTagRow();
  closeDetail();
  showToast("技を削除しました");
}

window.deleteVideo=async function(id){
  if(!confirm("この動画を削除しますか？\nこの操作は元に戻せません。"))return;
  await updateDoc(doc(db,"moves",id),{videoUrl:""});
  moves=moves.map(m=>m.id===id?{...m,videoUrl:""}:m);
  showToast("動画を削除しました");
  window.showDetail(id);
}

window.closeDetail=()=>document.getElementById("detail-screen").classList.remove("open");

window.handleVideoUpload=function(e,id){
  const f=e.target.files[0];
  if(f)window.uploadToCloudinary(f,id);
}

window.uploadToCloudinary=async function(file,moveId){
  const bar=document.getElementById(`progress-bar-${moveId}`);
  const fill=document.getElementById(`progress-fill-${moveId}`);
  if(bar)bar.style.display="block";
  const fd=new FormData();
  fd.append("file",file);
  fd.append("upload_preset",UPLOAD_PRESET);
  const xhr=new XMLHttpRequest();
  xhr.upload.onprogress=e=>{if(e.lengthComputable&&fill)fill.style.width=(e.loaded/e.total*100)+"%";};
  xhr.onload=async function(){
    if(xhr.status===200){
      const res=JSON.parse(xhr.responseText);
      await updateDoc(doc(db,"moves",moveId),{videoUrl:res.secure_url});
      moves=moves.map(m=>m.id===moveId?{...m,videoUrl:res.secure_url}:m);
      showToast("動画をアップロードしました！");
      window.showDetail(moveId);
    } else {
      showToast("アップロード失敗。設定を確認してください");
      if(bar)bar.style.display="none";
    }
  };
  xhr.onerror=()=>{showToast("通信エラーが発生しました");if(bar)bar.style.display="none";};
  xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);
  xhr.send(fd);
}

window.handleAddVideoSelect=function(e){
  const f=e.target.files[0];
  if(!f)return;
  const preview=document.getElementById("add-video-preview");
  preview.src=URL.createObjectURL(f);
  preview.style.display="block";
  window._pendingVideoFile=f;
}

const addDz=document.getElementById("add-drop-zone");
addDz.addEventListener("dragover",e=>{e.preventDefault();addDz.classList.add("dragover");});
addDz.addEventListener("dragleave",()=>addDz.classList.remove("dragover"));
addDz.addEventListener("drop",e=>{
  e.preventDefault();e.stopPropagation();addDz.classList.remove("dragover");
  const f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];
  if(f&&f.type.startsWith("video/")){
    const preview=document.getElementById("add-video-preview");
    preview.src=URL.createObjectURL(f);
    preview.style.display="block";
    window._pendingVideoFile=f;
  }
});

window.addToFlow=function(id){
  const m=moves.find(x=>x.id===id);
  if(!m)return;
  flowMoves.push(m);
  renderFlowArea();
  showToast(`${m.name}を追加`);
}

window.addToFlowFromDetail=function(id){
  window.addToFlow(id);
  window.closeDetail();
  switchTab("flow",document.querySelectorAll(".tab")[1]);
}

window.removeFromFlow=i=>{flowMoves.splice(i,1);renderFlowArea();}

window.saveFlow=async function(){
  const name=document.getElementById("flow-name").value||"フロー"+(flows.length+1);
  if(flowMoves.length===0){showToast("技を追加してください");return;}
  await addDoc(collection(db,"flows"),{name,moves:flowMoves.map(m=>({id:m.id,name:m.name,count:m.count||null})),createdAt:Date.now()});
  flowMoves=[];
  document.getElementById("flow-name").value="";
  renderFlowArea();
  showToast("フローを保存しました！");
  await loadFlows();
  switchTab("saved",document.querySelectorAll(".tab")[2]);
}

window.deleteFlow=async function(id){
  if(!confirm("このフローを削除しますか？\nこの操作は元に戻せません。"))return;
  await deleteDoc(doc(db,"flows",id));
  flows=flows.filter(f=>f.id!==id);
  renderSaved();
  showToast("削除しました");
}

window.openAddMove=()=>{
  window._pendingVideoFile=null;
  document.getElementById("add-video-preview").style.display="none";
  document.getElementById("add-video-preview").src="";
  document.getElementById("add-move-screen").classList.add("open");
}
window.closeAddMove=()=>document.getElementById("add-move-screen").classList.remove("open");

window.selectType=function(el){
  document.querySelectorAll("#type-select .type-opt").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
  selectedType=el.dataset.type;
}

window.submitMove=async function(){
  const name=document.getElementById("new-name").value.trim();
  if(!name){showToast("技名を入力してください");return;}
  const desc=document.getElementById("new-desc").value.trim();
  const count=document.getElementById("new-count").value.trim();
  const tags=document.getElementById("new-tags").value.split(",").map(t=>t.trim()).filter(Boolean);
  let videoUrl="";
  if(window._pendingVideoFile){
    showToast("動画をアップロード中...");
    videoUrl=await uploadVideoForNew(window._pendingVideoFile);
  }
  await addDoc(collection(db,"moves"),{name,type:selectedType,desc,count:count||null,tags,videoUrl,createdAt:Date.now()});
  ["new-name","new-desc","new-count","new-tags"].forEach(id=>document.getElementById(id).value="");
  window._pendingVideoFile=null;
  document.getElementById("add-video-preview").style.display="none";
  window.closeAddMove();
  showToast("技を追加しました！");
  await loadMoves();
}

function uploadVideoForNew(file){
  return new Promise((resolve)=>{
    const bar=document.getElementById("add-upload-progress");
    const fill=document.getElementById("add-upload-fill");
    bar.style.display="block";
    const fd=new FormData();
    fd.append("file",file);
    fd.append("upload_preset",UPLOAD_PRESET);
    const xhr=new XMLHttpRequest();
    xhr.upload.onprogress=e=>{if(e.lengthComputable)fill.style.width=(e.loaded/e.total*100)+"%";};
    xhr.onload=function(){
      bar.style.display="none";
      if(xhr.status===200){const res=JSON.parse(xhr.responseText);resolve(res.secure_url);}
      else{showToast("動画アップロード失敗");resolve("");}
    };
    xhr.onerror=()=>{bar.style.display="none";resolve("");};
    xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);
    xhr.send(fd);
  });
}

window.addCustomTag=async function(){
  const input=document.getElementById("new-tag-input");
  const name=input.value.trim();
  if(!name){showToast("タグ名を入力してください");return;}
  await addDoc(collection(db,"customTags"),{name,createdAt:Date.now()});
  input.value="";
  showToast(`「${name}」を追加しました`);
  await loadCustomTags();
  renderTagRow();
}

window.deleteCustomTag=async function(id){
  if(!confirm("このタグを削除しますか？"))return;
  await deleteDoc(doc(db,"customTags",id));
  customTags=customTags.filter(t=>t.id!==id);
  renderCustomTagList();
  renderTagRow();
  showToast("タグを削除しました");
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

window.switchTab=function(name,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById("sec-"+name).classList.add("active");
  document.getElementById("fab").style.display=name==="moves"?"flex":"none";
}

loadMoves();loadFlows();loadCustomTags();
</script>
</body>
</html>
