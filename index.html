<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BreakinSetBuilder</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230f0f0f'/><circle cx='16' cy='8' r='3' fill='%23fff'/><line x1='16' y1='11' x2='16' y2='20' stroke='%23fff' stroke-width='2'/><line x1='16' y1='15' x2='11' y2='12' stroke='%23fff' stroke-width='2'/><line x1='16' y1='15' x2='21' y2='12' stroke='%23fff' stroke-width='2'/><line x1='16' y1='20' x2='12' y2='26' stroke='%23fff' stroke-width='2'/><line x1='16' y1='20' x2='20' y2='26' stroke='%23fff' stroke-width='2'/></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh}
.login-screen{position:fixed;inset:0;background:#0f0f0f;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-screen.hidden{display:none}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:40px}
.login-logo h1{font-size:22px;font-weight:700;color:#fff}
.login-box{width:100%;max-width:360px;background:#141414;border:1px solid #1e1e1e;border-radius:20px;padding:28px 24px}
.login-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:6px;text-align:center}
.login-sub{font-size:12px;color:#555;text-align:center;margin-bottom:24px}
.login-field{margin-bottom:14px}
.login-label{font-size:10px;font-weight:700;color:#555;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:6px;display:block}
.login-input{width:100%;padding:12px 14px;background:#0f0f0f;border:1px solid #222;border-radius:12px;color:#fff;font-size:14px}
.login-input:focus{outline:none;border-color:#555}
.login-input::placeholder{color:#444}
.login-btn{width:100%;padding:13px;background:#fff;color:#000;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.login-btn:disabled{opacity:0.5;cursor:not-allowed}
.login-error{font-size:12px;color:#cc4444;text-align:center;margin-top:10px;min-height:18px}
.app{max-width:600px;margin:0 auto;padding:0 20px 80px}
.header{padding:16px 0 12px;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:10px}
.header h1{font-size:18px;font-weight:700;color:#fff}
.header p{font-size:11px;color:#444;margin-top:2px}
.logout-btn{background:#141414;border:1px solid #222;border-radius:10px;padding:6px 12px;color:#555;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all 0.15s}
.logout-btn:hover{color:#aaa;border-color:#555}
.tabs{display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:#0a0a0a;border-top:1px solid #1a1a1a;z-index:100}
.tab{flex:1;padding:9px 4px 13px;font-size:9px;border:none;background:transparent;color:#444;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color 0.15s}
.tab.active{color:#fff}
.tab svg{width:19px;height:19px}
.section{padding:12px 0;display:none}
.section.active{display:block}
/* 技カード（セット作成・編集内）*/
.move-pick-card{background:#141414;border:1px solid #1e1e1e;border-radius:12px;padding:12px 14px;margin-bottom:8px;transition:border-color 0.2s}
.move-pick-card:hover{border-color:#333}
.move-pick-card.expanded{border-color:#444}
.move-pick-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.move-pick-name{font-size:14px;font-weight:600;color:#fff}
.move-pick-right{display:flex;align-items:center;gap:8px}
.move-pick-add{width:28px;height:28px;border-radius:50%;background:#fff;color:#000;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.15s}
.move-pick-add:hover{transform:scale(1.1)}
.move-pick-chevron{font-size:10px;color:#333;transition:transform 0.25s}
.move-pick-chevron.open{transform:rotate(180deg)}
.move-pick-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #1a1a1a}
.move-pick-detail.open{display:block}
.move-pick-desc{font-size:12px;color:#888;line-height:1.6;background:#0a0a0a;border-radius:8px;padding:10px;margin-bottom:8px}
.move-pick-video{width:100%;border-radius:8px;margin-bottom:8px;display:block;max-height:160px;object-fit:contain;background:#000}
/* type badges */
.type-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;flex-shrink:0}
.type-floor{background:#0a2e1a;color:#3dba6a;border:1px solid #1a5a30}
.type-strong{background:#3a1a0a;color:#ff8c3a;border:1px solid #7a3a1a}
.type-toprock{background:#0a1a3a;color:#5a9aff;border:1px solid #1a3a7a}
.mini-tag{font-size:10px;padding:2px 8px;border-radius:20px;background:#1a1a1a;color:#555;border:1px solid #222}
.count-badge{font-size:10px;padding:2px 7px;background:#1e1e1e;border-radius:20px;color:#666}
/* 検索フィルター */
.filter-area{margin-bottom:12px}
.filter-search{width:100%;padding:9px 14px;background:#141414;border:1px solid #222;border-radius:10px;color:#fff;font-size:13px;margin-bottom:8px}
.filter-search::placeholder{color:#444}
.filter-type-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.filter-type-btn{padding:4px 12px;border-radius:20px;border:1px solid #222;background:#141414;color:#666;font-size:11px;cursor:pointer;transition:all 0.15s}
.filter-type-btn.active{border-color:#fff;color:#fff;background:#1e1e1e}
.filter-tag-row{display:flex;gap:6px;flex-wrap:wrap}
.filter-tag-btn{padding:4px 10px;border-radius:20px;border:1px solid #1e1e1e;background:#141414;color:#555;font-size:11px;cursor:pointer;transition:all 0.15s}
.filter-tag-btn.active{background:#fff;color:#000;border-color:#fff}
/* セット一覧 */
.saved-set-card{background:#141414;border:1px solid #1a1a1a;border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s}
.saved-set-card:hover{border-color:#444}
.saved-set-name{font-size:15px;font-weight:600;color:#fff;margin-bottom:6px}
.saved-set-seq{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.seq-pill{font-size:11px;padding:3px 10px;background:#1a1a1a;border:1px solid #1e1e1e;border-radius:20px;color:#666}
.seq-arrow{color:#222;font-size:11px}
.delete-set-btn{font-size:11px;color:#444;background:none;border:none;cursor:pointer;padding:0;transition:color 0.15s}
.delete-set-btn:hover{color:#bb3333}
.play-set-btn{font-size:12px;color:#ddd;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;cursor:pointer;padding:5px 12px;display:flex;align-items:center;gap:5px;transition:all 0.15s}
.play-set-btn:hover{border-color:#fff}
/* セット作成・編集 */
.set-builder{padding:14px 0}
.set-name-input{width:100%;padding:11px 14px;background:#141414;border:1px solid #222;border-radius:12px;color:#fff;font-size:14px;margin-bottom:10px}
.set-name-input::placeholder{color:#444}
.set-area{min-height:60px;border:1px dashed #1e1e1e;border-radius:14px;padding:12px;margin-bottom:10px}
.set-empty{text-align:center;color:#444;font-size:13px;padding:14px 0}
.set-node{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.set-pill{background:#141414;border:1px solid #222;border-radius:20px;padding:6px 14px;font-size:13px;color:#ddd;display:flex;align-items:center;gap:8px;flex:1}
.set-pill-remove{color:#444;cursor:pointer;font-size:16px;margin-left:auto;transition:color 0.15s}
.set-pill-remove:hover{color:#bb3333}
.set-arrow{color:#222;font-size:14px;width:18px;text-align:center}
.eight-badge{font-size:11px;padding:3px 10px;background:#141414;border:1px solid #222;border-radius:20px;color:#666;margin-bottom:10px;display:inline-block}
.save-set-btn{width:100%;padding:12px;background:#fff;color:#000;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:14px}
.section-label{font-size:10px;font-weight:700;color:#444;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;margin-top:4px}
.add-move-inline-btn{width:100%;padding:10px;background:#141414;border:1px solid #222;border-radius:12px;color:#888;font-size:13px;cursor:pointer;margin-bottom:14px;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.add-move-inline-btn:hover{border-color:#fff;color:#fff}
/* 詳細・編集スクリーン */
.detail-screen{position:fixed;inset:0;background:#0f0f0f;z-index:200;overflow-y:auto;transform:translateX(100%);transition:transform 0.25s ease}
.detail-screen.open{transform:translateX(0)}
.edit-screen{position:fixed;inset:0;background:#0f0f0f;z-index:250;overflow-y:auto;transform:translateX(100%);transition:transform 0.25s ease}
.edit-screen.open{transform:translateX(0)}
.set-edit-screen{position:fixed;inset:0;background:#0f0f0f;z-index:250;overflow-y:auto;transform:translateX(100%);transition:transform 0.25s ease}
.set-edit-screen.open{transform:translateX(0)}
.add-move-screen{position:fixed;inset:0;background:#0f0f0f;z-index:300;overflow-y:auto;transform:translateY(100%);transition:transform 0.25s ease}
.add-move-screen.open{transform:translateY(0)}
.detail-header{display:flex;align-items:center;gap:10px;padding:13px 18px;border-bottom:1px solid #1a1a1a;position:sticky;top:0;background:#0f0f0f;z-index:10}
.back-btn{background:#141414;border:1px solid #222;border-radius:10px;padding:7px 12px;color:#ddd;font-size:13px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px}
.edit-btn{background:#141414;border:1px solid #2a2a2a;border-radius:10px;padding:7px 12px;color:#777;font-size:13px;cursor:pointer;margin-left:auto;white-space:nowrap}
.detail-name{font-size:14px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.detail-body{padding:16px 18px;max-width:600px;margin:0 auto}
.detail-section-title{font-size:10px;font-weight:700;color:#444;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;margin-top:16px}
.detail-desc-box{background:#141414;border-radius:12px;padding:14px;font-size:14px;color:#bbb;line-height:1.7;border:1px solid #1e1e1e}
.drop-zone{border:2px dashed #1e1e1e;border-radius:14px;padding:18px;text-align:center;color:#444;font-size:13px;transition:all 0.2s;margin-bottom:6px;cursor:pointer}
.drop-zone.dragover{border-color:#fff;color:#fff;background:#1a1a1a}
.drop-zone input[type=file]{display:none}
.upload-btn{width:100%;padding:10px;background:#141414;border:1px solid #222;border-radius:12px;color:#666;font-size:13px;cursor:pointer;margin-bottom:6px;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.upload-btn:hover{border-color:#fff;color:#fff}
.video-wrapper{position:relative;width:100%;padding-top:56.25%;margin-bottom:10px;border-radius:12px;overflow:hidden;background:#111}
.video-wrapper video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;background:#000}
.delete-video-btn{width:100%;padding:9px;background:transparent;color:#bb3333;border:1px solid #bb3333;border-radius:12px;font-size:13px;font-weight:600;margin-bottom:8px;cursor:pointer}
.progress-bar-upload{width:100%;height:3px;background:#1a1a1a;border-radius:2px;margin-bottom:10px;overflow:hidden;display:none}
.progress-fill-upload{height:100%;background:#fff;border-radius:2px;transition:width 0.3s}
.add-to-set-btn{width:100%;padding:12px;background:#141414;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px;font-weight:600;margin-top:16px;cursor:pointer;transition:all 0.15s}
.add-to-set-btn:hover{border-color:#fff}
.delete-move-btn{width:100%;padding:10px;background:transparent;color:#bb3333;border:1px solid #bb3333;border-radius:12px;font-size:13px;font-weight:600;margin-top:8px;cursor:pointer}
.add-move-body{padding:16px 18px;max-width:600px;margin:0 auto}
.set-edit-body{padding:16px 18px;max-width:600px;margin:0 auto}
.set-edit-section{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #1a1a1a}
.set-edit-section:last-child{border-bottom:none}
.set-edit-title{font-size:10px;font-weight:700;color:#444;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}
.form-group{margin-bottom:14px}
.form-label{font-size:10px;font-weight:700;color:#555;margin-bottom:6px;display:block;letter-spacing:0.8px;text-transform:uppercase}
.form-input{width:100%;padding:10px 14px;background:#141414;border:1px solid #222;border-radius:12px;color:#fff;font-size:14px}
.form-input::placeholder{color:#444}
.form-textarea{width:100%;padding:10px 14px;background:#141414;border:1px solid #222;border-radius:12px;color:#fff;font-size:14px;min-height:100px;resize:vertical;line-height:1.6}
.form-textarea::placeholder{color:#444}
.type-select{display:flex;gap:8px;flex-wrap:wrap}
.type-opt{padding:7px 14px;border-radius:20px;border:1px solid #222;background:#141414;color:#666;font-size:13px;cursor:pointer;transition:all 0.15s}
.type-opt.active{border-color:#fff;color:#fff;background:#1e1e1e}
.submit-btn{width:100%;padding:13px;background:#fff;color:#000;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.count-input{width:100%;padding:10px 14px;background:#141414;border:1px solid #222;border-radius:12px;color:#fff;font-size:14px}
.count-input::placeholder{color:#444}
.add-drop-zone{border:2px dashed #1e1e1e;border-radius:14px;padding:18px;text-align:center;color:#444;font-size:13px;transition:all 0.2s;margin-bottom:6px;cursor:pointer}
.add-drop-zone.dragover{border-color:#fff;color:#fff;background:#1a1a1a}
.add-drop-zone input[type=file]{display:none}
.add-media-preview{width:100%;border-radius:12px;margin-top:10px;max-height:180px;object-fit:contain;background:#000;display:none}
.upload-progress{width:100%;height:3px;background:#1a1a1a;border-radius:2px;margin-top:8px;overflow:hidden;display:none}
.upload-progress-fill{height:100%;background:#fff;border-radius:2px;transition:width 0.3s}
.tag-editor{margin-bottom:4px}
.tag-editor-current{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;min-height:24px}
.tag-editor-tag{font-size:12px;padding:3px 10px;border-radius:20px;background:#1a1a1a;border:1px solid #222;color:#bbb;display:flex;align-items:center;gap:5px}
.tag-editor-tag .tag-x{color:#444;cursor:pointer;font-size:13px;line-height:1;transition:color 0.15s}
.tag-editor-tag .tag-x:hover{color:#bb3333}
.tag-candidates{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tag-candidate{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid #1e1e1e;background:#141414;color:#666;cursor:pointer;transition:all 0.15s}
.tag-candidate:hover{border-color:#fff;color:#fff}
.tag-input-row{display:flex;gap:8px}
.tag-input-row input{flex:1;padding:8px 12px;background:#141414;border:1px solid #222;border-radius:10px;color:#fff;font-size:13px}
.tag-input-row input::placeholder{color:#444}
.tag-input-row button{padding:8px 14px;background:#fff;color:#000;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
/* ビート */
.beat-section-hd{font-size:10px;font-weight:700;color:#444;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #1a1a1a}
.beat-upload-zone{border:2px dashed #1e1e1e;border-radius:14px;padding:22px;text-align:center;color:#444;font-size:13px;transition:all 0.2s;margin-bottom:8px;cursor:pointer}
.beat-upload-zone:hover{border-color:#333;color:#777}
.beat-upload-zone.dragover{border-color:#fff;color:#fff;background:#1a1a1a}
.beat-upload-zone input{display:none}
.beat-upload-btn{width:100%;padding:10px;background:#141414;border:1px solid #222;border-radius:12px;color:#666;font-size:13px;cursor:pointer;margin-bottom:12px;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.beat-upload-btn:hover{border-color:#fff;color:#fff}
.beat-upload-bar{width:100%;height:3px;background:#1a1a1a;border-radius:2px;margin-bottom:12px;overflow:hidden;display:none}
.beat-upload-bar-fill{height:100%;background:#fff;border-radius:2px;transition:width 0.3s}
.beat-card{background:#141414;border:1px solid #1a1a1a;border-radius:14px;padding:14px;margin-bottom:10px}
.beat-card.selected{border-color:#fff}
.beat-card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.beat-icon{width:38px;height:38px;border-radius:10px;background:#1a1a1a;border:1px solid #222;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.beat-info{flex:1;min-width:0}
.beat-name-row{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.beat-name{font-size:14px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.beat-badge{font-size:9px;padding:2px 7px;background:#0a2a14;border:1px solid #1a5a28;border-radius:20px;color:#3dba6a;white-space:nowrap;flex-shrink:0}
.beat-meta{font-size:11px;color:#444;line-height:1.5}
.beat-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.beat-settings{background:#0f0f0f;border:1px solid #1e1e1e;border-radius:12px;padding:12px;margin-bottom:10px;display:none}
.beat-settings.open{display:block}
.beat-setting-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.beat-setting-label{font-size:11px;color:#666;min-width:76px;font-weight:600}
.beat-setting-input{flex:1;padding:7px 10px;background:#141414;border:1px solid #222;border-radius:8px;color:#fff;font-size:13px;text-align:right;max-width:90px}
.beat-setting-unit{font-size:11px;color:#444;white-space:nowrap}
.beat-setting-note{font-size:10px;color:#444;line-height:1.4;margin-top:4px;margin-bottom:8px}
.beat-actions{display:flex;gap:6px;flex-wrap:wrap}
.beat-btn{flex:1;min-width:0;padding:7px 4px;font-size:11px;border-radius:9px;border:1px solid #222;background:#111;color:#555;cursor:pointer;transition:all 0.15s;text-align:center;white-space:nowrap}
.beat-btn:hover{border-color:#fff;color:#fff}
.beat-btn.on{border-color:#3dba6a;color:#3dba6a;background:#0a2a14}
.beat-btn.danger{border-color:#bb3333;color:#bb3333}
.beat-btn.danger:hover{background:#1a0a0a}
audio{width:100%;margin-bottom:8px;opacity:0.6}
.empty-state{text-align:center;padding:50px 20px;color:#444}
.empty-state p{font-size:13px;margin-top:8px}
.loading{text-align:center;padding:40px;color:#444;font-size:13px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
/* プレイヤー */
.player-screen{position:fixed;inset:0;background:#060606;z-index:400;display:none;flex-direction:column}
.player-screen.open{display:flex}
.player-header{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #111;gap:8px;flex-shrink:0}
.player-title{font-size:13px;font-weight:700;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-beat-select{background:#141414;border:1px solid #1e1e1e;border-radius:8px;color:#fff;font-size:11px;padding:4px 6px;max-width:120px;cursor:pointer}
.player-mute-btn{background:#141414;border:1px solid #1e1e1e;border-radius:8px;padding:5px 8px;color:#666;font-size:11px;cursor:pointer;white-space:nowrap;transition:all 0.15s;display:flex;align-items:center;gap:4px}
.player-mute-btn.muted{border-color:#bb3333;color:#bb3333;background:#140a0a}
.player-close{background:none;border:1px solid #1a1a1a;border-radius:8px;padding:5px 8px;color:#444;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px}
.volume-row{display:none;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid #111;flex-shrink:0}
@media(min-width:641px){.volume-row{display:flex}}
.volume-label{font-size:10px;color:#444;white-space:nowrap;font-weight:600}
.volume-slider{flex:1;-webkit-appearance:none;appearance:none;height:2px;background:#222;border-radius:1px;outline:none;cursor:pointer;max-width:200px}
.volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer}
.volume-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer;border:none}
.volume-val{font-size:10px;color:#555;min-width:28px}
.carousel-area{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;min-height:0;touch-action:pan-y}
.carousel-track{display:flex;align-items:center;gap:14px;position:absolute;top:50%;transform:translateY(-50%);will-change:left;transition:left 0.38s cubic-bezier(0.25,0.46,0.45,0.94)}
.carousel-card{border-radius:18px;text-align:center;cursor:pointer;flex-shrink:0;border:1px solid #1a1a1a;background:#0f0f0f;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;transition:all 0.35s cubic-bezier(0.25,0.46,0.45,0.94);padding:16px;overflow-y:auto;user-select:none}
.carousel-card.active{border-color:#fff;background:#141414}
.carousel-card.delay-card{border-color:#333;background:#0a0a0a}
.carousel-card.delay-card.active{border-color:#888;background:#111}
.carousel-card-name{font-weight:700;color:#fff;line-height:1.2;margin-bottom:6px}
.carousel-card-count{color:#555;margin-bottom:4px}
.carousel-card-num{color:#222}
.delay-card-label{font-size:10px;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.delay-card-countdown{font-size:28px;font-weight:700;color:#888;margin-bottom:4px}
.delay-card-sub{font-size:11px;color:#333}
.player-card-detail{display:none;width:100%;margin-top:10px;padding-top:10px;border-top:1px solid #1a1a1a}
.player-card-detail.open{display:block}
.player-card-desc{font-size:11px;color:#666;line-height:1.5;background:#080808;border-radius:8px;padding:8px;margin-bottom:6px;text-align:left}
.player-card-video{width:100%;border-radius:8px;max-height:120px;object-fit:contain;background:#000;display:block;margin-bottom:8px}
.player-card-close{width:100%;padding:7px;font-size:11px;border-radius:8px;border:1px solid #1a1a1a;background:transparent;color:#333;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:all 0.15s}
.player-card-close:hover{border-color:#444;color:#666}
.player-controls{padding:8px 14px 16px;flex-shrink:0}
.progress-section{margin-bottom:8px}
.progress-time-row{display:flex;justify-content:space-between;font-size:10px;color:#333;margin-bottom:6px}
.progress-wrap{position:relative;width:100%;height:32px;display:flex;align-items:center;cursor:pointer}
.progress-track{width:100%;height:4px;background:#1a1a1a;border-radius:2px;position:relative}
.progress-played{height:100%;background:#fff;border-radius:2px;position:relative;z-index:2;transition:width 0.08s linear}
.progress-markers-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3}
.pm-tick{position:absolute;top:50%;transform:translateY(-50%)}
.pm-tick-eight{width:1px;height:8px;background:#2a2a2a;margin-left:-0.5px}
.pm-tick-four{width:2px;height:14px;background:#3a3a3a;margin-left:-1px;border-radius:1px}
.pm-tick-move{width:2px;height:20px;background:#666;margin-left:-1px;border-radius:1px}
.pm-label-layer{position:absolute;top:100%;left:0;width:100%;margin-top:3px;pointer-events:none}
.pm-lbl{position:absolute;font-size:8px;transform:translateX(-50%);white-space:nowrap;color:#2a2a2a}
.pm-lbl-four{color:#3a3a3a}
.pm-lbl-move{color:#666;font-size:9px;font-weight:600}
.bpm-control{display:flex;align-items:center;gap:5px;background:#0f0f0f;border:1px solid #1a1a1a;border-radius:12px;padding:7px 10px;margin-bottom:8px}
.bpm-label{font-size:10px;color:#444;white-space:nowrap;font-weight:700;letter-spacing:0.5px}
.bpm-value{font-size:17px;font-weight:700;color:#fff;min-width:34px;text-align:center}
.bpm-btn{width:28px;height:28px;border-radius:50%;border:1px solid #222;background:#141414;color:#aaa;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;font-size:15px}
.bpm-btn:hover{border-color:#fff}
.bpm-btn:active{transform:scale(0.9)}
.bpm-btn-sm{width:24px;height:24px;font-size:10px;font-weight:700}
.bpm-slider{flex:1;-webkit-appearance:none;appearance:none;height:2px;background:#222;border-radius:1px;outline:none;cursor:pointer}
.bpm-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer}
.bpm-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer;border:none}
.play-btns-row{display:flex;gap:8px}
.restart-btn{padding:12px 16px;background:#141414;border:1px solid #222;border-radius:12px;color:#aaa;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px;transition:all 0.15s;white-space:nowrap;flex-shrink:0}
.restart-btn:hover{border-color:#fff;color:#fff}
.play-pause-btn{flex:1;padding:12px;background:#fff;color:#000;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-logo">
    <svg width="30" height="30" viewBox="0 0 26 26" fill="none"><circle cx="13" cy="6" r="3" fill="#fff"/><path d="M13 9v7M13 13l-4.5-2.5M13 13l4.5-2.5M13 16l-3.5 5M13 16l3.5 5" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg>
    <h1>BreakinSetBuilder</h1>
  </div>
  <div class="login-box">

    <div class="login-sub">続けるにはログインが必要です</div>
    <div class="login-field"><label class="login-label">メールアドレス</label><input class="login-input" type="email" id="login-email" placeholder="you@example.com" autocomplete="email"></div>
    <div class="login-field"><label class="login-label">パスワード</label><input class="login-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">ログイン</button>

<div class="app" id="main-app" style="display:none">

    <div class="header-left">
      <svg width="24" height="24" viewBox="0 0 26 26" fill="none"><circle cx="13" cy="6" r="3" fill="#fff"/><path d="M13 9v7M13 13l-4.5-2.5M13 13l4.5-2.5M13 16l-3.5 5M13 16l3.5 5" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg>
      <div><h1>BreakinSetBuilder</h1><p>技を管理してセットを組み立てる</p></div>
    </div>
    <button class="logout-btn" onclick="doLogout()"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>ログアウト</button>
  </div>

  <!-- セット一覧 -->
  <div id="sec-saved" class="section active">
    <div style="padding:12px 0" id="saved-list"></div>
  </div>

  <!-- セット作成 -->
  <div id="sec-set" class="section">
    <div class="set-builder">
      <input class="set-name-input" type="text" placeholder="セット名（例：バトル用コンボA）" id="set-name">
      <div id="set-tag-editor-create"></div>
      <div id="set-eight-count" class="eight-badge" style="display:none"></div>

      <button class="add-move-inline-btn" onclick="openAddMove()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新しい技を追加
      </button>
      <div class="section-label">技を選ぶ</div>
      <div id="set-filter" class="filter-area"></div>
      <div id="pick-list"></div>
    </div>
  </div>

  <!-- ビート -->
  <div id="sec-beats" class="section">
    <div class="beat-section-hd">音楽ライブラリ</div>
    <div class="beat-upload-zone" id="beat-upload-zone">
      <input type="file" id="beat-file-input" accept="audio/*,.mp3,.wav,.aac,.flac,.m4a,.ogg">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" style="margin-bottom:6px;opacity:0.4"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <div>音楽ファイルをドロップ</div>
      <div style="font-size:11px;margin-top:3px;color:#2a2a2a">MP3 / WAV / AAC / FLAC / M4A</div>
    </div>
    <button class="beat-upload-btn" onclick="document.getElementById('beat-file-input').click()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      ファイルを選択してアップロード
    </button>
    <div class="beat-upload-bar" id="beat-upload-bar"><div class="beat-upload-bar-fill" id="beat-upload-bar-fill" style="width:0%"></div></div>
    <div id="beat-list"></div>
  </div>
</div>

<div class="tabs" id="main-tabs" style="display:none">
  <button class="tab active" onclick="switchTab('saved',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    セット一覧
  </button>
  <button class="tab" onclick="switchTab('set',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><line x1="12" y1="7" x2="5" y2="17"/><line x1="12" y1="7" x2="19" y2="17"/></svg>
    セット作成
  </button>
  <button class="tab" onclick="switchTab('beats',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    ビート
  </button>
</div>

<!-- 技詳細 -->
<div class="detail-screen" id="detail-screen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>戻る</button>
    <span class="detail-name" id="detail-name"></span>
    <button class="edit-btn" id="detail-edit-btn">編集</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- 技編集 -->
<div class="edit-screen" id="edit-screen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeEdit()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>戻る</button>
    <span class="detail-name">技を編集</span>
  </div>
  <div class="add-move-body" id="edit-body"></div>
</div>

<!-- 技追加 -->
<div class="add-move-screen" id="add-move-screen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeAddMove()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>戻る</button>
    <span class="detail-name">新しい技を追加</span>
  </div>
  <div class="add-move-body">
    <div class="form-group"><label class="form-label">技名</label><input class="form-input" type="text" id="new-name" placeholder="例：ゴブレット"></div>
    <div class="form-group"><label class="form-label">種類</label>
      <div class="type-select" id="type-select">
        <span class="type-opt active" data-type="floor" onclick="selectType(this)">Floor</span>
        <span class="type-opt" data-type="strong" onclick="selectType(this)">Strong</span>

    <div class="form-group">
      <label class="form-label">動画（任意）</label>
      <div class="add-drop-zone" id="add-drop-zone"><input type="file" id="add-file-input" accept="video/*" onchange="handleAddVideoSelect(event)">動画をドラッグ＆ドロップ</div>
      <button class="upload-btn" onclick="document.getElementById('add-file-input').click()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>ファイルを選択</button>
      <div class="upload-progress" id="add-upload-progress"><div class="upload-progress-fill" id="add-upload-fill" style="width:0%"></div></div>
      <video class="add-media-preview" id="add-video-preview" muted playsinline controls></video>
    </div>
    <button class="submit-btn" onclick="submitMove()">追加する</button>
  </div>
</div>

<!-- セット編集 -->
<div class="set-edit-screen" id="set-edit-screen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeSetEdit()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>戻る</button>
    <span class="detail-name" id="set-edit-title">セットを編集</span>
  </div>
  <div class="set-edit-body" id="set-edit-body"></div>
</div>

<!-- プレイヤー -->
<div class="player-screen" id="player-screen">
  <div class="player-header">
    <span class="player-title" id="player-title"></span>
    <select class="player-beat-select" id="player-beat-select" onchange="changeTrack(this.value)"><option value="">— 音楽なし —</option></select>
    <button class="player-mute-btn" id="mute-btn" onclick="toggleMute()"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>音あり</button>
    <button class="player-close" onclick="closePlayer()"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>閉じる</button>
  </div>
  <div class="volume-row">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>
    <span class="volume-label">音量</span>
    <input class="volume-slider" type="range" id="volume-slider" min="0" max="100" value="80" oninput="setVolume(this.value)">
    <span class="volume-val" id="volume-val">80%</span>
  </div>
  <div class="carousel-area" id="carousel-area"><div class="carousel-track" id="carousel-track"></div></div>
  <div class="player-controls">
    <div class="progress-section">
      <div class="progress-time-row">
        <span id="time-current">0:00</span>
        <span id="time-eight" style="color:#444">WAIT</span>
        <span id="time-total">0:00</span>
      </div>
      <div class="progress-wrap" id="progress-wrap" onclick="seekTo(event)">
        <div class="progress-track" id="progress-track">
          <div class="progress-played" id="progress-played" style="width:0%"></div>
          <div class="progress-markers-layer" id="progress-markers-layer"></div>
        </div>
        <div class="pm-label-layer" id="pm-label-layer"></div>
      </div>
    </div>
    <div class="bpm-control">
      <span class="bpm-label">BPM</span>
      <button class="bpm-btn" onclick="adjustBPM(-5)">−</button>
      <button class="bpm-btn bpm-btn-sm" onclick="adjustBPM(-1)">-1</button>
      <span class="bpm-value" id="bpm-value">120</span>
      <button class="bpm-btn bpm-btn-sm" onclick="adjustBPM(1)">+1</button>
      <button class="bpm-btn" onclick="adjustBPM(5)">+</button>
      <input class="bpm-slider" type="range" id="bpm-slider" min="60" max="200" value="120" oninput="setBPMFromSlider(this.value)">
    </div>
    <div class="play-btns-row">
      <button class="restart-btn" onclick="restartFromBeginning()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-3.87L1 10"/></svg>最初から</button>
      <button class="play-pause-btn" id="play-pause-btn" onclick="togglePlay()"><svg id="pp-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>再生</button>
    </div>
  </div>
</div>

<audio id="bg-audio" loop style="display:none"></audio>
<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,addDoc,getDocs,doc,updateDoc,deleteDoc,query,orderBy}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import{getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const CLOUD_NAME="dnbbwfwoi",UPLOAD_PRESET="breakin_unsigned";
const firebaseConfig={apiKey:"AIzaSyBao1NCQQRw596Y0ueG4q9gpNjMA_ApLBE",authDomain:"breakinsetbuilder.firebaseapp.com",projectId:"breakinsetbuilder",storageBucket:"breakinsetbuilder.firebasestorage.app",messagingSenderId:"544530127587",appId:"1:544530127587:web:2c44993150211c892d03d6"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

onAuthStateChanged(auth,user=>{
  if(user){
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("main-app").style.display="block";
    document.getElementById("main-tabs").style.display="flex";
    initApp();
  } else {
    document.getElementById("login-screen").classList.remove("hidden");
    document.getElementById("main-app").style.display="none";
    document.getElementById("main-tabs").style.display="none";
  }
});

window.doLogin=async function(){
  const email=document.getElementById("login-email").value.trim();
  const password=document.getElementById("login-password").value;
  const btn=document.getElementById("login-btn");
  const err=document.getElementById("login-error");
  if(!email||!password){err.textContent="メールとパスワードを入力してください";return;}
  btn.disabled=true;btn.textContent="ログイン中...";err.textContent="";
  try{await signInWithEmailAndPassword(auth,email,password);}
  catch(e){
    let msg="ログインに失敗しました";
    if(e.code==="auth/user-not-found"||e.code==="auth/wrong-password"||e.code==="auth/invalid-credential")msg="メールアドレスまたはパスワードが正しくありません";
    else if(e.code==="auth/too-many-requests")msg="しばらく待ってから再試行してください";
    err.textContent=msg;
  }
  btn.disabled=false;btn.textContent="ログイン";
}
document.getElementById("login-email").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("login-password").focus();});
document.getElementById("login-password").addEventListener("keydown",e=>{if(e.key==="Enter")window.doLogin();});
window.doLogout=async function(){if(!confirm("ログアウトしますか？"))return;await signOut(auth);showToast("ログアウトしました");}

let appInited=false;
function initApp(){
  if(appInited)return;appInited=true;
  renderTagEditor("set-tag-editor-create",[],tags=>{newSetTags=tags;});
  loadMoves();loadSets();loadCustomTags();loadBeats();
  initCarouselSwipe();
}

const typeLabel={floor:"Floor",strong:"Strong",toprock:"Toprock"};
const typeClass={floor:"type-floor",strong:"type-strong",toprock:"type-toprock"};

let moves=[],sets=[],setMoves=[],customTags=[],beats=[];
let selectedType="floor",editType="floor";
let newMoveTags=[],editMoveTags=[],newSetTags=[],editSetTags=[];
let expandedPickId=null,expandedPlayerCardIdx=null;
let isMuted=false,currentBPM=120;
let isPlaying=false,beatInterval=null,beatCount=0,totalBeats=0;
let currentSetMoves=[],currentMoveIdx=0,beatsPerMove=[];
let selectedBeatId=null,delayMs=0,currentDisplayIdx=0;
let delayTimer=null,delayCountdownInterval=null;
let editingSetId=null,editSetMoves=[];
// filter state
let setFilterQ="",setFilterType="",setFilterTag="";
let editFilterQ="",editFilterType="",editFilterTag="";
const bgAudio=document.getElementById("bg-audio");
bgAudio.volume=0.8;

// ===== VOLUME / BPM =====
window.setVolume=function(v){bgAudio.volume=v/100;document.getElementById("volume-val").textContent=v+"%";}
window.adjustBPM=function(d){currentBPM=Math.max(60,Math.min(200,currentBPM+d));updateBPMDisplay();if(isPlaying)restartInterval();}
window.setBPMFromSlider=function(v){currentBPM=parseInt(v);updateBPMDisplay();if(isPlaying)restartInterval();}
function updateBPMDisplay(){document.getElementById("bpm-value").textContent=currentBPM;document.getElementById("bpm-slider").value=currentBPM;updateTimeDisplay();}
function restartInterval(){clearInterval(beatInterval);beatInterval=setInterval(tickBeat,60000/currentBPM);}

window.toggleMute=function(){
  isMuted=!isMuted;bgAudio.muted=isMuted;
  const btn=document.getElementById("mute-btn");
  btn.classList.toggle("muted",isMuted);
  btn.innerHTML=isMuted
    ?`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg> 無音`
    :`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg> 音あり`;
}

window.changeTrack=function(beatId){
  stopAll();selectedBeatId=beatId||null;
  if(beatId){const b=beats.find(x=>x.id===beatId);if(b){bgAudio.src=b.url;bgAudio.loop=true;currentBPM=parseInt(b.bpm)||120;delayMs=parseInt(b.delay)||0;updateBPMDisplay();}}
  else{bgAudio.src="";delayMs=0;}
  resetPlayback();
}
function getSelectedBeat(){return beats.find(x=>x.id===selectedBeatId)||null;}
function stopAll(){
  clearInterval(beatInterval);clearInterval(delayCountdownInterval);clearTimeout(delayTimer);
  beatInterval=null;delayTimer=null;delayCountdownInterval=null;
  isPlaying=false;bgAudio.pause();setPPBtn(false);
}
function resetPlayback(){
  beatCount=0;currentMoveIdx=0;currentDisplayIdx=0;expandedPlayerCardIdx=null;
  document.getElementById("progress-played").style.width="0%";
  renderCarousel(0);updateTimeDisplay();
}

// ===== PLAYER =====
function startPlayer(setData){
  currentSetMoves=setData.moves||[];if(!currentSetMoves.length)return;
  document.getElementById("player-title").textContent=setData.name;
  const sel=document.getElementById("player-beat-select");
  sel.innerHTML='<option value="">— 音楽なし —</option>'+beats.map(b=>`<option value="${b.id}"${b.id===selectedBeatId?" selected":""}>${b.name}</option>`).join("");
  stopAll();
  beatsPerMove=currentSetMoves.map(m=>parseInt(m.count)||8);
  totalBeats=beatsPerMove.reduce((a,b)=>a+b,0);
  isMuted=false;
  const muteBtn=document.getElementById("mute-btn");
  muteBtn.classList.remove("muted");
  muteBtn.innerHTML=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg> 音あり`;
  if(selectedBeatId){const b=getSelectedBeat();if(b){bgAudio.src=b.url;bgAudio.loop=true;currentBPM=parseInt(b.bpm)||120;delayMs=parseInt(b.delay)||0;}}
  else{delayMs=0;}
  updateBPMDisplay();resetPlayback();renderProgressMarkers();
  document.getElementById("player-screen").classList.add("open");
}

function setPPBtn(playing){
  const btn=document.getElementById("play-pause-btn");
  btn.innerHTML=playing
    ?`<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 一時停止`
    :`<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> 再生`;
}

function renderProgressMarkers(){
  let ticksHtml="",labelsHtml="";
  for(let i=8;i<totalBeats;i+=8){
    const pct=(i/totalBeats)*100;
    const isFour=i%32===0,isMove=isMoveBreak(i);
    ticksHtml+=`<div class="${isMove?"pm-tick pm-tick-move":isFour?"pm-tick pm-tick-four":"pm-tick pm-tick-eight"}" style="left:${pct}%;position:absolute"></div>`;
    if(isMove)labelsHtml+=`<div class="pm-lbl pm-lbl-move" style="left:${pct}%">${getMoveLabel(i)}</div>`;
    else if(isFour)labelsHtml+=`<div class="pm-lbl pm-lbl-four" style="left:${pct}%">${i/8}E</div>`;
    else labelsHtml+=`<div class="pm-lbl" style="left:${pct}%">${i/8}</div>`;
  }
  document.getElementById("progress-markers-layer").innerHTML=ticksHtml;
  document.getElementById("pm-label-layer").innerHTML=labelsHtml;
}
function isMoveBreak(beat){let c=0;for(let i=0;i<beatsPerMove.length-1;i++){c+=beatsPerMove[i];if(c===beat)return true;}return false;}
function getMoveLabel(beat){let c=0;for(let i=0;i<beatsPerMove.length-1;i++){c+=beatsPerMove[i];if(c===beat)return(currentSetMoves[i+1]?.name||"").slice(0,5);}return"";}

function updateTimeDisplay(){
  const spb=60/currentBPM;
  document.getElementById("time-current").textContent=fmt(beatCount*spb);
  document.getElementById("time-total").textContent=fmt(totalBeats*spb);
  if(delayTimer||delayCountdownInterval)document.getElementById("time-eight").textContent="WAIT...";
  else document.getElementById("time-eight").textContent=`${Math.floor(beatCount/8)+1}エイト目`;
}
function fmt(s){return`${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,"0")}`;}

// ===== CAROUSEL SWIPE =====
let carouselDragStartX=null,carouselDragging=false,carouselDragDelta=0;
function initCarouselSwipe(){
  const area=document.getElementById("carousel-area");
  const start=x=>{carouselDragStartX=x;carouselDragging=true;carouselDragDelta=0;};
  const move=x=>{if(!carouselDragging)return;carouselDragDelta=x-carouselDragStartX;};
  const end=()=>{if(carouselDragging&&Math.abs(carouselDragDelta)>50){if(carouselDragDelta<0)carouselSkip(1);else carouselSkip(-1);}carouselDragging=false;carouselDragDelta=0;};
  area.addEventListener("touchstart",e=>start(e.touches[0].clientX),{passive:true});
  area.addEventListener("touchmove",e=>move(e.touches[0].clientX),{passive:true});
  area.addEventListener("touchend",end);
  area.addEventListener("mousedown",e=>start(e.clientX));
  area.addEventListener("mousemove",e=>move(e.clientX));
  area.addEventListener("mouseup",end);
  area.addEventListener("mouseleave",()=>{carouselDragging=false;carouselDragDelta=0;});
}

function carouselSkip(dir){
  const maxIdx=currentSetMoves.length;
  const newIdx=Math.max(0,Math.min(maxIdx,currentDisplayIdx+dir));
  if(newIdx===currentDisplayIdx)return;
  if(newIdx===0){
    beatCount=0;currentMoveIdx=0;currentDisplayIdx=0;
    document.getElementById("progress-played").style.width="0%";
    renderCarousel(0);updateTimeDisplay();
    if(selectedBeatId&&bgAudio.src)bgAudio.currentTime=0;
  } else {
    const moveIdx=newIdx-1;
    let beatOffset=0;
    for(let i=0;i<moveIdx;i++)beatOffset+=beatsPerMove[i];
    beatCount=beatOffset;currentMoveIdx=moveIdx;currentDisplayIdx=newIdx;
    expandedPlayerCardIdx=null;
    document.getElementById("progress-played").style.width=(beatCount/totalBeats*100)+"%";
    renderCarousel(newIdx);updateTimeDisplay();
    syncAudioToBeat(beatCount);
  }
}

// 精度改善：ビート位置から音楽を正確に同期
function syncAudioToBeat(beat){
  if(!selectedBeatId||!bgAudio.src||!bgAudio.duration)return;
  const spb=60/currentBPM;
  // beatCountは0始まりで、delayMs後に0から始まるので音楽の再生位置 = beat*spb + delayMs/1000
  const audioPos=(beat*spb+delayMs/1000)%bgAudio.duration;
  bgAudio.currentTime=Math.max(0,audioPos);
}

function renderCarousel(activeIdx){
  const area=document.getElementById("carousel-area");
  const aW=area.offsetWidth||window.innerWidth,aH=area.offsetHeight||260;
  const actW=Math.min(aW*0.60,248),actH=Math.min(aH*0.74,208);
  const inW=actW*0.64,inH=actH*0.64,gap=14;
  const track=document.getElementById("carousel-track");
  const setName=document.getElementById("player-title").textContent||"SET";
  const dMs=delayMs;
  const displayCards=[{type:"delay",name:setName,delayMs:dMs},...currentSetMoves.map((m,i)=>({type:"move",move:m,idx:i}))];
  track.innerHTML=displayCards.map((card,di)=>{
    const isAct=di===activeIdx;
    const w=isAct?actW:inW,h=isAct?actH:inH;
    if(card.type==="delay"){
      const secStr=dMs>=1000?(dMs/1000).toFixed(1)+"s":dMs+"ms";
      return`<div class="carousel-card delay-card${isAct?" active":""}" style="width:${w}px;min-width:${w}px;min-height:${h}px;opacity:${isAct?1:0.22};transform:scale(${isAct?1:0.76})">
        <div class="delay-card-label">NOW PLAYING</div>
        <div class="carousel-card-name" style="font-size:${isAct?16:11}px;margin-bottom:4px">${card.name}</div>
        <div class="delay-card-countdown" style="font-size:${isAct?22:14}px" id="delay-countdown-display">${dMs>0?secStr:"GO"}</div>
        <div class="delay-card-sub" style="font-size:${isAct?11:9}px">${dMs>0?"カード開始まで":""}</div>
      </div>`;
    }
    const m=card.move,isExp=expandedPlayerCardIdx===card.idx&&isAct;
    const mFull=moves.find(x=>x.id===m.id)||m;
    return`<div class="carousel-card${isAct?" active":""}" id="pcard-${card.idx}" style="width:${w}px;min-width:${w}px;min-height:${h}px;max-height:${isExp?"90vh":h+"px"};opacity:${isAct?1:0.22};transform:scale(${isAct?1:0.76})" onclick="window.tapPlayerCard(${card.idx},${di},event)">
      <div class="carousel-card-name" style="font-size:${isAct?20:13}px">${m.name}</div>
      <div class="carousel-card-count" style="font-size:${isAct?12:10}px">${m.count?m.count+"カウント":""}</div>
      <div class="carousel-card-num" style="font-size:${isAct?11:9}px">${card.idx+1} / ${currentSetMoves.length}</div>
      ${isAct?`<div class="player-card-detail${isExp?" open":""}">
        ${mFull.videoUrl?`<video class="player-card-video" src="${mFull.videoUrl}" controls playsinline muted></video>`:""}
        <div class="player-card-desc">${mFull.desc||""}</div>
        <button class="player-card-close" onclick="event.stopPropagation();window.closePlayerCard()"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>閉じる</button>
      </div>`:""}
    </div>`;
  }).join("");
  let left=aW/2-actW/2;
  for(let i=0;i<activeIdx;i++)left-=inW+gap;
  track.style.left=left+"px";track.style.top="50%";track.style.transform="translateY(-50%)";
}

window.tapPlayerCard=function(moveIdx,displayIdx,e){
  if(Math.abs(carouselDragDelta)>10)return;
  if(displayIdx===currentDisplayIdx){if(expandedPlayerCardIdx===moveIdx)return;expandedPlayerCardIdx=moveIdx;renderCarousel(currentDisplayIdx);}
  else{carouselSkip(displayIdx-currentDisplayIdx);}
}
window.closePlayerCard=function(){expandedPlayerCardIdx=null;renderCarousel(currentDisplayIdx);}

function startDelayCountdown(){
  const dEl=document.getElementById("delay-countdown-display");
  let remaining=delayMs;const step=50;
  delayCountdownInterval=setInterval(()=>{
    remaining-=step;
    if(remaining<=0){clearInterval(delayCountdownInterval);delayCountdownInterval=null;if(dEl)dEl.textContent="GO";document.getElementById("time-eight").textContent="1エイト目";return;}
    if(dEl)dEl.textContent=remaining>=1000?(remaining/1000).toFixed(1)+"s":Math.ceil(remaining/100)*100+"ms";
  },step);
}

function tickBeat(){
  let cum=0;
  for(let i=0;i<beatsPerMove.length;i++){
    cum+=beatsPerMove[i];
    if(beatCount<cum){const di=i+1;if(di!==currentDisplayIdx){currentDisplayIdx=di;currentMoveIdx=i;expandedPlayerCardIdx=null;renderCarousel(di);}break;}
  }
  document.getElementById("progress-played").style.width=Math.min((beatCount/totalBeats)*100,100)+"%";
  updateTimeDisplay();beatCount++;
  if(beatCount>=totalBeats){beatCount=0;currentMoveIdx=0;currentDisplayIdx=1;expandedPlayerCardIdx=null;renderCarousel(1);document.getElementById("progress-played").style.width="0%";}
}

window.togglePlay=function(){
  if(isPlaying){
    clearInterval(beatInterval);clearInterval(delayCountdownInterval);clearTimeout(delayTimer);
    beatInterval=null;delayTimer=null;delayCountdownInterval=null;
    isPlaying=false;bgAudio.pause();setPPBtn(false);
  } else {
    isPlaying=true;setPPBtn(true);
    if(delayMs>0&&beatCount===0){
      // 音楽を正確な位置から開始
      if(selectedBeatId&&bgAudio.src){bgAudio.currentTime=0;bgAudio.play().catch(()=>{});}
      startDelayCountdown();
      delayTimer=setTimeout(()=>{
        delayTimer=null;currentDisplayIdx=1;currentMoveIdx=0;renderCarousel(1);
        beatInterval=setInterval(tickBeat,60000/currentBPM);updateTimeDisplay();
      },delayMs);
    } else {
      if(selectedBeatId&&bgAudio.src){
        if(beatCount===0){bgAudio.currentTime=0;}
        else{syncAudioToBeat(beatCount);}
        bgAudio.play().catch(()=>{});
      }
      if(beatCount===0){currentDisplayIdx=1;currentMoveIdx=0;renderCarousel(1);}
      beatInterval=setInterval(tickBeat,60000/currentBPM);updateTimeDisplay();
    }
  }
}

window.restartFromBeginning=function(){
  stopAll();beatCount=0;currentMoveIdx=0;currentDisplayIdx=0;expandedPlayerCardIdx=null;
  document.getElementById("progress-played").style.width="0%";
  bgAudio.currentTime=0;renderCarousel(0);updateTimeDisplay();
}

window.seekTo=function(e){
  const rect=document.getElementById("progress-track").getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  beatCount=Math.floor(pct*totalBeats);
  document.getElementById("progress-played").style.width=(pct*100)+"%";
  let cum=0,mi=0;
  for(let i=0;i<beatsPerMove.length;i++){cum+=beatsPerMove[i];if(beatCount<cum){mi=i;break;}if(i===beatsPerMove.length-1)mi=i;}
  currentMoveIdx=mi;currentDisplayIdx=mi+1;expandedPlayerCardIdx=null;
  renderCarousel(currentDisplayIdx);updateTimeDisplay();
  syncAudioToBeat(beatCount);
}

window.closePlayer=function(){stopAll();document.getElementById("player-screen").classList.remove("open");}

// ===== BEATS =====
async function loadBeats(){
  const snap=await getDocs(query(collection(db,"beats"),orderBy("createdAt","desc")));
  beats=snap.docs.map(d=>({id:d.id,...d.data()}));renderBeatList();
}
function renderBeatList(){
  const el=document.getElementById("beat-list");
  if(!beats.length){el.innerHTML='<div class="empty-state"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity:0.3;margin-bottom:8px"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><p>音楽がまだありません</p></div>';return;}
  el.innerHTML=beats.map(b=>`
    <div class="beat-card${b.id===selectedBeatId?" selected":""}">
      <div class="beat-card-top">
        <div class="beat-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
        <div class="beat-info">
          <div class="beat-name-row"><span class="beat-name">${b.name}</span>${b.id===selectedBeatId?'<span class="beat-badge">使用中</span>':""}</div>
          <div class="beat-meta">${b.bpm?`BPM: ${b.bpm}　`:""}${(parseInt(b.delay)||0)>0?`ディレイ: ${b.delay}ms　`:""}${b.size?formatSize(b.size):""}</div>
        </div>
      </div>
      ${(b.tags||[]).length?`<div class="beat-tags">${b.tags.map(t=>`<span class="mini-tag">${t}</span>`).join("")}</div>`:""}
      <audio src="${b.url}" controls preload="none"></audio>
      <div class="beat-settings" id="settings-${b.id}">
        <div class="beat-setting-row"><span class="beat-setting-label">BPM</span><input class="beat-setting-input" type="number" id="bpm-${b.id}" value="${b.bpm||120}" min="60" max="200"><span class="beat-setting-unit">BPM</span></div>
        <div class="beat-setting-note">再生時に技カードのBPMをこの値に自動設定</div>
        <div class="beat-setting-row"><span class="beat-setting-label">ディレイ</span><input class="beat-setting-input" type="number" id="delay-${b.id}" value="${b.delay||0}" min="0" max="60000"><span class="beat-setting-unit">ms</span></div>
        <div class="beat-setting-note">再生開始から技カードが動き出すまでの待機時間</div>
        <button class="beat-btn" style="width:100%;margin-top:4px" onclick="saveBeatSettings('${b.id}')">保存</button>
      </div>
      <div class="beat-actions">
        <button class="beat-btn${b.id===selectedBeatId?" on":""}" onclick="window.selectBeat('${b.id}')">${b.id===selectedBeatId?"✓ 使用中":"使用"}</button>
        <button class="beat-btn" onclick="window.toggleBeatSettings('${b.id}')">設定</button>
        <button class="beat-btn" onclick="window.editBeatName('${b.id}')">名前</button>
        <button class="beat-btn" onclick="window.editBeatTags('${b.id}')">タグ</button>
        <button class="beat-btn danger" onclick="window.deleteBeat('${b.id}')">削除</button>
      </div>
      <div id="beat-tag-editor-${b.id}" style="display:none;margin-top:10px"></div>
    </div>`).join("");
}
function formatSize(b){return b>1048576?`${(b/1048576).toFixed(1)}MB`:`${Math.round(b/1024)}KB`;}
window.toggleBeatSettings=function(id){document.getElementById(`settings-${id}`)?.classList.toggle("open");}
window.saveBeatSettings=async function(id){
  const bpm=Math.max(60,Math.min(200,parseInt(document.getElementById(`bpm-${id}`).value)||120));
  const delay=Math.max(0,parseInt(document.getElementById(`delay-${id}`).value)||0);
  await updateDoc(doc(db,"beats",id),{bpm,delay});
  beats=beats.map(b=>b.id===id?{...b,bpm,delay}:b);
  if(selectedBeatId===id){currentBPM=bpm;delayMs=delay;updateBPMDisplay();}
  renderBeatList();showToast("設定を保存しました");
}
window.selectBeat=function(id){
  selectedBeatId=selectedBeatId===id?null:id;
  if(selectedBeatId){const b=getSelectedBeat();if(b){bgAudio.src=b.url;bgAudio.loop=true;currentBPM=parseInt(b.bpm)||120;delayMs=parseInt(b.delay)||0;updateBPMDisplay();}showToast(`${beats.find(x=>x.id===id)?.name}を選択`);}
  else{bgAudio.src="";delayMs=0;showToast("選択解除");}
  renderBeatList();
  const sel=document.getElementById("player-beat-select");
  if(sel)[...sel.options].forEach(o=>o.selected=o.value===(selectedBeatId||""));
}
window.editBeatName=function(id){
  const b=beats.find(x=>x.id===id);if(!b)return;
  const n=prompt("新しい名前",b.name);if(!n||n.trim()===b.name)return;
  updateDoc(doc(db,"beats",id),{name:n.trim()}).then(()=>{beats=beats.map(x=>x.id===id?{...x,name:n.trim()}:x);renderBeatList();showToast("名前を変更しました");});
}
window.editBeatTags=function(id){
  const el=document.getElementById(`beat-tag-editor-${id}`);if(!el)return;
  if(el.style.display!=="none"&&el.innerHTML){el.style.display="none";el.innerHTML="";return;}
  const b=beats.find(x=>x.id===id);if(!b)return;
  const tags=[...(b.tags||[])];el.style.display="block";
  renderBeatTagEditor(el,tags,async t=>{await updateDoc(doc(db,"beats",id),{tags:t});beats=beats.map(x=>x.id===id?{...x,tags:t}:x);});
}
function renderBeatTagEditor(el,tags,onUpdate){
  const all=getAllTags().filter(t=>!tags.includes(t));
  const uid="bt_"+Math.random().toString(36).slice(2);
  el.innerHTML=`<div class="tag-editor"><div class="tag-editor-current">${tags.map(t=>`<span class="tag-editor-tag">${t}<span class="tag-x" onclick="rmBT('${uid}','${t}')">×</span></span>`).join("")}</div>${all.length?`<div class="tag-candidates">${all.map(t=>`<span class="tag-candidate" onclick="addBT('${uid}','${t}')">${t}</span>`).join("")}</div>`:""}<div class="tag-input-row"><input type="text" id="${uid}-i" placeholder="新しいタグ..."><button onclick="addBTI('${uid}')">追加</button></div></div>`;
  window[`_bt_${uid}`]={tags,onUpdate,el};
}
window.addBT=function(uid,tag){const d=window[`_bt_${uid}`];if(!d||d.tags.includes(tag))return;d.tags.push(tag);d.onUpdate(d.tags);renderBeatTagEditor(d.el,d.tags,d.onUpdate);}
window.rmBT=function(uid,tag){const d=window[`_bt_${uid}`];if(!d)return;d.tags=d.tags.filter(t=>t!==tag);d.onUpdate(d.tags);renderBeatTagEditor(d.el,d.tags,d.onUpdate);}
window.addBTI=function(uid){const i=document.getElementById(`${uid}-i`);const t=i?.value.trim();if(!t)return;window.addBT(uid,t);i.value="";}
window.deleteBeat=async function(id){
  if(!confirm("この音楽を削除しますか？"))return;
  await deleteDoc(doc(db,"beats",id));beats=beats.filter(b=>b.id!==id);
  if(selectedBeatId===id){selectedBeatId=null;bgAudio.src="";}
  renderBeatList();showToast("削除しました");
}
async function uploadBeat(file){
  const bar=document.getElementById("beat-upload-bar"),fill=document.getElementById("beat-upload-bar-fill");
  bar.style.display="block";fill.style.width="0%";
  const fd=new FormData();fd.append("file",file);fd.append("upload_preset",UPLOAD_PRESET);
  return new Promise(resolve=>{
    const xhr=new XMLHttpRequest();
    xhr.upload.onprogress=e=>{if(e.lengthComputable)fill.style.width=(e.loaded/e.total*100)+"%";};
    xhr.onload=async function(){
      bar.style.display="none";
      if(xhr.status===200){const res=JSON.parse(xhr.responseText);const bd={name:file.name.replace(/\.[^.]+$/,""),url:res.secure_url,size:file.size,bpm:120,delay:0,tags:[],createdAt:Date.now()};const ref=await addDoc(collection(db,"beats"),bd);beats.unshift({id:ref.id,...bd});renderBeatList();showToast("アップロードしました！");resolve(true);}
      else{showToast("アップロード失敗");resolve(false);}
    };
    xhr.onerror=()=>{bar.style.display="none";showToast("通信エラー");resolve(false);};
    xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);xhr.send(fd);
  });
}
const beatDz=document.getElementById("beat-upload-zone");
beatDz.addEventListener("click",()=>document.getElementById("beat-file-input").click());
beatDz.addEventListener("dragover",e=>{e.preventDefault();beatDz.classList.add("dragover");});
beatDz.addEventListener("dragleave",()=>beatDz.classList.remove("dragover"));

document.getElementById("beat-file-input").addEventListener("change",e=>{const f=e.target.files[0];if(f)uploadBeat(f);e.target.value="";});

// ===== TAG EDITOR =====
function getAllTags(){const s=new Set();moves.forEach(m=>(m.tags||[]).forEach(t=>s.add(t)));sets.forEach(f=>(f.tags||[]).forEach(t=>s.add(t)));beats.forEach(b=>(b.tags||[]).forEach(t=>s.add(t)));customTags.forEach(t=>s.add(t.name));return[...s];}
function renderTagEditor(cid,currentTags,onUpdate){
  const all=getAllTags().filter(t=>!currentTags.includes(t));
  const el=document.getElementById(cid);if(!el)return;
  el.innerHTML=`<div class="tag-editor"><div class="tag-editor-current">${currentTags.map(t=>`<span class="tag-editor-tag">${t}<span class="tag-x" onclick="removeTagFrom('${cid}','${t}')">×</span></span>`).join("")}</div>${all.length?`<div class="tag-candidates">${all.map(t=>`<span class="tag-candidate" onclick="addTagTo('${cid}','${t}')">${t}</span>`).join("")}</div>`:""}<div class="tag-input-row"><input type="text" id="${cid}-input" placeholder="新しいタグ..."><button onclick="addTagFrom('${cid}')">追加</button></div></div>`;
  window[`_td_${cid}`]={tags:currentTags,onUpdate};
}
window.addTagTo=function(cid,tag){const d=window[`_td_${cid}`];if(!d||d.tags.includes(tag))return;d.tags.push(tag);d.onUpdate(d.tags);renderTagEditor(cid,d.tags,d.onUpdate);}
window.removeTagFrom=function(cid,tag){const d=window[`_td_${cid}`];if(!d)return;d.tags=d.tags.filter(t=>t!==tag);d.onUpdate(d.tags);renderTagEditor(cid,d.tags,d.onUpdate);}
window.addTagFrom=function(cid){const i=document.getElementById(`${cid}-input`);const t=i.value.trim();if(!t)return;window.addTagTo(cid,t);i.value="";}

// ===== FILTER UI =====
function getAllMoveTags(){const s=new Set();moves.forEach(m=>(m.tags||[]).forEach(t=>s.add(t)));return[...s];}

function renderFilterArea(containerId,filterQ,filterType,filterTag,onChangeQ,onChangeType,onChangeTag){
  const el=document.getElementById(containerId);if(!el)return;
  const tags=getAllMoveTags();
  el.innerHTML=`
    <input class="filter-search" type="text" placeholder="技名で検索..." value="${filterQ}" oninput="${onChangeQ}(this.value)">
    <div class="filter-type-row">
      <button class="filter-type-btn${filterType===''?' active':''}" onclick="${onChangeType}('')">すべて</button>
      <button class="filter-type-btn${filterType==='floor'?' active':''}" onclick="${onChangeType}('floor')">Floor</button>
      <button class="filter-type-btn${filterType==='strong'?' active':''}" onclick="${onChangeType}('strong')">Strong</button>
      <button class="filter-type-btn${filterType==='toprock'?' active':''}" onclick="${onChangeType}('toprock')">Toprock</button>
    </div>
    ${tags.length?`<div class="filter-tag-row">${tags.map(t=>`<button class="filter-tag-btn${filterTag===t?' active':''}" onclick="${onChangeTag}('${t}')">${t}</button>`).join("")}</div>`:""}
  `;
}

function filterMovesList(q,type,tag){
  return moves.filter(m=>{
    const mQ=!q||m.name.toLowerCase().includes(q.toLowerCase())||(m.desc||"").toLowerCase().includes(q.toLowerCase());
    const mT=!type||m.type===type;
    const mTag=!tag||(m.tags||[]).includes(tag);
    return mQ&&mT&&mTag;
  });
}

// set作成フィルター
window.setFQ=function(v){setFilterQ=v;renderPickList();}
window.setFT=function(v){setFilterType=v;renderFilterArea("set-filter",setFilterQ,setFilterType,setFilterTag,"setFQ","setFT","setFTag");renderPickList();}
window.setFTag=function(v){setFilterTag=setFilterTag===v?"":v;renderFilterArea("set-filter",setFilterQ,setFilterType,setFilterTag,"setFQ","setFT","setFTag");renderPickList();}

// set編集フィルター
window.editFQ=function(v){editFilterQ=v;renderEditPickList();}
window.editFT=function(v){editFilterType=v;renderFilterArea("edit-filter",editFilterQ,editFilterType,editFilterTag,"editFQ","editFT","editFTag");renderEditPickList();}
window.editFTag=function(v){editFilterTag=editFilterTag===v?"":v;renderFilterArea("edit-filter",editFilterQ,editFilterType,editFilterTag,"editFQ","editFT","editFTag");renderEditPickList();}

// ===== FIREBASE =====
async function loadMoves(){
  document.getElementById("pick-list").innerHTML='<div class="loading">読み込み中...</div>';
  const snap=await getDocs(query(collection(db,"moves"),orderBy("createdAt","desc")));
  moves=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderFilterArea("set-filter",setFilterQ,setFilterType,setFilterTag,"setFQ","setFT","setFTag");
  renderPickList();
}
async function loadSets(){const snap=await getDocs(query(collection(db,"sets"),orderBy("createdAt","desc")));sets=snap.docs.map(d=>({id:d.id,...d.data()}));renderSaved();}
async function loadCustomTags(){const snap=await getDocs(collection(db,"customTags"));customTags=snap.docs.map(d=>({id:d.id,...d.data()}));}

  if(!list.length){el.innerHTML='<div style="text-align:center;color:#444;font-size:13px;padding:20px 0">技が見つかりません</div>';return;}
  el.innerHTML=list.map(m=>{
    const isExp=expandedPickId===m.id;
    return`<div class="move-pick-card${isExp?" expanded":""}">
      <div class="move-pick-head" onclick="window.togglePick('${m.id}')">
        <div>
          <span class="move-pick-name">${m.name}</span>
          ${m.count?`<span class="count-badge" style="margin-left:6px">${m.count}ct</span>`:""}
        </div>
        <div class="move-pick-right">
          <span class="type-badge ${typeClass[m.type]||'type-floor'}">${typeLabel[m.type]||m.type}</span>
          <button class="move-pick-add" onclick="event.stopPropagation();window.addToSet('${m.id}')">＋</button>
          <span class="move-pick-chevron${isExp?" open":""}">▼</span>
        </div>
      </div>
      ${(m.tags||[]).length?`<div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap">${m.tags.map(t=>`<span class="mini-tag">${t}</span>`).join("")}</div>`:""}

function calcEights(arr){const t=(arr||[]).reduce((a,m)=>a+(parseInt(m.count)||8),0);return{beats:t,eights:Math.round(t/8*10)/10};}

function renderSetArea(){
  const el=document.getElementById("set-area"),badge=document.getElementById("set-eight-count");
  if(!setMoves.length){el.innerHTML='<div class="set-empty">下から技を選んで追加</div>';badge.style.display="none";return;}
  const{beats:b,eights}=calcEights(setMoves);
  badge.style.display="inline-block";badge.textContent=`合計 ${eights} エイト（${b}カウント）`;
  el.innerHTML=setMoves.map((m,i)=>`<div class="set-node">${i>0?`<div class="set-arrow">↓</div>`:`<span style="width:18px"></span>`}<div class="set-pill"><span>${m.name}</span>${m.count?`<span class="count-badge">${m.count}ct</span>`:""}<span class="set-pill-remove" onclick="window.removeFromSet(${i})">×</span></div></div>`).join("");
}

window.addToEditSet=function(id){
  const m=moves.find(x=>x.id===id);if(!m)return;
  editSetMoves.push({id:m.id,name:m.name,count:m.count||null});
  const s=sets.find(x=>x.id===editingSetId)||{name:""};
  renderSetEditBody(s);showToast(`${m.name}を追加`);
}
window.removeFromEditSet=function(i){
  editSetMoves.splice(i,1);
  const s=sets.find(x=>x.id===editingSetId)||{name:""};
  renderSetEditBody(s);
}
window.saveSetEdit=async function(){
  const name=document.getElementById("set-edit-name")?.value.trim();
  if(!name){showToast("セット名を入力してください");return;}
  await updateDoc(doc(db,"sets",editingSetId),{name,moves:editSetMoves,tags:editSetTags});
  sets=sets.map(s=>s.id===editingSetId?{...s,name,moves:editSetMoves,tags:editSetTags}:s);
  renderSaved();showToast("保存しました！");
  document.getElementById("set-edit-title").textContent=name;
}
window.deleteSetFromEdit=async function(){
  if(!confirm("このセットを削除しますか？"))return;
  await deleteDoc(doc(db,"sets",editingSetId));
  sets=sets.filter(s=>s.id!==editingSetId);
  renderSaved();closeSetEdit();showToast("削除しました");
}
window.closeSetEdit=function(){document.getElementById("set-edit-screen").classList.remove("open");}

window.playSet=function(id){const s=sets.find(x=>x.id===id);if(!s)return;startPlayer(s);}

window.selectEditType=function(el){document.querySelectorAll("#edit-type-select .type-opt").forEach(e=>e.classList.remove("active"));el.classList.add("active");editType=el.dataset.type;}
window.submitEdit=async function(id){
  const name=document.getElementById("edit-name").value.trim();if(!name){showToast("技名を入力してください");return;}
  const desc=document.getElementById("edit-desc").value.trim(),count=document.getElementById("edit-count").value.trim();

window.deleteMove=async function(id){

window.deleteVideo=async function(id){
  if(!confirm("この動画を削除しますか？"))return;
  await updateDoc(doc(db,"moves",id),{videoUrl:""});

window.closeDetail=function(){document.getElementById("detail-screen").classList.remove("open");}
window.handleVideoUpload=function(e,id){const f=e.target.files[0];if(f)window.uploadToCloudinary(f,id);}
window.uploadToCloudinary=async function(file,moveId){
  const bar=document.getElementById(`progress-bar-${moveId}`),fill=document.getElementById(`progress-fill-${moveId}`);
  if(bar)bar.style.display="block";
  const fd=new FormData();fd.append("file",file);fd.append("upload_preset",UPLOAD_PRESET);
  const xhr=new XMLHttpRequest();
  xhr.upload.onprogress=e=>{if(e.lengthComputable&&fill)fill.style.width=(e.loaded/e.total*100)+"%";};
  xhr.onload=async function(){
    if(xhr.status===200){const res=JSON.parse(xhr.responseText);await updateDoc(doc(db,"moves",moveId),{videoUrl:res.secure_url});moves=moves.map(m=>m.id===moveId?{...m,videoUrl:res.secure_url}:m);showToast("アップロード完了！");window.showDetail(moveId);}
    else{showToast("アップロード失敗");if(bar)bar.style.display="none";}
  };
  xhr.onerror=()=>{showToast("通信エラー");if(bar)bar.style.display="none";};
  xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);xhr.send(fd);
}
window.handleAddVideoSelect=function(e){const f=e.target.files[0];if(!f)return;const p=document.getElementById("add-video-preview");p.src=URL.createObjectURL(f);p.style.display="block";window._pendingVideoFile=f;}
const addDz=document.getElementById("add-drop-zone");
addDz.addEventListener("dragover",e=>{e.preventDefault();addDz.classList.add("dragover");});
addDz.addEventListener("dragleave",()=>addDz.classList.remove("dragover"));
addDz.addEventListener("drop",e=>{e.preventDefault();e.stopPropagation();addDz.classList.remove("dragover");const f=e.dataTransfer?.files?.[0];if(f&&f.type.startsWith("video/")){const p=document.getElementById("add-video-preview");p.src=URL.createObjectURL(f);p.style.display="block";window._pendingVideoFile=f;}});
window.addToSet=function(id){const m=moves.find(x=>x.id===id);if(!m)return;setMoves.push(m);renderSetArea();showToast(`${m.name}を追加`);}
window.addToSetFromDetail=function(id){window.addToSet(id);window.closeDetail();switchTab("set",document.querySelectorAll(".tab")[1]);}
window.removeFromSet=i=>{setMoves.splice(i,1);renderSetArea();}
window.saveSet=async function(){
  const name=document.getElementById("set-name").value||"セット"+(sets.length+1);
  if(!setMoves.length){showToast("技を追加してください");return;}
  const d=window[`_td_set-tag-editor-create`];const tags=d?d.tags:[];
  await addDoc(collection(db,"sets"),{name,moves:setMoves.map(m=>({id:m.id,name:m.name,count:m.count||null})),tags,createdAt:Date.now()});
  setMoves=[];newSetTags=[];document.getElementById("set-name").value="";renderSetArea();
  renderTagEditor("set-tag-editor-create",[],tags=>{newSetTags=tags;});
  showToast("セットを保存しました！");await loadSets();switchTab("saved",document.querySelectorAll(".tab")[0]);
}
window.deleteSet=async function(id){
  if(!confirm("このセットを削除しますか？"))return;
  await deleteDoc(doc(db,"sets",id));sets=sets.filter(f=>f.id!==id);renderSaved();showToast("削除しました");
}
window.openAddMove=function(){
  window._pendingVideoFile=null;newMoveTags=[];
  document.getElementById("add-video-preview").style.display="none";
  document.getElementById("add-video-preview").src="";
  document.getElementById("add-move-screen").classList.add("open");
  renderTagEditor("new-tag-editor",[],tags=>{newMoveTags=tags;});
}
window.closeAddMove=()=>document.getElementById("add-move-screen").classList.remove("open");
window.selectType=function(el){document.querySelectorAll("#type-select .type-opt").forEach(e=>e.classList.remove("active"));el.classList.add("active");selectedType=el.dataset.type;}
window.submitMove=async function(){
  const name=document.getElementById("new-name").value.trim();if(!name){showToast("技名を入力してください");return;}
  const desc=document.getElementById("new-desc").value.trim(),count=document.getElementById("new-count").value.trim();
  let videoUrl="";
  if(window._pendingVideoFile){showToast("動画アップロード中...");videoUrl=await uploadVideoForNew(window._pendingVideoFile);}
  await addDoc(collection(db,"moves"),{name,type:selectedType,desc,count:count||null,tags:newMoveTags,videoUrl,createdAt:Date.now()});
  ["new-name","new-desc","new-count"].forEach(id=>document.getElementById(id).value="");
  window._pendingVideoFile=null;newMoveTags=[];document.getElementById("add-video-preview").style.display="none";
  window.closeAddMove();showToast("技を追加しました！");await loadMoves();
}
function uploadVideoForNew(file){
  return new Promise(resolve=>{
    const bar=document.getElementById("add-upload-progress"),fill=document.getElementById("add-upload-fill");bar.style.display="block";
    const fd=new FormData();fd.append("file",file);fd.append("upload_preset",UPLOAD_PRESET);
    const xhr=new XMLHttpRequest();
    xhr.upload.onprogress=e=>{if(e.lengthComputable)fill.style.width=(e.loaded/e.total*100)+"%";};
    xhr.onload=function(){bar.style.display="none";if(xhr.status===200){const res=JSON.parse(xhr.responseText);resolve(res.secure_url);}else{showToast("動画アップロード失敗");resolve("");}};
    xhr.onerror=()=>{bar.style.display="none";resolve("");};
    xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);xhr.send(fd);
  });
}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}
