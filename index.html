<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BreakinSetBuilder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh}
.app{max-width:600px;margin:0 auto;padding:0 24px 80px}
.header{padding:20px 0 12px;border-bottom:1px solid #222}
.header h1{font-size:20px;font-weight:700;color:#fff}
.header p{font-size:12px;color:#666;margin-top:2px}
.tabs{display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:#111;border-top:1px solid #222;z-index:100}
.tab{flex:1;padding:10px 4px 14px;font-size:10px;border:none;background:transparent;color:#666;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color 0.15s}
.tab.active{color:#fff}
.tab-icon{font-size:18px}
.section{padding:12px 0;display:none}
.section.active{display:block}
.search-box{width:100%;padding:10px 14px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px;margin-bottom:12px}
.search-box::placeholder{color:#555}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tag-chip{padding:5px 12px;border-radius:20px;border:1px solid #333;background:#1a1a1a;color:#888;font-size:12px;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.tag-chip.active{background:#fff;color:#000;border-color:#fff}
.move-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s}
.move-card:hover{border-color:#444}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.card-name{font-size:15px;font-weight:600;color:#fff}
.type-badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.type-foot{background:#0d3320;color:#4ade80}
.type-freeze{background:#0d1f3c;color:#60a5fa}
.type-power{background:#3c1a0d;color:#fb923c}
.type-combo{background:#2a0d3c;color:#c084fc}
.card-desc{font-size:12px;color:#888;line-height:1.5;margin-bottom:8px}
.card-tags{display:flex;gap:5px;flex-wrap:wrap}
.mini-tag{font-size:10px;padding:2px 8px;border-radius:20px;background:#222;color:#666;border:1px solid #333}
.card-dropdown{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #2a2a2a}
.card-dropdown.open{display:block}
.card-dropdown-desc{font-size:13px;color:#ccc;line-height:1.6;margin-bottom:10px;background:#111;border-radius:10px;padding:10px}
.card-dropdown-btns{display:flex;gap:8px}
.card-dropdown-btn{flex:1;padding:8px;font-size:12px;border-radius:10px;border:1px solid #444;background:transparent;color:#aaa;cursor:pointer}
.card-dropdown-btn.accent{border-color:#fff;color:#fff}
.detail-screen{position:fixed;inset:0;background:#0f0f0f;z-index:200;overflow-y:auto;transform:translateX(100%);transition:transform 0.25s ease}
.detail-screen.open{transform:translateX(0)}
.edit-screen{position:fixed;inset:0;background:#0f0f0f;z-index:250;overflow-y:auto;transform:translateX(100%);transition:transform 0.25s ease}
.edit-screen.open{transform:translateX(0)}
.detail-header{display:flex;align-items:center;gap:12px;padding:16px 24px;border-bottom:1px solid #222;position:sticky;top:0;background:#0f0f0f;z-index:10}
.back-btn{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:8px 14px;color:#fff;font-size:13px;cursor:pointer}
.edit-btn{background:#1a1a1a;border:1px solid #555;border-radius:10px;padding:8px 14px;color:#aaa;font-size:13px;cursor:pointer;margin-left:auto}
.detail-name{font-size:18px;font-weight:700;color:#fff}
.detail-body{padding:16px 24px;max-width:600px;margin:0 auto}
.detail-section-title{font-size:11px;font-weight:600;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;margin-top:16px}
.detail-desc-box{background:#1a1a1a;border-radius:12px;padding:14px;font-size:14px;color:#ccc;line-height:1.7}
.drop-zone{border:2px dashed #333;border-radius:14px;padding:20px;text-align:center;color:#555;font-size:13px;transition:all 0.2s;margin-bottom:6px}
.drop-zone.dragover{border-color:#fff;color:#fff;background:#1a1a1a}
.drop-zone input[type=file]{display:none}
.upload-btn{width:100%;padding:10px;background:#1a1a1a;border:1px solid #444;border-radius:12px;color:#aaa;font-size:13px;cursor:pointer;margin-bottom:6px}
.upload-btn:hover{border-color:#fff;color:#fff}
.video-wrapper{position:relative;width:100%;padding-top:56.25%;margin-bottom:10px;border-radius:12px;overflow:hidden;background:#111}
.video-wrapper video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;background:#000}
.delete-video-btn{width:100%;padding:9px;background:transparent;color:#ff4444;border:1px solid #ff4444;border-radius:12px;font-size:13px;font-weight:600;margin-bottom:8px;cursor:pointer}
.progress-bar-upload{width:100%;height:4px;background:#222;border-radius:2px;margin-bottom:10px;overflow:hidden;display:none}
.progress-fill-upload{height:100%;background:#fff;border-radius:2px;transition:width 0.3s}
.add-to-set-btn{width:100%;padding:12px;background:#1a1a1a;border:1px solid #444;border-radius:12px;color:#fff;font-size:14px;font-weight:600;margin-top:16px;cursor:pointer}
.delete-move-btn{width:100%;padding:10px;background:transparent;color:#ff4444;border:1px solid #ff4444;border-radius:12px;font-size:13px;font-weight:600;margin-top:8px;cursor:pointer}
.set-builder{padding:16px 0}
.set-name-input{width:100%;padding:12px 14px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px;margin-bottom:10px}
.set-name-input::placeholder{color:#555}
.set-area{min-height:80px;border:1px dashed #333;border-radius:14px;padding:12px;margin-bottom:14px}
.set-empty{text-align:center;color:#555;font-size:13px;padding:20px 0}
.set-node{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.set-pill{background:#1a1a1a;border:1px solid #333;border-radius:20px;padding:6px 14px;font-size:13px;color:#fff;display:flex;align-items:center;gap:8px;flex:1}
.set-pill-remove{color:#555;cursor:pointer;font-size:16px;margin-left:auto}
.set-arrow{color:#444;font-size:18px}
.count-badge{font-size:10px;padding:2px 7px;background:#333;border-radius:20px;color:#aaa}
.eight-badge{font-size:11px;padding:3px 9px;background:#1a1a1a;border:1px solid #333;border-radius:20px;color:#888;margin-bottom:12px;display:inline-block}
.save-set-btn{width:100%;padding:12px;background:#fff;color:#000;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:14px}
.pick-title{font-size:13px;font-weight:600;color:#888;margin-bottom:10px}
.pick-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:10px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border-color 0.15s}
.pick-card:hover{border-color:#555}
.pick-card-name{font-size:14px;color:#fff}
.pick-plus{font-size:20px;color:#555}
.saved-set-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s}
.saved-set-card:hover{border-color:#444}
.saved-set-name{font-size:15px;font-weight:600;color:#fff;margin-bottom:6px}
.saved-set-seq{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.seq-pill{font-size:11px;padding:3px 10px;background:#222;border:1px solid #333;border-radius:20px;color:#aaa}
.seq-arrow{color:#444;font-size:12px}
.delete-set-btn{font-size:11px;color:#555;background:none;border:none;cursor:pointer;padding:0}
.play-set-btn{font-size:12px;color:#fff;background:#222;border:1px solid #444;border-radius:8px;cursor:pointer;padding:5px 12px}
.add-move-screen{position:fixed;inset:0;background:#0f0f0f;z-index:300;overflow-y:auto;transform:translateY(100%);transition:transform 0.25s ease}
.add-move-screen.open{transform:translateY(0)}
.add-move-body{padding:16px 24px;max-width:600px;margin:0 auto}
.fab{position:fixed;bottom:80px;right:calc(50% - 280px);width:52px;height:52px;border-radius:50%;background:#fff;color:#000;font-size:26px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:99;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
@media(max-width:648px){.fab{right:20px}}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:#888;margin-bottom:6px;display:block}
.form-input{width:100%;padding:10px 14px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px}
.form-input::placeholder{color:#555}
.form-textarea{width:100%;padding:10px 14px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px;min-height:100px;resize:vertical;line-height:1.6}
.form-textarea::placeholder{color:#555}
.type-select{display:flex;gap:8px;flex-wrap:wrap}
.type-opt{padding:7px 14px;border-radius:20px;border:1px solid #333;background:#1a1a1a;color:#888;font-size:13px;cursor:pointer;transition:all 0.15s}
.type-opt.active{border-color:#fff;color:#fff}
.submit-btn{width:100%;padding:14px;background:#fff;color:#000;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.empty-state{text-align:center;padding:60px 20px;color:#555}
.empty-state p{font-size:14px;margin-top:8px}
.loading{text-align:center;padding:40px;color:#555;font-size:13px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.count-input{width:100%;padding:10px 14px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px}
.count-input::placeholder{color:#555}
.add-drop-zone{border:2px dashed #333;border-radius:14px;padding:20px;text-align:center;color:#555;font-size:13px;transition:all 0.2s;margin-bottom:6px}
.add-drop-zone.dragover{border-color:#fff;color:#fff;background:#1a1a1a}
.add-drop-zone input[type=file]{display:none}
.add-video-preview{width:100%;border-radius:12px;margin-top:10px;max-height:180px;object-fit:contain;background:#000;display:none}
.upload-progress{width:100%;height:4px;background:#222;border-radius:2px;margin-top:8px;overflow:hidden;display:none}
.upload-progress-fill{height:100%;background:#fff;border-radius:2px;transition:width 0.3s}
/* タグ編集UI */
.tag-editor{margin-bottom:14px}
.tag-editor-current{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;min-height:28px}
.tag-editor-tag{font-size:12px;padding:3px 10px;border-radius:20px;background:#222;border:1px solid #333;color:#ccc;display:flex;align-items:center;gap:5px}
.tag-editor-tag .tag-x{color:#666;cursor:pointer;font-size:14px;line-height:1}
.tag-editor-tag .tag-x:hover{color:#ff4444}
.tag-candidates{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tag-candidate{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid #333;background:#1a1a1a;color:#888;cursor:pointer;transition:all 0.15s}
.tag-candidate:hover{border-color:#fff;color:#fff}
.tag-input-row{display:flex;gap:8px}
.tag-input-row input{flex:1;padding:8px 12px;background:#1a1a1a;border:1px solid #333;border-radius:10px;color:#fff;font-size:13px}
.tag-input-row input::placeholder{color:#555}
.tag-input-row button{padding:8px 14px;background:#fff;color:#000;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
/* ビート管理 */
.beat-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;padding:14px;margin-bottom:10px}
.beat-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.beat-card-name{font-size:14px;font-weight:600;color:#fff}
.beat-card-desc{font-size:12px;color:#666}
.beat-active-badge{font-size:10px;padding:2px 8px;background:#1a3320;border:1px solid #4ade80;border-radius:20px;color:#4ade80}
.beat-select-btn{font-size:12px;padding:5px 12px;background:#222;border:1px solid #444;border-radius:8px;color:#aaa;cursor:pointer}
.beat-select-btn.active{background:#fff;color:#000;border-color:#fff}
/* プレイヤー */
.player-screen{position:fixed;inset:0;background:#000;z-index:400;display:none;flex-direction:column}
.player-screen.open{display:flex}
.player-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #1a1a1a}
.player-title{font-size:14px;font-weight:700;color:#fff;flex:1}
.player-beat-select{background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;font-size:12px;padding:5px 8px;margin-right:8px}
.player-close{background:none;border:1px solid #333;border-radius:8px;padding:6px 12px;color:#aaa;font-size:12px;cursor:pointer}
.carousel-area{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden;position:relative}
.carousel-track{display:flex;align-items:center;gap:12px;transition:transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);will-change:transform}
.carousel-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;padding:20px;min-width:220px;max-width:220px;text-align:center;transition:all 0.4s;opacity:0.35;transform:scale(0.8);cursor:pointer;flex-shrink:0}
.carousel-card.active{opacity:1;transform:scale(1.1);border-color:#fff;background:#1e1e1e}
.carousel-card-name{font-size:20px;font-weight:700;color:#fff;margin-bottom:8px}
.carousel-card-count{font-size:13px;color:#888;margin-bottom:6px}
.carousel-card-num{font-size:11px;color:#444}
.player-controls{padding:12px 16px 20px}
.progress-section{margin-bottom:12px}
.progress-time-row{display:flex;justify-content:space-between;font-size:11px;color:#555;margin-bottom:6px}
.progress-track{width:100%;height:6px;background:#1a1a1a;border-radius:3px;cursor:pointer;position:relative}
.progress-markers{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.progress-marker{position:absolute;top:0;width:1px;height:100%;background:#333}
.progress-played{height:100%;background:#fff;border-radius:3px;transition:width 0.1s linear;position:relative;z-index:1}
.ctrl-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.bpm-display{font-size:12px;color:#666}
.bpm-display span{color:#fff;font-weight:600}
.speed-btns{display:flex;gap:6px}
.speed-btn{padding:5px 10px;background:#1a1a1a;border:1px solid #333;border-radius:20px;color:#666;font-size:11px;cursor:pointer;transition:all 0.15s}
.speed-btn.active{background:#fff;color:#000;border-color:#fff}
.play-pause-btn{width:100%;padding:13px;background:#fff;color:#000;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.set-detail-screen{position:fixed;inset:0;background:#0f0f0f;z-index:350;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s ease}
.set-detail-screen.open{transform:translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>BreakinSetBuilder</h1>
    <p>技を管理してセットを組み立てる</p>
  </div>
  <div id="sec-moves" class="section active">
    <input class="search-box" type="text" placeholder="技を検索..." oninput="filterMoves(this.value)" id="search-input">
    <div class="tag-row" id="tag-row"></div>
    <div id="moves-list"></div>
  </div>
  <div id="sec-set" class="section">
    <div class="set-builder">
      <input class="set-name-input" type="text" placeholder="セット名（例：バトル用コンボA）" id="set-name">
      <div id="set-tag-editor-create"></div>
      <div id="set-eight-count" class="eight-badge" style="display:none"></div>
      <div class="set-area" id="set-area"><div class="set-empty">下から技を選んで追加</div></div>
      <button class="save-set-btn" onclick="saveSet()">セットを保存</button>
      <div class="pick-title">技を選ぶ</div>
      <div id="pick-list"></div>
    </div>
  </div>
  <div id="sec-saved" class="section">
    <div style="padding:12px 0" id="saved-list"></div>
  </div>
  <div id="sec-beats" class="section">
    <div id="beat-list"></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('moves',this)"><span class="tab-icon">🃏</span>技カード</button>
  <button class="tab" onclick="switchTab('set',this)"><span class="tab-icon">⚡</span>セット作成</button>
  <button class="tab" onclick="switchTab('saved',this)"><span class="tab-icon">📋</span>保存済み</button>
  <button class="tab" onclick="switchTab('beats',this)"><span class="tab-icon">🎵</span>ビート</button>
</div>

<button class="fab" onclick="openAddMove()" id="fab">+</button>

<div class="detail-screen" id="detail-screen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">← 戻る</button>
    <span class="detail-name" id="detail-name"></span>
    <button class="edit-btn" id="detail-edit-btn">✏️ 編集</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<div class="edit-screen" id="edit-screen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeEdit()">← 戻る</button>
    <span class="detail-name">技を編集</span>
  </div>
  <div class="add-move-body" id="edit-body"></div>
</div>

<div class="add-move-screen" id="add-move-screen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeAddMove()">← 戻る</button>
    <span class="detail-name">新しい技を追加</span>
  </div>
  <div class="add-move-body">
    <div class="form-group">
      <label class="form-label">技名</label>
      <input class="form-input" type="text" id="new-name" placeholder="例：ゴブレット">
    </div>
    <div class="form-group">
      <label class="form-label">種類</label>
      <div class="type-select" id="type-select">
        <span class="type-opt active" data-type="foot" onclick="selectType(this)">フットワーク</span>
        <span class="type-opt" data-type="freeze" onclick="selectType(this)">フリーズ</span>
        <span class="type-opt" data-type="power" onclick="selectType(this)">パワー</span>
        <span class="type-opt" data-type="combo" onclick="selectType(this)">コンボ</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">説明・動き方のメモ</label>
      <textarea class="form-textarea" id="new-desc" placeholder="動きの流れを書いておこう"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">カウント数</label>
      <input class="count-input" type="number" id="new-count" placeholder="例：8">
    </div>
    <div class="form-group">
      <label class="form-label">タグ</label>
      <div id="new-tag-editor"></div>
    </div>
    <div class="form-group">
      <label class="form-label">動画（任意）</label>
      <div class="add-drop-zone" id="add-drop-zone">
        <input type="file" id="add-file-input" accept="video/*" onchange="handleAddVideoSelect(event)">
        📹 ここにドラッグ＆ドロップ
      </div>
      <button class="upload-btn" onclick="document.getElementById('add-file-input').click()">📁 ファイルを選択</button>
      <div class="upload-progress" id="add-upload-progress"><div class="upload-progress-fill" id="add-upload-fill" style="width:0%"></div></div>
      <video class="add-video-preview" id="add-video-preview" muted playsinline controls></video>
    </div>
    <button class="submit-btn" onclick="submitMove()">追加する</button>
  </div>
</div>

<div class="set-detail-screen" id="set-detail-screen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeSetDetail()">← 戻る</button>
    <span class="detail-name" id="set-detail-name"></span>
  </div>
  <div class="detail-body" id="set-detail-body"></div>
</div>

<div class="player-screen" id="player-screen">
  <div class="player-header">
    <span class="player-title" id="player-title"></span>
    <select class="player-beat-select" id="player-beat-select" onchange="changeBeat(this.value)"></select>
    <button class="player-close" onclick="closePlayer()">✕</button>
  </div>
  <div class="carousel-area" id="carousel-area">
    <div class="carousel-track" id="carousel-track"></div>
  </div>
  <div class="player-controls">
    <div class="progress-section">
      <div class="progress-time-row">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>
      <div class="progress-track" id="progress-track" onclick="seekTo(event)">
        <div class="progress-markers" id="progress-markers"></div>
        <div class="progress-played" id="progress-played" style="width:0%"></div>
      </div>
    </div>
    <div class="ctrl-row">
      <div class="bpm-display">BPM <span id="bpm-display">95</span></div>
      <div class="speed-btns">
        <button class="speed-btn active" onclick="setSpeed(0.5,this)">×0.5</button>
        <button class="speed-btn" onclick="setSpeed(1,this)">×1</button>

let moves=[],sets=[],setMoves=[],customTags=[];

// ===== BEATS =====
const BEATS={
  hiphop:{name:"HipHop Classic",bpm:95,desc:"オーソドックスなHIPHOPビート"},

// ===== AUDIO =====
let audioCtx=null;
let isPlaying=false;
let speedMult=1;
let beatInterval=null;
let beatCount=0;
let totalBeats=0;

let currentMoveIdx=0;

function getCtx(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playHipHopBeat(beat,bpm){
  const ctx=getCtx();
  const now=ctx.currentTime;
  const spb=60/bpm;
  // kick pattern: 1,3 of each bar (every 2 beats in 8-count = beats 0,4)
  const kickBeats=[0,4];
  // snare: 2,4 of bar = beats 2,6
  const snareBeats=[2,6];
  // hihat: every beat
  const pos=beat%8;
  const is4EightAccent=(beat%32===0);
  const is1EightAccent=(beat%8===0);

  // Kick
  if(kickBeats.includes(pos)||is4EightAccent){
    const osc=ctx.createOscillator();
    const g=ctx.createGain();
    osc.connect(g);g.connect(ctx.destination);
    osc.frequency.setValueAtTime(is4EightAccent?80:60,now);
    osc.frequency.exponentialRampToValueAtTime(30,now+0.15);
    g.gain.setValueAtTime(is4EightAccent?1.0:0.7,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
    osc.start(now);osc.stop(now+0.25);
  }
  // Snare
  if(snareBeats.includes(pos)){
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.15,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
    const src=ctx.createBufferSource();
    const g=ctx.createGain();
    const filt=ctx.createBiquadFilter();
    filt.type="bandpass";filt.frequency.value=2000;
    src.buffer=buf;src.connect(filt);filt.connect(g);g.connect(ctx.destination);
    g.gain.setValueAtTime(0.5,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
    src.start(now);
  }
  // Hi-hat
  {
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.05,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
    const src=ctx.createBufferSource();
    const g=ctx.createGain();
    const filt=ctx.createBiquadFilter();
    filt.type="highpass";filt.frequency.value=8000;
    src.buffer=buf;src.connect(filt);filt.connect(g);g.connect(ctx.destination);
    const isOpen=pos===6;
    g.gain.setValueAtTime(isOpen?0.3:0.15,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+(isOpen?0.12:0.04));
    src.start(now);
  }
  // 4エイトアクセント: 追加サウンド
  if(is4EightAccent&&beat>0){
    const osc=ctx.createOscillator();
    const g=ctx.createGain();
    osc.connect(g);g.connect(ctx.destination);
    osc.type="sawtooth";
    osc.frequency.setValueAtTime(220,now);
    osc.frequency.exponentialRampToValueAtTime(110,now+0.3);
    g.gain.setValueAtTime(0.3,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.3);
    osc.start(now);osc.stop(now+0.3);
  }
  // 1エイトマーク: 軽いアクセント
  else if(is1EightAccent&&beat>0){
    const osc=ctx.createOscillator();
    const g=ctx.createGain();
    osc.connect(g);g.connect(ctx.destination);
    osc.frequency.value=180;
    g.gain.setValueAtTime(0.15,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.08);
    osc.start(now);osc.stop(now+0.08);
  }
}

function getBPM(){return Math.round(BEATS[currentBeatKey].bpm*speedMult);}

function startPlayer(setData){
  currentSetMoves=setData.moves||[];
  if(currentSetMoves.length===0)return;
  document.getElementById("player-title").textContent=setData.name;
  // populate beat select
  const sel=document.getElementById("player-beat-select");
  sel.innerHTML=Object.entries(BEATS).map(([k,v])=>`<option value="${k}"${k===currentBeatKey?" selected":""}>${v.name}</option>`).join("");
  currentBeatKey=selectedBeatKey;
  speedMult=1;
  beatCount=0;currentMoveIdx=0;isPlaying=false;
  beatsPerMove=currentSetMoves.map(m=>parseInt(m.count)||8);
  totalBeats=beatsPerMove.reduce((a,b)=>a+b,0);
  document.getElementById("bpm-display").textContent=getBPM();
  document.querySelectorAll(".speed-btn").forEach((b,i)=>b.classList.toggle("active",i===1));
  renderCarousel(0);
  renderProgressMarkers();
  updateTimeDisplay();
  document.getElementById("progress-played").style.width="0%";
  document.getElementById("play-pause-btn").textContent="▶ 再生";
  document.getElementById("player-screen").classList.add("open");
}

function renderProgressMarkers(){
  const el=document.getElementById("progress-markers");
  const marks=[];
  let cum=0;
  for(let i=0;i<beatsPerMove.length-1;i++){
    cum+=beatsPerMove[i];
    marks.push(`<div class="progress-marker" style="left:${(cum/totalBeats)*100}%"></div>`);
  }
  // 8カウントごと
  for(let i=8;i<totalBeats;i+=8){
    marks.push(`<div class="progress-marker" style="left:${(i/totalBeats)*100}%;background:#444;height:150%;top:-25%"></div>`);
  }
  el.innerHTML=marks.join("");
}

function updateTimeDisplay(){
  const bpmActual=getBPM();
  const secPerBeat=60/bpmActual;
  const totalSec=totalBeats*secPerBeat;
  const curSec=beatCount*secPerBeat;
  document.getElementById("time-current").textContent=formatTime(curSec);
  document.getElementById("time-total").textContent=formatTime(totalSec);
}

function formatTime(sec){
  const m=Math.floor(sec/60);
  const s=Math.floor(sec%60);
  return `${m}:${s.toString().padStart(2,"0")}`;
}

function renderCarousel(activeIdx){
  const track=document.getElementById("carousel-track");
  track.innerHTML=currentSetMoves.map((m,i)=>`
    <div class="carousel-card${i===activeIdx?" active":""}" onclick="window.openMoveFromPlayer('${m.id}')">
      <div class="carousel-card-name">${m.name}</div>
      <div class="carousel-card-count">${m.count?m.count+"カウント":""}</div>
      <div class="carousel-card-num">${i+1} / ${currentSetMoves.length}</div>
    </div>`).join("");
  const area=document.getElementById("carousel-area");
  const areaW=area.offsetWidth;
  const cardW=232;
  const gap=12;
  const offset=areaW/2-cardW/2-activeIdx*(cardW+gap);
  track.style.transform=`translateX(${offset}px)`;
}

function tickBeat(){
  playHipHopBeat(beatCount,BEATS[currentBeatKey].bpm);
  let cum=0;
  for(let i=0;i<beatsPerMove.length;i++){
    cum+=beatsPerMove[i];
    if(beatCount<cum){if(i!==currentMoveIdx){currentMoveIdx=i;renderCarousel(i);}break;}
  }
  const pct=Math.min((beatCount/totalBeats)*100,100);
  document.getElementById("progress-played").style.width=pct+"%";
  updateTimeDisplay();
  beatCount++;
  if(beatCount>=totalBeats){beatCount=0;currentMoveIdx=0;renderCarousel(0);document.getElementById("progress-played").style.width="0%";}
}

window.togglePlay=function(){
  if(isPlaying){
    clearInterval(beatInterval);isPlaying=false;
    document.getElementById("play-pause-btn").textContent="▶ 再生";
  } else {
    getCtx().resume();
    const ms=60000/getBPM();
    beatInterval=setInterval(tickBeat,ms);
    isPlaying=true;
    document.getElementById("play-pause-btn").textContent="⏸ 一時停止";
  }
}

window.setSpeed=function(mult,el){
  speedMult=mult;
  document.querySelectorAll(".speed-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("bpm-display").textContent=getBPM();
  updateTimeDisplay();
  if(isPlaying){clearInterval(beatInterval);const ms=60000/getBPM();beatInterval=setInterval(tickBeat,ms);}
}

window.seekTo=function(e){
  const rect=document.getElementById("progress-track").getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  beatCount=Math.floor(pct*totalBeats);
  document.getElementById("progress-played").style.width=(pct*100)+"%";
  updateTimeDisplay();
}

window.changeBeat=function(key){currentBeatKey=key;document.getElementById("bpm-display").textContent=getBPM();updateTimeDisplay();}

window.closePlayer=function(){
  clearInterval(beatInterval);isPlaying=false;
  document.getElementById("player-screen").classList.remove("open");
  document.getElementById("play-pause-btn").textContent="▶ 再生";
}

function getAllTags(){
  const s=new Set();
  moves.forEach(m=>(m.tags||[]).forEach(t=>s.add(t)));
  sets.forEach(f=>(f.tags||[]).forEach(t=>s.add(t)));
  customTags.forEach(t=>s.add(t.name));
  return [...s];
}

function renderTagEditor(containerId,currentTags,onUpdate){
  const all=getAllTags().filter(t=>!currentTags.includes(t));
  const el=document.getElementById(containerId);
  if(!el)return;
  el.innerHTML=`
    <div class="tag-editor">
      <div class="tag-editor-current" id="${containerId}-current">
        ${currentTags.map(t=>`<span class="tag-editor-tag">${t}<span class="tag-x" onclick="removeTagFrom('${containerId}','${t}')">×</span></span>`).join("")}
      </div>
      ${all.length>0?`<div class="tag-candidates">${all.map(t=>`<span class="tag-candidate" onclick="addTagTo('${containerId}','${t}')">${t}</span>`).join("")}</div>`:""}
      <div class="tag-input-row">
        <input type="text" id="${containerId}-input" placeholder="新しいタグを入力...">
        <button onclick="addTagFrom('${containerId}')">追加</button>
      </div>
    </div>`;
  window[`_tagData_${containerId}`]={tags:currentTags,onUpdate};
}

window.addTagTo=function(cid,tag){
  const d=window[`_tagData_${cid}`];
  if(!d||d.tags.includes(tag))return;
  d.tags.push(tag);
  d.onUpdate(d.tags);
  renderTagEditor(cid,d.tags,d.onUpdate);
}

window.removeTagFrom=function(cid,tag){
  const d=window[`_tagData_${cid}`];
  if(!d)return;
  d.tags=d.tags.filter(t=>t!==tag);
  d.onUpdate(d.tags);
  renderTagEditor(cid,d.tags,d.onUpdate);
}

window.addTagFrom=function(cid){
  const input=document.getElementById(`${cid}-input`);
  const tag=input.value.trim();
  if(!tag)return;
  window.addTagTo(cid,tag);
  input.value="";
}

async function loadMoves(){
  document.getElementById("moves-list").innerHTML='<div class="loading">読み込み中...</div>';

  const snap=await getDocs(q);
  moves=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderTagRow();renderMoves();renderPickList();
}

async function loadSets(){
  const q=query(collection(db,"sets"),orderBy("createdAt","desc"));
  const snap=await getDocs(q);
  sets=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderSaved();
}

async function loadCustomTags(){
  const snap=await getDocs(collection(db,"customTags"));
  customTags=snap.docs.map(d=>({id:d.id,...d.data()}));
}

function allFilterTags(){
  const s=new Set(["全て"]);
  moves.forEach(m=>(m.tags||[]).forEach(t=>s.add(t)));

}

function renderTagRow(){

function filteredMoves(){
  return moves.filter(m=>{
    const q=searchQ.toLowerCase();
    const matchQ=!q||m.name.toLowerCase().includes(q)||(m.desc||"").includes(q)||(m.tags||[]).some(t=>t.includes(q));
    const matchT=activeTag==="全て"||(m.tags||[]).includes(activeTag);
    return matchQ&&matchT;
  });
}

  const list=filteredMoves();

  el.innerHTML=list.map(m=>`
    <div class="move-card" id="card-${m.id}" onclick="window.toggleCard('${m.id}')">
      <div class="card-head">

        <span class="type-badge ${typeClass[m.type]||'type-foot'}">${typeLabel[m.type]||m.type}</span>

      ${m.count?`<div style="font-size:11px;color:#666;margin-bottom:6px">カウント：${m.count}</div>`:""}

  const dd=document.getElementById(`dropdown-${id}`);
  if(!dd)return;
  if(openCardId&&openCardId!==id){
    const prev=document.getElementById(`dropdown-${openCardId}`);
    if(prev)prev.classList.remove("open");
  }
  dd.classList.toggle("open");
  openCardId=dd.classList.contains("open")?id:null;
}

function renderPickList(){
  document.getElementById("pick-list").innerHTML=moves.map(m=>`
    <div class="pick-card" onclick="window.addToSet('${m.id}')">
      <span class="pick-card-name">${m.name}${m.count?` <span class="count-badge">${m.count}ct</span>`:""}</span>
      <span class="pick-plus">＋</span>
    </div>`).join("");
}

function calcEights(){
  const total=setMoves.reduce((a,m)=>a+(parseInt(m.count)||8),0);
  return {beats:total,eights:Math.round(total/8*10)/10};
}

function renderSetArea(){
  const el=document.getElementById("set-area");
  const badge=document.getElementById("set-eight-count");
  if(setMoves.length===0){
    el.innerHTML='<div class="set-empty">下から技を選んで追加</div>';
    badge.style.display="none";return;
  }
  const {beats,eights}=calcEights();
  badge.style.display="inline-block";
  badge.textContent=`合計 ${eights} エイト（${beats}カウント）`;
  el.innerHTML=setMoves.map((m,i)=>`
    <div class="set-node">
      ${i>0?'<span class="set-arrow">↓</span>':"<span style='width:18px'></span>"}

    return `
    <div class="saved-set-card" onclick="window.openSetDetail('${f.id}')">

        </div>

    </div>`;
  }).join("");

function renderBeatList(){
  const el=document.getElementById("beat-list");

window.openSetDetail=function(id){

  document.getElementById("set-detail-body").innerHTML=`
    <div style="margin-bottom:16px">
      <button style="width:100%;padding:14px;background:#fff;color:#000;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer" onclick="window.playSet('${id}')">▶ セットを再生</button>
    </div>
    ${(s.tags||[]).length>0?`<div class="card-tags" style="margin-bottom:12px">${s.tags.map(t=>`<span class="mini-tag">${t}</span>`).join("")}</div>`:""}
    <div class="detail-section-title">構成（${s.moves.length}技・${eights}エイト）</div>
    ${s.moves.map((m,i)=>`
      <div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="window.showDetail('${m.id}')">
        <span style="font-size:12px;color:#555;min-width:20px">${i+1}</span>
        <span style="font-size:14px;color:#fff;flex:1">${m.name}</span>
        ${m.count?`<span class="count-badge">${m.count}ct</span>`:""}
        <span style="font-size:12px;color:#555">→</span>
      </div>`).join("")}
    <button class="delete-move-btn" style="margin-top:16px" onclick="if(confirm('このセットを削除しますか？')){window.deleteSet('${id}');window.closeSetDetail();}">🗑 このセットを削除</button>
  `;
  document.getElementById("set-detail-screen").classList.add("open");
}

window.closeSetDetail=()=>document.getElementById("set-detail-screen").classList.remove("open");

window.playSet=function(id){
  const s=sets.find(x=>x.id===id);
  if(!s)return;
  document.getElementById("set-detail-screen").classList.remove("open");
  startPlayer(s);
}

window.openEdit=function(id){
  const m=moves.find(x=>x.id===id);
  if(!m)return;
  editType=m.type||"foot";
  editMoveTags=[...(m.tags||[])];
  document.getElementById("edit-body").innerHTML=`
    <div class="form-group"><label class="form-label">技名</label><input class="form-input" type="text" id="edit-name" value="${m.name||''}"></div>
    <div class="form-group">
      <label class="form-label">種類</label>
      <div class="type-select" id="edit-type-select">
        <span class="type-opt${editType==='foot'?' active':''}" data-type="foot" onclick="selectEditType(this)">フットワーク</span>
        <span class="type-opt${editType==='freeze'?' active':''}" data-type="freeze" onclick="selectEditType(this)">フリーズ</span>
        <span class="type-opt${editType==='power'?' active':''}" data-type="power" onclick="selectEditType(this)">パワー</span>
        <span class="type-opt${editType==='combo'?' active':''}" data-type="combo" onclick="selectEditType(this)">コンボ</span>
      </div>
    </div>
    <div class="form-group"><label class="form-label">説明</label><textarea class="form-textarea" id="edit-desc">${m.desc||''}</textarea></div>
    <div class="form-group"><label class="form-label">カウント数</label><input class="count-input" type="number" id="edit-count" value="${m.count||''}"></div>
    <div class="form-group"><label class="form-label">タグ</label><div id="edit-tag-editor"></div></div>
    <button class="submit-btn" onclick="window.submitEdit('${id}')">保存する</button>
  `;
  renderTagEditor("edit-tag-editor",editMoveTags,tags=>{editMoveTags=tags;});
  document.getElementById("edit-screen").classList.add("open");
}

window.selectEditType=function(el){
  document.querySelectorAll("#edit-type-select .type-opt").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");editType=el.dataset.type;
}

window.submitEdit=async function(id){
  const name=document.getElementById("edit-name").value.trim();
  if(!name){showToast("技名を入力してください");return;}
  const desc=document.getElementById("edit-desc").value.trim();
  const count=document.getElementById("edit-count").value.trim();
  await updateDoc(doc(db,"moves",id),{name,type:editType,desc,count:count||null,tags:editMoveTags});
  moves=moves.map(m=>m.id===id?{...m,name,type:editType,desc,count:count||null,tags:editMoveTags}:m);
  showToast("保存しました！");closeEdit();window.showDetail(id);renderMoves();renderPickList();
}

window.closeEdit=()=>document.getElementById("edit-screen").classList.remove("open");

window.deleteMove=async function(id){
  if(!confirm("この技を削除しますか？"))return;
  await deleteDoc(doc(db,"moves",id));
  moves=moves.filter(m=>m.id!==id);
  renderMoves();renderPickList();renderTagRow();closeDetail();showToast("削除しました");
}

window.deleteVideo=async function(id){
  if(!confirm("この動画を削除しますか？"))return;
  await updateDoc(doc(db,"moves",id),{videoUrl:""});
  moves=moves.map(m=>m.id===id?{...m,videoUrl:""}:m);
  showToast("動画を削除しました");window.showDetail(id);
}

window.closeDetail=()=>document.getElementById("detail-screen").classList.remove("open");

window.handleVideoUpload=function(e,id){const f=e.target.files[0];if(f)window.uploadToCloudinary(f,id);}

window.uploadToCloudinary=async function(file,moveId){
  const bar=document.getElementById(`progress-bar-${moveId}`);
  const fill=document.getElementById(`progress-fill-${moveId}`);
  if(bar)bar.style.display="block";
  const fd=new FormData();
  fd.append("file",file);fd.append("upload_preset",UPLOAD_PRESET);
  const xhr=new XMLHttpRequest();
  xhr.upload.onprogress=e=>{if(e.lengthComputable&&fill)fill.style.width=(e.loaded/e.total*100)+"%";};
  xhr.onload=async function(){
    if(xhr.status===200){
      const res=JSON.parse(xhr.responseText);
      await updateDoc(doc(db,"moves",moveId),{videoUrl:res.secure_url});
      moves=moves.map(m=>m.id===moveId?{...m,videoUrl:res.secure_url}:m);
      showToast("動画をアップロードしました！");window.showDetail(moveId);
    } else {showToast("アップロード失敗");if(bar)bar.style.display="none";}
  };
  xhr.onerror=()=>{showToast("通信エラー");if(bar)bar.style.display="none";};
  xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);
  xhr.send(fd);
}

window.handleAddVideoSelect=function(e){
  const f=e.target.files[0];if(!f)return;
  const preview=document.getElementById("add-video-preview");
  preview.src=URL.createObjectURL(f);preview.style.display="block";
  window._pendingVideoFile=f;
}

const addDz=document.getElementById("add-drop-zone");
addDz.addEventListener("dragover",e=>{e.preventDefault();addDz.classList.add("dragover");});
addDz.addEventListener("dragleave",()=>addDz.classList.remove("dragover"));
addDz.addEventListener("drop",e=>{
  e.preventDefault();e.stopPropagation();addDz.classList.remove("dragover");
  const f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];
  if(f&&f.type.startsWith("video/")){
    const preview=document.getElementById("add-video-preview");
    preview.src=URL.createObjectURL(f);preview.style.display="block";
    window._pendingVideoFile=f;
  }
});

window.addToSet=function(id){
  const m=moves.find(x=>x.id===id);if(!m)return;
  setMoves.push(m);renderSetArea();showToast(`${m.name}を追加`);
}

window.addToSetFromDetail=function(id){
  window.addToSet(id);window.closeDetail();
  switchTab("set",document.querySelectorAll(".tab")[1]);
}

window.removeFromSet=i=>{setMoves.splice(i,1);renderSetArea();}

window.saveSet=async function(){
  const name=document.getElementById("set-name").value||"セット"+(sets.length+1);
  if(setMoves.length===0){showToast("技を追加してください");return;}
  const d=window[`_tagData_set-tag-editor-create`];
  const tags=d?d.tags:[];
  await addDoc(collection(db,"sets"),{name,moves:setMoves.map(m=>({id:m.id,name:m.name,count:m.count||null})),tags,createdAt:Date.now()});
  setMoves=[];newSetTags=[];
  document.getElementById("set-name").value="";
  renderSetArea();
  renderTagEditor("set-tag-editor-create",[],tags=>{newSetTags=tags;});
  showToast("セットを保存しました！");
  await loadSets();
  switchTab("saved",document.querySelectorAll(".tab")[2]);
}

window.deleteSet=async function(id){
  if(!confirm("このセットを削除しますか？"))return;
  await deleteDoc(doc(db,"sets",id));
  sets=sets.filter(f=>f.id!==id);renderSaved();showToast("削除しました");
}

window.openAddMove=()=>{
  window._pendingVideoFile=null;
  newMoveTags=[];
  document.getElementById("add-video-preview").style.display="none";
  document.getElementById("add-video-preview").src="";
  document.getElementById("add-move-screen").classList.add("open");
  renderTagEditor("new-tag-editor",[],tags=>{newMoveTags=tags;});
}
window.closeAddMove=()=>document.getElementById("add-move-screen").classList.remove("open");

window.selectType=function(el){
  document.querySelectorAll("#type-select .type-opt").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");selectedType=el.dataset.type;
}

window.submitMove=async function(){
  const name=document.getElementById("new-name").value.trim();
  if(!name){showToast("技名を入力してください");return;}
  const desc=document.getElementById("new-desc").value.trim();
  const count=document.getElementById("new-count").value.trim();
  let videoUrl="";
  if(window._pendingVideoFile){showToast("動画アップロード中...");videoUrl=await uploadVideoForNew(window._pendingVideoFile);}
  await addDoc(collection(db,"moves"),{name,type:selectedType,desc,count:count||null,tags:newMoveTags,videoUrl,createdAt:Date.now()});
  ["new-name","new-desc","new-count"].forEach(id=>document.getElementById(id).value="");
  window._pendingVideoFile=null;newMoveTags=[];
  document.getElementById("add-video-preview").style.display="none";
  window.closeAddMove();showToast("技を追加しました！");await loadMoves();
}

function uploadVideoForNew(file){
  return new Promise(resolve=>{
    const bar=document.getElementById("add-upload-progress");
    const fill=document.getElementById("add-upload-fill");
    bar.style.display="block";
    const fd=new FormData();fd.append("file",file);fd.append("upload_preset",UPLOAD_PRESET);
    const xhr=new XMLHttpRequest();
    xhr.upload.onprogress=e=>{if(e.lengthComputable)fill.style.width=(e.loaded/e.total*100)+"%";};
    xhr.onload=function(){bar.style.display="none";if(xhr.status===200){const res=JSON.parse(xhr.responseText);resolve(res.secure_url);}else{showToast("動画アップロード失敗");resolve("");}};
    xhr.onerror=()=>{bar.style.display="none";resolve("");};
    xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);xhr.send(fd);
  });
}

function showToast(msg){
  const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

window.switchTab=function(name,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById("sec-"+name).classList.add("active");
  document.getElementById("fab").style.display=name==="moves"?"flex":"none";
  if(name==="beats")renderBeatList();
}

function closeDetail(){document.getElementById("detail-screen").classList.remove("open");}

// 初期化
renderTagEditor("set-tag-editor-create",[],tags=>{newSetTags=tags;});
loadMoves();loadSets();loadCustomTags();
</script>
</body>
</html>
