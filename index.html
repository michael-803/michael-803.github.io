<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BreakinSetBuilder</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230f0f0f'/><circle cx='16' cy='8' r='3' fill='%23fff'/><line x1='16' y1='11' x2='16' y2='20' stroke='%23fff' stroke-width='2'/><line x1='16' y1='15' x2='11' y2='12' stroke='%23fff' stroke-width='2'/><line x1='16' y1='15' x2='21' y2='12' stroke='%23fff' stroke-width='2'/><line x1='16' y1='20' x2='12' y2='26' stroke='%23fff' stroke-width='2'/><line x1='16' y1='20' x2='20' y2='26' stroke='%23fff' stroke-width='2'/></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh}
.app{max-width:600px;margin:0 auto;padding:0 20px 80px}
.header{padding:18px 0 12px;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;justify-content:center;gap:10px}
.header h1{font-size:19px;font-weight:700;color:#fff;letter-spacing:0.3px}
.header p{font-size:11px;color:#444;margin-top:2px}
.tabs{display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:#0a0a0a;border-top:1px solid #1a1a1a;z-index:100}
.tab{flex:1;padding:9px 4px 13px;font-size:9px;border:none;background:transparent;color:#444;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color 0.15s;letter-spacing:0.3px}
.tab.active{color:#fff}
.tab svg{width:19px;height:19px}
.section{padding:12px 0;display:none}
.section.active{display:block}
.search-box{width:100%;padding:10px 14px;background:#141414;border:1px solid #222;border-radius:12px;color:#fff;font-size:14px;margin-bottom:12px}
.search-box::placeholder{color:#444}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
.tag-chip{padding:5px 12px;border-radius:20px;border:1px solid #222;background:#141414;color:#666;font-size:12px;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.tag-chip.active{background:#fff;color:#000;border-color:#fff}
.moves-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.move-card{background:#141414;border:1px solid #1e1e1e;border-radius:14px;padding:16px;transition:border-color 0.2s}
.move-card:hover{border-color:#333}
.move-card.expanded{border-color:#444}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;cursor:pointer}
.card-name{font-size:15px;font-weight:600;color:#fff}
.type-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;flex-shrink:0;margin-left:8px;letter-spacing:0.3px}
.type-foot{background:#0a2e1a;color:#3dba6a;border:1px solid #1a5a30}
.type-freeze{background:#0a1a3a;color:#5a9aff;border:1px solid #1a3a7a}
.type-power{background:#3a1a0a;color:#ff8c3a;border:1px solid #7a3a1a}
.type-combo{background:#2a0a3a;color:#c070ff;border:1px solid #5a1a7a}
.card-count{font-size:11px;color:#444;margin-bottom:6px;cursor:pointer}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;cursor:pointer}
.mini-tag{font-size:10px;padding:2px 8px;border-radius:20px;background:#1a1a1a;color:#555;border:1px solid #222}
.card-chevron{font-size:10px;color:#333;margin-top:10px;text-align:center;transition:transform 0.25s;cursor:pointer;user-select:none}
.card-chevron.open{transform:rotate(180deg)}
.card-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid #1a1a1a}
.card-detail.open{display:block}
.card-detail-desc{font-size:13px;color:#999;line-height:1.6;margin-bottom:10px;background:#0a0a0a;border-radius:10px;padding:12px}
.card-detail-video{width:100%;border-radius:10px;margin-bottom:10px;display:block;max-height:200px;object-fit:contain;background:#000}
.card-detail-btns{display:flex;gap:8px;margin-bottom:10px}
.card-detail-btn{flex:1;padding:9px;font-size:12px;border-radius:10px;border:1px solid #222;background:transparent;color:#777;cursor:pointer;transition:all 0.15s}
.card-detail-btn:hover{border-color:#fff;color:#fff}
.card-detail-btn.accent{border-color:#444;color:#ccc;background:#1a1a1a}
.card-detail-close{width:100%;padding:8px;font-size:11px;border-radius:10px;border:1px solid #1a1a1a;background:transparent;color:#333;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:5px}
.card-detail-close:hover{border-color:#444;color:#777}
.detail-screen{position:fixed;inset:0;background:#0f0f0f;z-index:200;overflow-y:auto;transform:translateX(100%);transition:transform 0.25s ease}
.detail-screen.open{transform:translateX(0)}
.edit-screen{position:fixed;inset:0;background:#0f0f0f;z-index:250;overflow-y:auto;transform:translateX(100%);transition:transform 0.25s ease}
.edit-screen.open{transform:translateX(0)}
.detail-header{display:flex;align-items:center;gap:10px;padding:13px 18px;border-bottom:1px solid #1a1a1a;position:sticky;top:0;background:#0f0f0f;z-index:10}
.back-btn{background:#141414;border:1px solid #222;border-radius:10px;padding:7px 12px;color:#ddd;font-size:13px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px}
.edit-btn{background:#141414;border:1px solid #2a2a2a;border-radius:10px;padding:7px 12px;color:#777;font-size:13px;cursor:pointer;margin-left:auto;white-space:nowrap}
.detail-name{font-size:14px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.detail-body{padding:16px 18px;max-width:600px;margin:0 auto}
.detail-section-title{font-size:10px;font-weight:700;color:#444;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;margin-top:16px}
.detail-desc-box{background:#141414;border-radius:12px;padding:14px;font-size:14px;color:#bbb;line-height:1.7;border:1px solid #1e1e1e}
.drop-zone{border:2px dashed #1e1e1e;border-radius:14px;padding:18px;text-align:center;color:#444;font-size:13px;transition:all 0.2s;margin-bottom:6px;cursor:pointer}
.drop-zone.dragover{border-color:#fff;color:#fff;background:#1a1a1a}
.drop-zone input[type=file]{display:none}
.upload-btn{width:100%;padding:10px;background:#141414;border:1px solid #222;border-radius:12px;color:#666;font-size:13px;cursor:pointer;margin-bottom:6px;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.upload-btn:hover{border-color:#fff;color:#fff}
.video-wrapper{position:relative;width:100%;padding-top:56.25%;margin-bottom:10px;border-radius:12px;overflow:hidden;background:#111}
.video-wrapper video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;background:#000}
.delete-video-btn{width:100%;padding:9px;background:transparent;color:#bb3333;border:1px solid #bb3333;border-radius:12px;font-size:13px;font-weight:600;margin-bottom:8px;cursor:pointer}
.progress-bar-upload{width:100%;height:3px;background:#1a1a1a;border-radius:2px;margin-bottom:10px;overflow:hidden;display:none}
.progress-fill-upload{height:100%;background:#fff;border-radius:2px;transition:width 0.3s}
.add-to-set-btn{width:100%;padding:12px;background:#141414;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px;font-weight:600;margin-top:16px;cursor:pointer;transition:all 0.15s}
.add-to-set-btn:hover{border-color:#fff}
.delete-move-btn{width:100%;padding:10px;background:transparent;color:#bb3333;border:1px solid #bb3333;border-radius:12px;font-size:13px;font-weight:600;margin-top:8px;cursor:pointer}
.set-builder{padding:14px 0}
.set-name-input{width:100%;padding:11px 14px;background:#141414;border:1px solid #222;border-radius:12px;color:#fff;font-size:14px;margin-bottom:10px}
.set-name-input::placeholder{color:#444}
.set-area{min-height:80px;border:1px dashed #1e1e1e;border-radius:14px;padding:12px;margin-bottom:10px}
.set-empty{text-align:center;color:#444;font-size:13px;padding:18px 0}
.set-node{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.set-pill{background:#141414;border:1px solid #222;border-radius:20px;padding:6px 14px;font-size:13px;color:#ddd;display:flex;align-items:center;gap:8px;flex:1}
.set-pill-remove{color:#444;cursor:pointer;font-size:16px;margin-left:auto;transition:color 0.15s}
.set-pill-remove:hover{color:#bb3333}
.set-arrow{color:#222;font-size:14px;text-align:center;width:18px}
.count-badge{font-size:10px;padding:2px 7px;background:#1e1e1e;border-radius:20px;color:#666}
.eight-badge{font-size:11px;padding:3px 10px;background:#141414;border:1px solid #222;border-radius:20px;color:#666;margin-bottom:12px;display:inline-block}
.save-set-btn{width:100%;padding:12px;background:#fff;color:#000;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:14px}
.pick-title{font-size:10px;font-weight:700;color:#444;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.pick-card{background:#141414;border:1px solid #1a1a1a;border-radius:12px;padding:10px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border-color 0.15s}
.pick-card:hover{border-color:#333}
.pick-card-name{font-size:14px;color:#ddd}
.pick-plus{font-size:18px;color:#333}
.saved-set-card{background:#141414;border:1px solid #1a1a1a;border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s}
.saved-set-card:hover{border-color:#2a2a2a}
.saved-set-name{font-size:15px;font-weight:600;color:#fff;margin-bottom:6px}
.saved-set-seq{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.seq-pill{font-size:11px;padding:3px 10px;background:#1a1a1a;border:1px solid #1e1e1e;border-radius:20px;color:#666}
.seq-arrow{color:#222;font-size:11px}
.delete-set-btn{font-size:11px;color:#444;background:none;border:none;cursor:pointer;padding:0;transition:color 0.15s}
.delete-set-btn:hover{color:#bb3333}
.play-set-btn{font-size:12px;color:#ddd;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;cursor:pointer;padding:5px 12px;transition:all 0.15s;display:flex;align-items:center;gap:5px}
.play-set-btn:hover{border-color:#fff}
.add-move-screen{position:fixed;inset:0;background:#0f0f0f;z-index:300;overflow-y:auto;transform:translateY(100%);transition:transform 0.25s ease}
.add-move-screen.open{transform:translateY(0)}
.add-move-body{padding:16px 18px;max-width:600px;margin:0 auto}
.fab{position:fixed;bottom:80px;right:calc(50% - 290px);width:48px;height:48px;border-radius:50%;background:#fff;color:#000;font-size:22px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:99;box-shadow:0 4px 20px rgba(0,0,0,0.6)}
@media(max-width:640px){.fab{right:16px}}
.form-group{margin-bottom:14px}
.form-label{font-size:10px;font-weight:700;color:#555;margin-bottom:6px;display:block;letter-spacing:0.8px;text-transform:uppercase}
.form-input{width:100%;padding:10px 14px;background:#141414;border:1px solid #222;border-radius:12px;color:#fff;font-size:14px}
.form-input::placeholder{color:#444}
.form-textarea{width:100%;padding:10px 14px;background:#141414;border:1px solid #222;border-radius:12px;color:#fff;font-size:14px;min-height:100px;resize:vertical;line-height:1.6}
.form-textarea::placeholder{color:#444}
.type-select{display:flex;gap:8px;flex-wrap:wrap}
.type-opt{padding:7px 14px;border-radius:20px;border:1px solid #222;background:#141414;color:#666;font-size:13px;cursor:pointer;transition:all 0.15s}
.type-opt.active{border-color:#fff;color:#fff;background:#1e1e1e}
.submit-btn{width:100%;padding:13px;background:#fff;color:#000;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.empty-state{text-align:center;padding:50px 20px;color:#444}
.empty-state p{font-size:13px;margin-top:8px;color:#444}
.loading{text-align:center;padding:40px;color:#444;font-size:13px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.count-input{width:100%;padding:10px 14px;background:#141414;border:1px solid #222;border-radius:12px;color:#fff;font-size:14px}
.count-input::placeholder{color:#444}
.add-drop-zone{border:2px dashed #1e1e1e;border-radius:14px;padding:18px;text-align:center;color:#444;font-size:13px;transition:all 0.2s;margin-bottom:6px;cursor:pointer}
.add-drop-zone.dragover{border-color:#fff;color:#fff;background:#1a1a1a}
.add-drop-zone input[type=file]{display:none}
.add-media-preview{width:100%;border-radius:12px;margin-top:10px;max-height:180px;object-fit:contain;background:#000;display:none}
.upload-progress{width:100%;height:3px;background:#1a1a1a;border-radius:2px;margin-top:8px;overflow:hidden;display:none}
.upload-progress-fill{height:100%;background:#fff;border-radius:2px;transition:width 0.3s}
.tag-editor{margin-bottom:4px}
.tag-editor-current{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;min-height:24px}
.tag-editor-tag{font-size:12px;padding:3px 10px;border-radius:20px;background:#1a1a1a;border:1px solid #222;color:#bbb;display:flex;align-items:center;gap:5px}
.tag-editor-tag .tag-x{color:#444;cursor:pointer;font-size:13px;line-height:1;transition:color 0.15s}
.tag-editor-tag .tag-x:hover{color:#bb3333}
.tag-candidates{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tag-candidate{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid #1e1e1e;background:#141414;color:#666;cursor:pointer;transition:all 0.15s}
.tag-candidate:hover{border-color:#fff;color:#fff}
.tag-input-row{display:flex;gap:8px}
.tag-input-row input{flex:1;padding:8px 12px;background:#141414;border:1px solid #222;border-radius:10px;color:#fff;font-size:13px}
.tag-input-row input::placeholder{color:#444}
.tag-input-row button{padding:8px 14px;background:#fff;color:#000;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
/* 音楽ライブラリ */
.beat-section-hd{font-size:10px;font-weight:700;color:#444;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #1a1a1a}
.beat-upload-zone{border:2px dashed #1e1e1e;border-radius:14px;padding:22px;text-align:center;color:#444;font-size:13px;transition:all 0.2s;margin-bottom:8px;cursor:pointer}
.beat-upload-zone:hover{border-color:#333;color:#777}
.beat-upload-zone.dragover{border-color:#fff;color:#fff;background:#1a1a1a}
.beat-upload-zone input{display:none}
.beat-upload-btn{width:100%;padding:10px;background:#141414;border:1px solid #222;border-radius:12px;color:#666;font-size:13px;cursor:pointer;margin-bottom:12px;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.beat-upload-btn:hover{border-color:#fff;color:#fff}
.beat-upload-bar{width:100%;height:3px;background:#1a1a1a;border-radius:2px;margin-bottom:12px;overflow:hidden;display:none}
.beat-upload-bar-fill{height:100%;background:#fff;border-radius:2px;transition:width 0.3s}
.beat-card{background:#141414;border:1px solid #1a1a1a;border-radius:14px;padding:14px;margin-bottom:10px;transition:border-color 0.15s}
.beat-card.selected{border-color:#fff}
.beat-card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.beat-icon{width:38px;height:38px;border-radius:10px;background:#1a1a1a;border:1px solid #222;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.beat-info{flex:1;min-width:0}
.beat-name-row{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.beat-name{font-size:14px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.beat-badge{font-size:9px;padding:2px 7px;background:#0a2a14;border:1px solid #1a5a28;border-radius:20px;color:#3dba6a;white-space:nowrap;flex-shrink:0}
.beat-meta{font-size:11px;color:#444;line-height:1.4}
.beat-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
/* ビート設定フォーム */
.beat-settings{background:#0f0f0f;border:1px solid #1e1e1e;border-radius:12px;padding:12px;margin-bottom:10px;display:none}
.beat-settings.open{display:block}
.beat-setting-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.beat-setting-row:last-child{margin-bottom:0}
.beat-setting-label{font-size:11px;color:#666;min-width:80px;font-weight:600}
.beat-setting-input{flex:1;padding:7px 10px;background:#141414;border:1px solid #222;border-radius:8px;color:#fff;font-size:13px;text-align:right}
.beat-setting-unit{font-size:11px;color:#444;white-space:nowrap}
.beat-setting-desc{font-size:10px;color:#444;margin-top:4px;line-height:1.4}
.beat-actions{display:flex;gap:6px}
.beat-btn{flex:1;padding:7px;font-size:11px;border-radius:9px;border:1px solid #222;background:#111;color:#555;cursor:pointer;transition:all 0.15s;text-align:center}
.beat-btn:hover{border-color:#fff;color:#fff}
.beat-btn.on{border-color:#3dba6a;color:#3dba6a;background:#0a2a14}
.beat-btn.danger{border-color:#bb3333;color:#bb3333}
.beat-btn.danger:hover{background:#1a0a0a}
audio{width:100%;margin-bottom:8px;opacity:0.6;filter:invert(0.8)}
/* プレイヤー */
.player-screen{position:fixed;inset:0;background:#060606;z-index:400;display:none;flex-direction:column}
.player-screen.open{display:flex}
.player-header{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #111;gap:8px;flex-shrink:0}
.player-title{font-size:13px;font-weight:700;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-beat-select{background:#141414;border:1px solid #1e1e1e;border-radius:8px;color:#fff;font-size:11px;padding:4px 6px;max-width:120px;cursor:pointer}
.player-mute-btn{background:#141414;border:1px solid #1e1e1e;border-radius:8px;padding:5px 8px;color:#666;font-size:11px;cursor:pointer;white-space:nowrap;transition:all 0.15s;display:flex;align-items:center;gap:4px}
.player-mute-btn.muted{border-color:#bb3333;color:#bb3333;background:#140a0a}
.player-close{background:none;border:1px solid #1a1a1a;border-radius:8px;padding:5px 8px;color:#444;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px}
.carousel-area{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;min-height:0}
.carousel-track{display:flex;align-items:center;gap:14px;position:absolute;top:50%;transform:translateY(-50%);transition:left 0.4s cubic-bezier(0.25,0.46,0.45,0.94)}
.carousel-card{border-radius:18px;text-align:center;cursor:pointer;flex-shrink:0;border:1px solid #1a1a1a;background:#0f0f0f;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;transition:all 0.35s cubic-bezier(0.25,0.46,0.45,0.94);padding:16px;overflow-y:auto}
.carousel-card.active{border-color:#fff;background:#141414}
.carousel-card-name{font-weight:700;color:#fff;line-height:1.2;margin-bottom:6px}
.carousel-card-count{color:#555;margin-bottom:4px}
.carousel-card-num{color:#222}
.player-card-detail{display:none;width:100%;margin-top:10px;padding-top:10px;border-top:1px solid #1a1a1a}
.player-card-detail.open{display:block}
.player-card-desc{font-size:11px;color:#666;line-height:1.5;background:#080808;border-radius:8px;padding:8px;margin-bottom:6px;text-align:left}
.player-card-video{width:100%;border-radius:8px;max-height:120px;object-fit:contain;background:#000;display:block;margin-bottom:8px}
.player-card-close{width:100%;padding:7px;font-size:11px;border-radius:8px;border:1px solid #1a1a1a;background:transparent;color:#333;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:all 0.15s}
.player-card-close:hover{border-color:#444;color:#666}
.player-controls{padding:8px 14px 16px;flex-shrink:0}
/* 進捗バー */
.progress-section{margin-bottom:8px}
.progress-time-row{display:flex;justify-content:space-between;font-size:10px;color:#333;margin-bottom:6px}
.progress-wrap{position:relative;width:100%;height:28px;display:flex;align-items:center;cursor:pointer}
.progress-track{width:100%;height:4px;background:#1a1a1a;border-radius:2px;position:relative;overflow:visible}
.progress-played{height:100%;background:#fff;border-radius:2px;position:relative;z-index:2;transition:width 0.08s linear}
/* 8カウント目印 */
.progress-markers{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.pm-wrap{position:absolute;top:0;height:100%;display:flex;flex-direction:column;align-items:center}
.pm-line-eight{width:1px;background:#2a2a2a;position:absolute;top:-4px;height:calc(100% + 8px)}
.pm-line-four{width:2px;background:#3a3a3a;position:absolute;top:-7px;height:calc(100% + 14px);border-radius:1px}
.pm-line-move{width:2px;background:#555;position:absolute;top:-10px;height:calc(100% + 20px);border-radius:1px}
.pm-label{font-size:8px;color:#2a2a2a;position:absolute;top:calc(100% + 12px);transform:translateX(-50%);white-space:nowrap}
.pm-label-four{color:#3a3a3a;font-size:8px}
.pm-label-move{color:#555;font-size:9px;font-weight:600}
/* BPM */
.bpm-control{display:flex;align-items:center;gap:5px;background:#0f0f0f;border:1px solid #1a1a1a;border-radius:12px;padding:7px 10px;margin-bottom:8px}
.bpm-label{font-size:10px;color:#444;white-space:nowrap;font-weight:700;letter-spacing:0.5px}
.bpm-value{font-size:17px;font-weight:700;color:#fff;min-width:34px;text-align:center}
.bpm-btn{width:28px;height:28px;border-radius:50%;border:1px solid #222;background:#141414;color:#aaa;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
.bpm-btn:hover{border-color:#fff}
.bpm-btn:active{transform:scale(0.9)}
.bpm-btn-sm{width:24px;height:24px;font-size:10px;font-weight:700}
.bpm-slider{flex:1;-webkit-appearance:none;appearance:none;height:2px;background:#222;border-radius:1px;outline:none;cursor:pointer}
.bpm-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer}
.bpm-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer;border:none}
.play-pause-btn{width:100%;padding:12px;background:#fff;color:#000;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.delay-indicator{font-size:10px;color:#555;text-align:center;margin-bottom:4px;min-height:14px}
.set-detail-screen{position:fixed;inset:0;background:#0f0f0f;z-index:350;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s ease}
.set-detail-screen.open{transform:translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
      <circle cx="13" cy="6" r="3" fill="#fff"/>
      <path d="M13 9v7M13 13l-4.5-2.5M13 13l4.5-2.5M13 16l-3.5 5M13 16l3.5 5" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
    <div><h1>BreakinSetBuilder</h1><p>技を管理してセットを組み立てる</p></div>
  </div>

  <div id="sec-moves" class="section active">
    <input class="search-box" type="text" placeholder="技を検索..." oninput="filterMoves(this.value)" id="search-input">
    <div class="tag-row" id="tag-row"></div>
    <div class="moves-grid" id="moves-list"></div>
  </div>

  <div id="sec-set" class="section">
    <div class="set-builder">
      <input class="set-name-input" type="text" placeholder="セット名（例：バトル用コンボA）" id="set-name">
      <div id="set-tag-editor-create"></div>
      <div id="set-eight-count" class="eight-badge" style="display:none"></div>
      <div class="set-area" id="set-area"><div class="set-empty">下から技を選んで追加</div></div>
      <button class="save-set-btn" onclick="saveSet()">セットを保存</button>
      <div class="pick-title">技を選ぶ</div>
      <div id="pick-list"></div>
    </div>
  </div>

  <div id="sec-saved" class="section"><div style="padding:12px 0" id="saved-list"></div></div>

  <div id="sec-beats" class="section">
    <div class="beat-section-hd">音楽ライブラリ</div>
    <div class="beat-upload-zone" id="beat-upload-zone">
      <input type="file" id="beat-file-input" accept="audio/*,.mp3,.wav,.aac,.flac,.m4a,.ogg">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" style="margin-bottom:6px;opacity:0.4"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <div>音楽ファイルをドロップ</div>
      <div style="font-size:11px;margin-top:3px;color:#2a2a2a">MP3 / WAV / AAC / FLAC / M4A</div>
    </div>
    <button class="beat-upload-btn" onclick="document.getElementById('beat-file-input').click()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      ファイルを選択してアップロード
    </button>
    <div class="beat-upload-bar" id="beat-upload-bar"><div class="beat-upload-bar-fill" id="beat-upload-bar-fill" style="width:0%"></div></div>
    <div id="beat-list"></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('moves',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="18" height="14" rx="2"/><line x1="7" y1="9" x2="17" y2="9"/><line x1="7" y1="13" x2="13" y2="13"/></svg>
    技カード
  </button>
  <button class="tab" onclick="switchTab('set',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><line x1="12" y1="7" x2="5" y2="17"/><line x1="12" y1="7" x2="19" y2="17"/></svg>
    セット作成
  </button>
  <button class="tab" onclick="switchTab('saved',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    保存済み
  </button>
  <button class="tab" onclick="switchTab('beats',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    音楽
  </button>
</div>

<button class="fab" onclick="openAddMove()" id="fab">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- 詳細 -->
<div class="detail-screen" id="detail-screen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>戻る</button>
    <span class="detail-name" id="detail-name"></span>
    <button class="edit-btn" id="detail-edit-btn">編集</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- 編集 -->
<div class="edit-screen" id="edit-screen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeEdit()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>戻る</button>
    <span class="detail-name">技を編集</span>
  </div>
  <div class="add-move-body" id="edit-body"></div>
</div>

<!-- 技追加 -->
<div class="add-move-screen" id="add-move-screen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeAddMove()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>戻る</button>
    <span class="detail-name">新しい技を追加</span>
  </div>
  <div class="add-move-body">
    <div class="form-group"><label class="form-label">技名</label><input class="form-input" type="text" id="new-name" placeholder="例：ゴブレット"></div>
    <div class="form-group"><label class="form-label">種類</label>
      <div class="type-select" id="type-select">
        <span class="type-opt active" data-type="foot" onclick="selectType(this)">フットワーク</span>
        <span class="type-opt" data-type="freeze" onclick="selectType(this)">フリーズ</span>
        <span class="type-opt" data-type="power" onclick="selectType(this)">パワー</span>
        <span class="type-opt" data-type="combo" onclick="selectType(this)">コンボ</span>
      </div>
    </div>
    <div class="form-group"><label class="form-label">説明・動き方のメモ</label><textarea class="form-textarea" id="new-desc" placeholder="動きの流れを書いておこう"></textarea></div>
    <div class="form-group"><label class="form-label">カウント数</label><input class="count-input" type="number" id="new-count" placeholder="例：8"></div>
    <div class="form-group"><label class="form-label">タグ</label><div id="new-tag-editor"></div></div>
    <div class="form-group">
      <label class="form-label">動画（任意）</label>
      <div class="add-drop-zone" id="add-drop-zone"><input type="file" id="add-file-input" accept="video/*" onchange="handleAddVideoSelect(event)">動画をドラッグ＆ドロップ</div>
      <button class="upload-btn" onclick="document.getElementById('add-file-input').click()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        ファイルを選択
      </button>
      <div class="upload-progress" id="add-upload-progress"><div class="upload-progress-fill" id="add-upload-fill" style="width:0%"></div></div>
      <video class="add-media-preview" id="add-video-preview" muted playsinline controls></video>
    </div>
    <button class="submit-btn" onclick="submitMove()">追加する</button>
  </div>
</div>

<!-- セット詳細 -->
<div class="set-detail-screen" id="set-detail-screen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeSetDetail()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>戻る</button>
    <span class="detail-name" id="set-detail-name"></span>
  </div>
  <div class="detail-body" id="set-detail-body"></div>
</div>

<!-- プレイヤー -->
<div class="player-screen" id="player-screen">
  <div class="player-header">
    <span class="player-title" id="player-title"></span>
    <select class="player-beat-select" id="player-beat-select" onchange="changeTrack(this.value)">
      <option value="">— 音楽なし —</option>
    </select>
    <button class="player-mute-btn" id="mute-btn" onclick="toggleMute()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
      音あり
    </button>
    <button class="player-close" onclick="closePlayer()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      閉じる
    </button>
  </div>
  <div class="carousel-area" id="carousel-area">
    <div class="carousel-track" id="carousel-track"></div>
  </div>
  <div class="player-controls">
    <div class="delay-indicator" id="delay-indicator"></div>
    <div class="progress-section">
      <div class="progress-time-row">
        <span id="time-current">0:00</span>
        <span id="time-eight" style="color:#444">1エイト目</span>
        <span id="time-total">0:00</span>
      </div>
      <div class="progress-wrap" id="progress-wrap" onclick="seekTo(event)">
        <div class="progress-track" id="progress-track">
          <div class="progress-markers" id="progress-markers"></div>
          <div class="progress-played" id="progress-played" style="width:0%"></div>
        </div>
      </div>
    </div>
    <div class="bpm-control">
      <span class="bpm-label">BPM</span>
      <button class="bpm-btn" onclick="adjustBPM(-5)">−</button>
      <button class="bpm-btn bpm-btn-sm" onclick="adjustBPM(-1)">-1</button>
      <span class="bpm-value" id="bpm-value">120</span>
      <button class="bpm-btn bpm-btn-sm" onclick="adjustBPM(1)">+1</button>
      <button class="bpm-btn" onclick="adjustBPM(5)">+</button>
      <input class="bpm-slider" type="range" id="bpm-slider" min="60" max="200" value="120" oninput="setBPMFromSlider(this.value)">
    </div>
    <button class="play-pause-btn" id="play-pause-btn" onclick="togglePlay()">
      <svg id="pp-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      再生
    </button>
  </div>
</div>

<audio id="bg-audio" loop style="display:none"></audio>
<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,addDoc,getDocs,doc,updateDoc,deleteDoc,query,orderBy}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const CLOUD_NAME="dnbbwfwoi",UPLOAD_PRESET="breakin_unsigned";
const firebaseConfig={apiKey:"AIzaSyBao1NCQQRw596Y0ueG4q9gpNjMA_ApLBE",authDomain:"breakinsetbuilder.firebaseapp.com",projectId:"breakinsetbuilder",storageBucket:"breakinsetbuilder.firebasestorage.app",messagingSenderId:"544530127587",appId:"1:544530127587:web:2c44993150211c892d03d6"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const typeLabel={foot:"フットワーク",freeze:"フリーズ",power:"パワー",combo:"コンボ"};
const typeClass={foot:"type-foot",freeze:"type-freeze",power:"type-power",combo:"type-combo"};
let moves=[],sets=[],setMoves=[],customTags=[],beats=[];
let activeTag="全て",searchQ="",selectedType="foot",editType="foot";
let newMoveTags=[],editMoveTags=[],newSetTags=[];
let expandedCardId=null,expandedPlayerCardIdx=null;
let isMuted=false,currentBPM=120;
let isPlaying=false,beatInterval=null,beatCount=0,totalBeats=0;
let currentSetMoves=[],currentMoveIdx=0,beatsPerMove=[];
let selectedBeatId=null;
let delayTimer=null;
const bgAudio=document.getElementById("bg-audio");

// ===== BPM =====
window.adjustBPM=function(d){currentBPM=Math.max(60,Math.min(200,currentBPM+d));updateBPMDisplay();if(isPlaying)restartInterval();}
window.setBPMFromSlider=function(v){currentBPM=parseInt(v);updateBPMDisplay();if(isPlaying)restartInterval();}
function updateBPMDisplay(){document.getElementById("bpm-value").textContent=currentBPM;document.getElementById("bpm-slider").value=currentBPM;updateTimeDisplay();}
function restartInterval(){clearInterval(beatInterval);beatInterval=setInterval(tickBeat,60000/currentBPM);}

// ===== MUTE =====
window.toggleMute=function(){
  isMuted=!isMuted;bgAudio.muted=isMuted;
  const btn=document.getElementById("mute-btn");
  btn.classList.toggle("muted",isMuted);
  btn.innerHTML=isMuted
    ?`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg> 無音`
    :`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg> 音あり`;
}

// ===== TRACK CHANGE =====
window.changeTrack=function(beatId){
  // 曲変更時は技カードをリセット
  clearDelay();
  if(isPlaying){clearInterval(beatInterval);isPlaying=false;bgAudio.pause();}
  beatCount=0;currentMoveIdx=0;expandedPlayerCardIdx=null;
  document.getElementById("progress-played").style.width="0%";
  document.getElementById("pp-icon").outerHTML='<svg id="pp-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
  document.getElementById("play-pause-btn").lastChild.textContent=" 再生";
  selectedBeatId=beatId||null;
  if(beatId){
    const b=beats.find(x=>x.id===beatId);
    if(b){
      bgAudio.src=b.url;bgAudio.loop=true;
      currentBPM=parseInt(b.bpm)||120;
      updateBPMDisplay();
    }
  } else {bgAudio.src="";}
  renderCarousel(0);updateTimeDisplay();
  updateDelayIndicator();
}

function getSelectedBeat(){return beats.find(x=>x.id===selectedBeatId)||null;}
function getDelayMs(){const b=getSelectedBeat();return parseInt(b?.delay)||0;}

function updateDelayIndicator(){
  const b=getSelectedBeat();
  const el=document.getElementById("delay-indicator");
  if(b&&(parseInt(b.delay)||0)>0){
    el.textContent=`ディレイ: ${b.delay}ms 後にカードが動き出します`;
  } else {el.textContent="";}
}

function clearDelay(){if(delayTimer){clearTimeout(delayTimer);delayTimer=null;}}

// ===== PLAYER =====
function startPlayer(setData){
  currentSetMoves=setData.moves||[];
  if(!currentSetMoves.length)return;
  document.getElementById("player-title").textContent=setData.name;
  // beat select
  const sel=document.getElementById("player-beat-select");
  sel.innerHTML='<option value="">— 音楽なし —</option>'+beats.map(b=>`<option value="${b.id}"${b.id===selectedBeatId?" selected":""}>${b.name}</option>`).join("");
  beatCount=0;currentMoveIdx=0;isPlaying=false;expandedPlayerCardIdx=null;
  beatsPerMove=currentSetMoves.map(m=>parseInt(m.count)||8);
  totalBeats=beatsPerMove.reduce((a,b)=>a+b,0);
  isMuted=false;
  // apply beat settings
  if(selectedBeatId){
    const b=getSelectedBeat();
    if(b){bgAudio.src=b.url;bgAudio.loop=true;currentBPM=parseInt(b.bpm)||120;}
  }
  updateBPMDisplay();
  const muteBtn=document.getElementById("mute-btn");
  muteBtn.classList.remove("muted");
  muteBtn.innerHTML=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg> 音あり`;
  renderCarousel(0);renderProgressMarkers();updateTimeDisplay();updateDelayIndicator();
  document.getElementById("progress-played").style.width="0%";
  setPPBtn(false);
  document.getElementById("player-screen").classList.add("open");
}

function setPPBtn(playing){
  const btn=document.getElementById("play-pause-btn");
  if(playing){
    btn.innerHTML=`<svg id="pp-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 一時停止`;
  } else {
    btn.innerHTML=`<svg id="pp-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> 再生`;
  }
}

function renderProgressMarkers(){
  const track=document.getElementById("progress-track");
  const w=track.offsetWidth||300;
  let html="";
  // 8カウントごと
  for(let i=8;i<totalBeats;i+=8){
    const pct=(i/totalBeats)*100;
    const isFour=i%32===0;
    const isMove=isMoveBreak(i);
    const cls=isMove?"pm-line-move":isFour?"pm-line-four":"pm-line-eight";
    const label=isMove?getMoveLabel(i):isFour?`${i/8}E`:`${i/8}`;
    const labelCls=isMove?"pm-label pm-label-move":isFour?"pm-label pm-label-four":"pm-label";
    html+=`<div class="pm-wrap" style="left:${pct}%;position:absolute;top:0;height:100%">
      <div class="${cls}" style="left:0"></div>
      <div class="${labelCls}" style="top:calc(100% + 3px);left:0">${label}</div>
    </div>`;
  }
  document.getElementById("progress-markers").innerHTML=html;
}

function isMoveBreak(beat){
  let cum=0;
  for(let i=0;i<beatsPerMove.length-1;i++){cum+=beatsPerMove[i];if(cum===beat)return true;}
  return false;
}
function getMoveLabel(beat){
  let cum=0;
  for(let i=0;i<beatsPerMove.length-1;i++){cum+=beatsPerMove[i];if(cum===beat)return currentSetMoves[i+1]?.name?.slice(0,4)||"";}
  return "";
}

function updateTimeDisplay(){
  const spb=60/currentBPM;
  const cur=beatCount*spb,tot=totalBeats*spb;
  document.getElementById("time-current").textContent=fmt(cur);
  document.getElementById("time-total").textContent=fmt(tot);
  document.getElementById("time-eight").textContent=`${Math.floor(beatCount/8)+1}エイト目`;
}
function fmt(s){return`${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,"0")}`;}

function renderCarousel(activeIdx){
  const area=document.getElementById("carousel-area");
  const aW=area.offsetWidth||window.innerWidth;
  const aH=area.offsetHeight||260;
  const actW=Math.min(aW*0.60,248);
  const actH=Math.min(aH*0.74,208);
  const inW=actW*0.64;
  const inH=actH*0.64;
  const gap=14;
  const track=document.getElementById("carousel-track");
  track.innerHTML=currentSetMoves.map((m,i)=>{
    const isAct=i===activeIdx;
    const isExp=expandedPlayerCardIdx===i&&isAct;
    const mFull=moves.find(x=>x.id===m.id)||m;
    const w=isAct?actW:inW;
    const h=isAct?actH:inH;
    return`<div class="carousel-card${isAct?" active":""}" id="pcard-${i}"
      style="width:${w}px;min-width:${w}px;min-height:${h}px;max-height:${isExp?"90vh":h+"px"};opacity:${isAct?1:0.22};transform:scale(${isAct?1:0.76})"
      onclick="window.togglePlayerCard(${i},event)">
      <div class="carousel-card-name" style="font-size:${isAct?20:13}px">${m.name}</div>
      <div class="carousel-card-count" style="font-size:${isAct?12:10}px">${m.count?m.count+"カウント":""}</div>
      <div class="carousel-card-num" style="font-size:${isAct?11:9}px">${i+1} / ${currentSetMoves.length}</div>
      ${isAct?`<div class="player-card-detail${isExp?" open":""}">
        ${mFull.videoUrl?`<video class="player-card-video" src="${mFull.videoUrl}" controls playsinline muted></video>`:""}
        <div class="player-card-desc">${mFull.desc||""}</div>
        <button class="player-card-close" onclick="event.stopPropagation();window.closePlayerCard()">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
          閉じる
        </button>
      </div>`:""}
    </div>`;
  }).join("");
  let left=aW/2-actW/2;
  for(let i=0;i<activeIdx;i++)left-=inW+gap;
  track.style.left=left+"px";
  track.style.top="50%";
  track.style.transform="translateY(-50%)";
}

window.togglePlayerCard=function(idx,e){
  if(idx!==currentMoveIdx)return;
  if(expandedPlayerCardIdx===idx)return;
  expandedPlayerCardIdx=idx;
  renderCarousel(currentMoveIdx);
}
window.closePlayerCard=function(){expandedPlayerCardIdx=null;renderCarousel(currentMoveIdx);}

function tickBeat(){
  let cum=0;
  for(let i=0;i<beatsPerMove.length;i++){
    cum+=beatsPerMove[i];
    if(beatCount<cum){
      if(i!==currentMoveIdx){currentMoveIdx=i;expandedPlayerCardIdx=null;renderCarousel(i);}
      break;
    }
  }
  const pct=Math.min((beatCount/totalBeats)*100,100);
  document.getElementById("progress-played").style.width=pct+"%";
  updateTimeDisplay();
  beatCount++;
  if(beatCount>=totalBeats){
    beatCount=0;currentMoveIdx=0;expandedPlayerCardIdx=null;
    renderCarousel(0);document.getElementById("progress-played").style.width="0%";
  }
}

window.togglePlay=function(){
  if(isPlaying){
    clearInterval(beatInterval);clearDelay();isPlaying=false;
    bgAudio.pause();setPPBtn(false);
  } else {
    const delay=getDelayMs();
    if(delay>0){
      // 音楽を先に再生、delay後にカード開始
      if(selectedBeatId&&bgAudio.src){bgAudio.currentTime=0;bgAudio.play();}
      setPPBtn(true);isPlaying=true;
      delayTimer=setTimeout(()=>{
        beatInterval=setInterval(tickBeat,60000/currentBPM);
        delayTimer=null;
      },delay);
    } else {
      if(selectedBeatId&&bgAudio.src){bgAudio.currentTime=0;bgAudio.play();}
      beatInterval=setInterval(tickBeat,60000/currentBPM);
      isPlaying=true;setPPBtn(true);
    }
  }
}

window.seekTo=function(e){
  const rect=document.getElementById("progress-track").getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  beatCount=Math.floor(pct*totalBeats);
  document.getElementById("progress-played").style.width=(pct*100)+"%";
  updateTimeDisplay();
}

window.closePlayer=function(){
  clearInterval(beatInterval);clearDelay();isPlaying=false;
  bgAudio.pause();
  document.getElementById("player-screen").classList.remove("open");
  setPPBtn(false);
}

window.toggleBeatSettings=function(id){

window.saveBeatSettings=async function(id){
  const bpm=parseInt(document.getElementById(`bpm-${id}`).value)||120;

  await updateDoc(doc(db,"beats",id),{bpm,delay});

window.selectBeat=function(id){

// Beat upload
async function uploadBeat(file){
  const bar=document.getElementById("beat-upload-bar"),fill=document.getElementById("beat-upload-bar-fill");
  bar.style.display="block";fill.style.width="0%";
  const fd=new FormData();fd.append("file",file);fd.append("upload_preset",UPLOAD_PRESET);
  return new Promise(resolve=>{
    const xhr=new XMLHttpRequest();
    xhr.upload.onprogress=e=>{if(e.lengthComputable)fill.style.width=(e.loaded/e.total*100)+"%";};
    xhr.onload=async function(){
      bar.style.display="none";
      if(xhr.status===200){
        const res=JSON.parse(xhr.responseText);
        const bd={name:file.name.replace(/\.[^.]+$/,""),url:res.secure_url,size:file.size,bpm:120,delay:0,tags:[],createdAt:Date.now()};
        const ref=await addDoc(collection(db,"beats"),bd);
        beats.unshift({id:ref.id,...bd});
        renderBeatList();showToast("アップロードしました！");resolve(true);
      } else {showToast("アップロード失敗");resolve(false);}
    };
    xhr.onerror=()=>{bar.style.display="none";showToast("通信エラー");resolve(false);};
    xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);xhr.send(fd);
  });
}
const beatDz=document.getElementById("beat-upload-zone");
beatDz.addEventListener("click",()=>document.getElementById("beat-file-input").click());
beatDz.addEventListener("dragover",e=>{e.preventDefault();beatDz.classList.add("dragover");});
beatDz.addEventListener("dragleave",()=>beatDz.classList.remove("dragover"));
beatDz.addEventListener("drop",e=>{
  e.preventDefault();beatDz.classList.remove("dragover");
  const f=e.dataTransfer?.files?.[0];
  if(f&&f.type.startsWith("audio/"))uploadBeat(f);else showToast("音楽ファイルを選択してください");
});
document.getElementById("beat-file-input").addEventListener("change",e=>{const f=e.target.files[0];if(f)uploadBeat(f);e.target.value="";});

    ${m.count?`<div style="font-size:13px;color:#555;margin-bottom:12px">カウント数：<span style="color:#fff;font-weight:600">${m.count}</span></div>`:""}
    <div class="detail-section-title">動きの説明</div>
    <div class="detail-desc-box">${m.desc||"説明なし"}</div>
    <div class="detail-section-title">動画</div>
    ${m.videoUrl?`<div class="video-wrapper"><video src="${m.videoUrl}" controls playsinline muted></video></div><button class="delete-video-btn" onclick="window.deleteVideo('${id}')">動画を削除</button>`:""}
    <div class="drop-zone" id="drop-zone-${id}"><input type="file" id="file-input-${id}" accept="video/*" onchange="window.handleVideoUpload(event,'${id}')">動画をドラッグ＆ドロップ</div>
    <button class="upload-btn" onclick="document.getElementById('file-input-${id}').click()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      ファイルを選択してアップロード
    </button>
    <div class="progress-bar-upload" id="progress-bar-${id}"><div class="progress-fill-upload" id="progress-fill-${id}" style="width:0%"></div></div>
    <div class="detail-section-title">タグ</div>
    <div class="card-tags" style="margin-bottom:8px">${(m.tags||[]).map(t=>`<span class="mini-tag">${t}</span>`).join("")}</div>
    <button class="add-to-set-btn" onclick="window.addToSetFromDetail('${id}')">セットに追加</button>
    <button class="delete-move-btn" onclick="window.deleteMove('${id}')">この技を削除</button>`;
  const dz=document.getElementById(`drop-zone-${id}`);
  dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("dragover");});
  dz.addEventListener("dragleave",()=>dz.classList.remove("dragover"));
  dz.addEventListener("drop",e=>{e.preventDefault();e.stopPropagation();dz.classList.remove("dragover");const f=e.dataTransfer?.files?.[0];if(f)window.uploadToCloudinary(f,id);});
  document.getElementById("detail-screen").classList.add("open");
}

window.openSetDetail=function(id){
  const s=sets.find(x=>x.id===id);if(!s)return;
  const{beats:b,eights}=calcEights(s.moves);
  document.getElementById("set-detail-name").textContent=s.name;
  document.getElementById("set-detail-body").innerHTML=`
    <div style="margin-bottom:16px">
      <button style="width:100%;padding:13px;background:#fff;color:#000;border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px" onclick="window.playSet('${id}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>セットを再生
      </button>
    </div>
    ${(s.tags||[]).length?`<div class="card-tags" style="margin-bottom:12px">${s.tags.map(t=>`<span class="mini-tag">${t}</span>`).join("")}</div>`:""}
    <div class="detail-section-title">構成（${s.moves.length}技・${eights}エイト）</div>
    ${s.moves.map((m,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:11px 14px;background:#141414;border:1px solid #1a1a1a;border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="window.showDetail('${m.id}')">
      <span style="font-size:11px;color:#333;min-width:18px">${i+1}</span>
      <span style="font-size:14px;color:#fff;flex:1">${m.name}</span>
      ${m.count?`<span class="count-badge">${m.count}ct</span>`:""}
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </div>`).join("")}
    <button class="delete-move-btn" style="margin-top:16px" onclick="if(confirm('このセットを削除しますか？')){window.deleteSet('${id}');window.closeSetDetail();}">このセットを削除</button>`;
  document.getElementById("set-detail-screen").classList.add("open");
}
window.closeSetDetail=()=>document.getElementById("set-detail-screen").classList.remove("open");
window.playSet=function(id){
  const s=sets.find(x=>x.id===id);if(!s)return;
  document.getElementById("set-detail-screen").classList.remove("open");
  startPlayer(s);
}
window.openEdit=function(id){
  const m=moves.find(x=>x.id===id);if(!m)return;
  editType=m.type||"foot";editMoveTags=[...(m.tags||[])];
  document.getElementById("edit-body").innerHTML=`
    <div class="form-group"><label class="form-label">技名</label><input class="form-input" type="text" id="edit-name" value="${m.name||''}"></div>
    <div class="form-group"><label class="form-label">種類</label><div class="type-select" id="edit-type-select">
      <span class="type-opt${editType==='foot'?' active':''}" data-type="foot" onclick="selectEditType(this)">フットワーク</span>
      <span class="type-opt${editType==='freeze'?' active':''}" data-type="freeze" onclick="selectEditType(this)">フリーズ</span>
      <span class="type-opt${editType==='power'?' active':''}" data-type="power" onclick="selectEditType(this)">パワー</span>
      <span class="type-opt${editType==='combo'?' active':''}" data-type="combo" onclick="selectEditType(this)">コンボ</span>
    </div></div>
    <div class="form-group"><label class="form-label">説明</label><textarea class="form-textarea" id="edit-desc">${m.desc||''}</textarea></div>
    <div class="form-group"><label class="form-label">カウント数</label><input class="count-input" type="number" id="edit-count" value="${m.count||''}"></div>
    <div class="form-group"><label class="form-label">タグ</label><div id="edit-tag-editor"></div></div>
    <button class="submit-btn" onclick="window.submitEdit('${id}')">保存する</button>`;
  renderTagEditor("edit-tag-editor",editMoveTags,tags=>{editMoveTags=tags;});
  document.getElementById("edit-screen").classList.add("open");
}
window.selectEditType=function(el){document.querySelectorAll("#edit-type-select .type-opt").forEach(e=>e.classList.remove("active"));el.classList.add("active");editType=el.dataset.type;}
window.submitEdit=async function(id){
  const name=document.getElementById("edit-name").value.trim();if(!name){showToast("技名を入力してください");return;}
  const desc=document.getElementById("edit-desc").value.trim();
  const count=document.getElementById("edit-count").value.trim();
  await updateDoc(doc(db,"moves",id),{name,type:editType,desc,count:count||null,tags:editMoveTags});
  moves=moves.map(m=>m.id===id?{...m,name,type:editType,desc,count:count||null,tags:editMoveTags}:m);
  showToast("保存しました！");closeEdit();window.showDetail(id);renderMoves();renderPickList();
}
window.closeEdit=()=>document.getElementById("edit-screen").classList.remove("open");
window.deleteMove=async function(id){
  if(!confirm("この技を削除しますか？"))return;
  await deleteDoc(doc(db,"moves",id));moves=moves.filter(m=>m.id!==id);
  renderMoves();renderPickList();renderTagRow();closeDetail();showToast("削除しました");
}
window.deleteVideo=async function(id){
  if(!confirm("この動画を削除しますか？"))return;
  await updateDoc(doc(db,"moves",id),{videoUrl:""});
  moves=moves.map(m=>m.id===id?{...m,videoUrl:""}:m);showToast("削除しました");window.showDetail(id);
}
window.closeDetail=function(){document.getElementById("detail-screen").classList.remove("open");}
window.handleVideoUpload=function(e,id){const f=e.target.files[0];if(f)window.uploadToCloudinary(f,id);}
window.uploadToCloudinary=async function(file,moveId){
  const bar=document.getElementById(`progress-bar-${moveId}`),fill=document.getElementById(`progress-fill-${moveId}`);
  if(bar)bar.style.display="block";
  const fd=new FormData();fd.append("file",file);fd.append("upload_preset",UPLOAD_PRESET);
  const xhr=new XMLHttpRequest();
  xhr.upload.onprogress=e=>{if(e.lengthComputable&&fill)fill.style.width=(e.loaded/e.total*100)+"%";};
  xhr.onload=async function(){
    if(xhr.status===200){const res=JSON.parse(xhr.responseText);await updateDoc(doc(db,"moves",moveId),{videoUrl:res.secure_url});moves=moves.map(m=>m.id===moveId?{...m,videoUrl:res.secure_url}:m);showToast("アップロード完了！");window.showDetail(moveId);}
    else{showToast("アップロード失敗");if(bar)bar.style.display="none";}
  };
  xhr.onerror=()=>{showToast("通信エラー");if(bar)bar.style.display="none";};
  xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);xhr.send(fd);
}
window.handleAddVideoSelect=function(e){
  const f=e.target.files[0];if(!f)return;
  const p=document.getElementById("add-video-preview");p.src=URL.createObjectURL(f);p.style.display="block";window._pendingVideoFile=f;
}
const addDz=document.getElementById("add-drop-zone");
addDz.addEventListener("dragover",e=>{e.preventDefault();addDz.classList.add("dragover");});
addDz.addEventListener("dragleave",()=>addDz.classList.remove("dragover"));
addDz.addEventListener("drop",e=>{
  e.preventDefault();e.stopPropagation();addDz.classList.remove("dragover");
  const f=e.dataTransfer?.files?.[0];
  if(f&&f.type.startsWith("video/")){const p=document.getElementById("add-video-preview");p.src=URL.createObjectURL(f);p.style.display="block";window._pendingVideoFile=f;}
});
window.addToSet=function(id){const m=moves.find(x=>x.id===id);if(!m)return;setMoves.push(m);renderSetArea();showToast(`${m.name}を追加`);}
window.addToSetFromDetail=function(id){window.addToSet(id);window.closeDetail();switchTab("set",document.querySelectorAll(".tab")[1]);}
window.removeFromSet=i=>{setMoves.splice(i,1);renderSetArea();}
window.saveSet=async function(){
  const name=document.getElementById("set-name").value||"セット"+(sets.length+1);
  if(!setMoves.length){showToast("技を追加してください");return;}
  const d=window[`_td_set-tag-editor-create`];const tags=d?d.tags:[];
  await addDoc(collection(db,"sets"),{name,moves:setMoves.map(m=>({id:m.id,name:m.name,count:m.count||null})),tags,createdAt:Date.now()});
  setMoves=[];newSetTags=[];document.getElementById("set-name").value="";renderSetArea();
  renderTagEditor("set-tag-editor-create",[],tags=>{newSetTags=tags;});
  showToast("セットを保存しました！");await loadSets();switchTab("saved",document.querySelectorAll(".tab")[2]);
}
window.deleteSet=async function(id){
  if(!confirm("このセットを削除しますか？"))return;
  await deleteDoc(doc(db,"sets",id));sets=sets.filter(f=>f.id!==id);renderSaved();showToast("削除しました");
}
window.openAddMove=()=>{
  window._pendingVideoFile=null;newMoveTags=[];
  document.getElementById("add-video-preview").style.display="none";
  document.getElementById("add-video-preview").src="";
  document.getElementById("add-move-screen").classList.add("open");
  renderTagEditor("new-tag-editor",[],tags=>{newMoveTags=tags;});
}
window.closeAddMove=()=>document.getElementById("add-move-screen").classList.remove("open");
window.selectType=function(el){document.querySelectorAll("#type-select .type-opt").forEach(e=>e.classList.remove("active"));el.classList.add("active");selectedType=el.dataset.type;}
window.submitMove=async function(){
  const name=document.getElementById("new-name").value.trim();if(!name){showToast("技名を入力してください");return;}
  const desc=document.getElementById("new-desc").value.trim();
  const count=document.getElementById("new-count").value.trim();
  let videoUrl="";
  if(window._pendingVideoFile){showToast("動画アップロード中...");videoUrl=await uploadVideoForNew(window._pendingVideoFile);}
  await addDoc(collection(db,"moves"),{name,type:selectedType,desc,count:count||null,tags:newMoveTags,videoUrl,createdAt:Date.now()});
  ["new-name","new-desc","new-count"].forEach(id=>document.getElementById(id).value="");
  window._pendingVideoFile=null;newMoveTags=[];
  document.getElementById("add-video-preview").style.display="none";
  window.closeAddMove();showToast("技を追加しました！");await loadMoves();
}
function uploadVideoForNew(file){
  return new Promise(resolve=>{
    const bar=document.getElementById("add-upload-progress"),fill=document.getElementById("add-upload-fill");bar.style.display="block";
    const fd=new FormData();fd.append("file",file);fd.append("upload_preset",UPLOAD_PRESET);
    const xhr=new XMLHttpRequest();
    xhr.upload.onprogress=e=>{if(e.lengthComputable)fill.style.width=(e.loaded/e.total*100)+"%";};
    xhr.onload=function(){bar.style.display="none";if(xhr.status===200){const res=JSON.parse(xhr.responseText);resolve(res.secure_url);}else{showToast("動画アップロード失敗");resolve("");}};
    xhr.onerror=()=>{bar.style.display="none";resolve("");};
    xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);xhr.send(fd);
  });
}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}
window.switchTab=function(name,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));el.classList.add("active");
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById("sec-"+name).classList.add("active");
  document.getElementById("fab").style.display=name==="moves"?"flex":"none";
}
function closeDetail(){document.getElementById("detail-screen").classList.remove("open");}

renderTagEditor("set-tag-editor-create",[],tags=>{newSetTags=tags;});
loadMoves();loadSets();loadCustomTags();loadBeats();
</script>
</body>
</html>
